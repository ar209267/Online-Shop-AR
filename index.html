<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enjoy Shop - Game Top Up</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1a1a1a;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #7d40ff;
        }
        .logo { font-size: 24px; font-weight: bold; color: #7d40ff; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; }
        .login-btn {
            background-color: #6a11cb;
            padding: 8px 20px;
            border-radius: 5px;
            color: white;
        }

        .container { padding: 40px 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .card {
            background: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 15px;
            transition: 0.3s;
            border: 1px solid #333;
        }
        .card:hover { transform: translateY(-5px); border-color: #7d40ff; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card h3 { font-size: 16px; margin: 10px 0; }
        .rating { color: #ffcc00; font-size: 12px; }

        footer {
            background: #1a1a1a;
            padding: 30px;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">ENJOY SHOP</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">FAQ</a>
        <a href="#" class="login-btn">Login</a>
    </div>
</header>

<div class="container">
    <h2>Game Category</h2>
    <div class="grid">
        <div class="card">
            <img src="https://via.placeholder.com/200x180" alt="Free Fire">
            <h3>Free Fire BD Server</h3>
            <div class="rating">★★★★★ 5.0</div>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/200x180" alt="MLBB">
            <h3>MLBB Diamonds</h3>
            <div class="rating">★★★★★ 5.0</div>
        </div>
        </div>
</div>

<footer>
    <p>© 2026 Enjoy Shop - All Rights Reserved</p>
</footer>

</body>
</html>
