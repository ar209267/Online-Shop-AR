<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atik rocky & Gaming V9.3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --yellow: #f1c40f; --dark: #0f172a; --card: #1e293b; --white: #ffffff; --green: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: #fff; margin: 0; padding-bottom: 80px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }

        /* Profile Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--card); border-radius: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        .profile-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .profile-info img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--yellow); }
        .balance-chip { background: var(--yellow); color: #000; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 3px; }

        /* Section Title */
        .section-title { font-size: 14px; font-weight: bold; color: var(--yellow); margin: 15px 0 10px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }

        /* Compact Service Grid */
        .service-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .s-card { background: var(--card); padding: 10px 5px; border-radius: 12px; text-align: center; border: 1px solid #334155; cursor: pointer; transition: 0.2s; }
        .s-card:hover { border-color: var(--yellow); transform: scale(1.05); }
        .s-card i { font-size: 20px; margin-bottom: 5px; display: block; }
        .s-card span { font-size: 10px; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; }

        /* Icon Colors */
        .fa-facebook { color: #1877f2; }
        .fa-youtube { color: #ff0000; }
        .fa-instagram { color: #e4405f; }
        .fa-tiktok { color: #00f2ea; }
        .fa-gamepad { color: #00ff00; }
        .fa-fire { color: #ff8c00; }
        .fa-u { color: #f1c40f; }

        /* Payment Box (Compact) */
        .pay-box { background: var(--white); color: #000; border-radius: 15px; padding: 15px; text-align: center; border: 3px solid var(--yellow); margin-top: 20px; }
        .pay-box h4 { margin: 0; font-size: 12px; opacity: 0.8; }
        .pay-num { font-size: 22px; font-weight: 800; display: block; margin: 5px 0; color: #000; letter-spacing: 1px; }
        .pay-btn { background: #000; color: #fff; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #334155; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .nav-item { text-align: center; color: #94a3b8; text-decoration: none; font-size: 10px; }
        .nav-item i { font-size: 18px; display: block; margin-bottom: 3px; }
        .nav-item.active { color: var(--yellow); }

        /* Floating Support */
        .wa-float { position: fixed; bottom: 80px; right: 20px; background: var(--green); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-decoration: none; z-index: 100; }
    </style>
</head>
