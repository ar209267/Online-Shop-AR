<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq Master - Ultimate Pro V30</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00ff88; --bg: #05070a; --card: #11151c; --border: #1e2530; --text: #ffffff; --dim: #94a3b8; --danger: #ff4757; }
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }

        /* --- Auth View --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 35px; border-radius: 35px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,255,136,0.1); }
        .input-box { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: #fff; margin-top: 15px; outline: none; }
        .btn-prime { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; background: var(--primary); color: #000; margin-top: 20px; cursor: pointer; }

        /* --- Dashboard --- */
        #app-screen { display: none; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
        .balance-card { background: linear-gradient(135deg, #00ff88, #006636); margin: 20px; padding: 30px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,255,136,0.2); }
        
        /* Notification Popup */
        #notif-popup { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 15px 25px; border-radius: 20px; font-weight: bold; z-index: 999999; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { background: var(--card); padding: 25px 15px; border-radius: 25px; text-align: center; border: 1px solid var(--border); cursor: pointer; }
    </style>
</head>
<body>

<div id="notif-popup">🔔 নতুন অফার: আজকের টপ-আপে ৫% বোনাস!</div>

<div id="auth-screen">
    <div class="auth-card" id="login-form">
        <h2 style="color:var(--primary); margin:0;">অ্যাক্সেস প্যানেল</h2>
        <p style="color:var(--dim); font-size:12px;">আপনার জিমেইল ও পাসওয়ার্ড দিন</p>
        <input type="email" id="u-email" class="input-box" placeholder="আপনার জিমেইল">
        <input type="password" id="u-pass" class="input-box" placeholder="পাসওয়ার্ড">
        <button class="btn-prime" onclick="handleLogin()">লগইন করুন</button>
        <p id="err-msg" style="color:var(--danger); font-size:11px; margin-top:10px; font-weight:bold;"></p>
        <span style="color:var(--dim); font-size:12px; margin-top:15px; display:block;">একাউন্ট নেই? <b style="color:var(--primary); cursor:pointer;" onclick="toggleAuth(true)">সাইন-আপ করুন</b></span>
    </div>

    <div class="auth-card" id="signup-form" style="display:none;">
        <h2 style="color:var(--primary); margin:0;">নতুন একাউন্ট</h2>
        <input type="email" id="s-email" class="input-box" placeholder="জিমেইল">
        <input type="password" id="s-pass" class="input-box" placeholder="পাসওয়ার্ড (মিনিমাম ৬ সংখ্যা)">
        <button class="btn-prime" onclick="handleSignup()">একাউন্ট খুলুন</button>
        <span style="color:var(--dim); font-size:12px; margin-top:15px; display:block;" onclick="toggleAuth(false)">ইতিমধ্যে একাউন্ট আছে? <b>লগইন</b></span>
    </div>
</div>

<div id="app-screen">
    <div class="header">
        <b><i class="fas fa-bolt" style="color:var(--primary)"></i> ATIQ MASTER</b>
        <button onclick="logout()" style="background:none; border:none; color:var(--danger); font-weight:bold;">Logout</button>
    </div>

    <div class="balance-card">
        <small style="font-weight:bold;">আপনার বর্তমান ব্যালেন্স</small>
        <h1 id="bal-text" style="margin:5px 0 0 0; font-size:40px;">৳ ০.০০</h1>
    </div>

    <div style="padding: 0 20px; color:var(--dim); font-size:12px; font-weight:bold;">বেস্ট সেলিং সার্ভিস</div>
    <div class="service-grid">
        <div class="card" onclick="alert('অর্ডার সিস্টেম ওপেন হচ্ছে...')"><i class="fas fa-fire" style="color:#ff8c00; font-size:30px;"></i><br><b>Free Fire</b></div>
        <div class="card" onclick="alert('অর্ডার সিস্টেম ওপেন হচ্ছে...')"><i class="fab fa-facebook" style="color:#1877f2; font-size:30px;"></i><br><b>Facebook</b></div>
    </div>
</div>

<script>
    // --- Firebase Configuration ---
    const firebaseConfig = {
        apiKey: "AIzaSyC5i7S0EJeF08NsO7VbiU63r-",
        authDomain: "online-shop-ar.firebaseapp.com",
        databaseURL: "https://online-shop-ar-default-rtdb.firebaseio.com",
        projectId: "online-shop-ar",
        storageBucket: "online-shop-ar.appspot.com",
        messagingSenderId: "913434308973",
        appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // --- Authentication Logic ---
    function toggleAuth(showSignup) {
        document.getElementById('login-form').style.display = showSignup ? 'none' : 'block';
        document.getElementById('signup-form').style.display = showSignup ? 'block' : 'none';
    }

    function handleSignup() {
        const email = document.getElementById('s-email').value;
        const pass = document.getElementById('s-pass').value;
        auth.createUserWithEmailAndPassword(email, pass)
            .then(() => { alert("একাউন্ট খোলা সফল!"); toggleAuth(false); })
            .catch(err => alert("এরর: " + err.message));
    }

    function handleLogin() {
        const email = document.getElementById('u-email').value;
        const pass = document.getElementById('u-pass').value;
        auth.signInWithEmailAndPassword(email, pass)
            .then(user => loadDashboard(user.user))
            .catch(err => {
                document.getElementById('err-msg').innerText = "ভুল জিমেইল বা পাসওয়ার্ড!";
            });
    }

    // --- Dashboard & Notification ---
    function loadDashboard(user) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        
        // ব্যালেন্স রিয়েল-টাইম আপডেট (Firebase Database থেকে)
        db.ref('users/' + user.uid + '/balance').on('value', snap => {
            const val = snap.val() || "০.০০";
            document.getElementById('bal-text').innerText = "৳ " + val;
        });

        // পুশ নোটিফিকেশন এনিমেশন
        setTimeout(() => {
            const pop = document.getElementById('notif-popup');
            pop.style.top = '20px';
            setTimeout(() => { pop.style.top = '-100px'; }, 5000);
        }, 2000);
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    // অটো-লগইন চেক
    auth.onAuthStateChanged(user => { if(user) loadDashboard(user); });

</script>
</body>
</html>
