<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop AR | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }
        body { background-color: var(--primary-bg); color: var(--text-color); font-family: 'Segoe UI', sans-serif; margin: 0; }
        .sidebar { width: 250px; background: var(--secondary-bg); height: 100vh; position: fixed; padding: 20px; }
        .main-content { margin-left: 270px; padding: 30px; }
        .card { background: var(--secondary-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .balance-card { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        .btn { background: var(--accent-color); color: #000; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #7dd3fc; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Shop AR</h2>
    <p><i class="fas fa-home"></i> Dashboard</p>
    <p><i class="fas fa-plus"></i> New Order</p>
    <p><i class="fas fa-history"></i> Order History</p>
    <p><i class="fas fa-wallet"></i> Add Funds</p>
    <p><i class="fas fa-ticket-alt"></i> Support</p>
</div>

<div class="main-content">
    <div class="card balance-card">
        <h3>আপনার বর্তমান ব্যালেন্স</h3>
        <h1>$0.00 / ৳০.০০</h1>
    </div>

    <div class="card">
        <h3>অর্ডার করুন (New Order)</h3>
        <label>Category</label>
        <select>
            <option>Facebook Followers [Premium]</option>
            <option>YouTube Watch Time</option>
            <option>Instagram Likes</option>
        </select>
        
        <label>Service</label>
        <select>
            <option>Real Followers - Non Drop - 30 Days Refill</option>
        </select>

        <label>Link</label>
        <input type="text" placeholder="https://facebook.com/yourprofile">

        <label>Quantity</label>
        <input type="number" placeholder="Min: 100 - Max: 10000">

        <button class="btn">Place Order</button>
    </div>
</div>

</body>
</html>
