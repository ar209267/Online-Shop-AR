<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop AR - Owner Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { background-color: #0b0e14; color: #f0f6fc; font-family: 'Hind Siliguri', sans-serif; }
        .glass-panel { background-color: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; margin-top: 20px; }
        .navbar { background-color: #161b22; border-bottom: 2px solid #58a6ff; }
        #adminDashboard { display: none; } /* শুরুতে অ্যাডমিন প্যানেল লুকানো থাকবে */
        .status-pending { color: #d29922; background: rgba(210, 153, 34, 0.1); padding: 4px 8px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold" href="#" id="ownerLogo" style="color: #58a6ff !important;">ONLINE SHOP AR</a>
            <button id="logoutBtn" class="btn btn-danger btn-sm" style="display:none;" onclick="location.reload()">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        
        <div id="userView">
            <div class="glass-panel text-center">
                <h3>আপনার ব্যালেন্স: ৳০.০০</h3>
                <button class="btn btn-primary mt-2" onclick="Swal.fire('অ্যাড ফান্ড','টাকা পাঠাতে এডমিনের সাথে যোগাযোগ করুন।','info')">টাকা যোগ করুন</button>
            </div>

            <div class="glass-panel">
                <h4>নতুন অর্ডার করুন</h4>
                <select id="service" class="form-select mb-3 bg-dark text-white border-secondary">
                    <option value="Free Fire 115 Diamond">Free Fire 115 Diamond - ৳৮৫</option>
                    <option value="PUBG 60 UC">PUBG 60 UC - ৳৭৫</option>
                </select>
                <input type="text" id="targetId" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="প্লেয়ার আইডি দিন">
                <button class="btn btn-success w-100 fw-bold" onclick="submitOrder()">অর্ডার কনফার্ম</button>
            </div>
        </div>

        <div id="adminDashboard">
            <h2 class="text-info mb-4">মালিকের ড্যাশবোর্ড (অর্ডার লিস্ট)</h2>
            <div class="table-responsive">
                <table class="table table-dark table-hover border-secondary">
                    <thead>
                        <tr>
                            <th>সময়</th>
                            <th>সার্ভিস</th>
                            <th>আইডি</th>
                            <th>অবস্থা</th>
                            <th>অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody id="orderListTable">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // মালিকের পাসওয়ার্ড চেক করার গোপন সিস্টেম
        let clicks = 0;
        document.getElementById('ownerLogo').addEventListener('click', () => {
            clicks++;
            if(clicks === 5) {
                showLogin();
                clicks = 0;
            }
        });

        async function showLogin() {
            const { value: pass } = await Swal.fire({
                title: 'মালিক ভেরিফিকেশন',
                input: 'password',
                inputPlaceholder: 'গোপন কোড দিন',
                background: '#161b22', color: '#fff',
                confirmButtonColor: '#238636'
            });

            // আপনার পাসওয়ার্ড: Admin@Atiq
            if(pass === "Admin@Atiq") {
                document.getElementById('userView').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                document.getElementById('logoutBtn').style.display = 'block';
                Swal.fire('স্বাগতম!', 'আপনি এখন মালিক হিসেবে লগইন আছেন।', 'success');
            } else {
                Swal.fire('ব্যর্থ!', 'ভুল পাসওয়ার্ড।', 'error');
            }
        }

        // অর্ডার জমা দেওয়ার ফাংশন
        function submitOrder() {
            const service = document.getElementById('service').value;
            const targetId = document.getElementById('targetId').value;

            if(!targetId) return Swal.fire('ভুল','আইডি দিন','warning');

            // অর্ডারের ডাটা টেবিলে পাঠানো (অ্যাডমিন প্যানেলে দেখার জন্য)
            const table = document.getElementById('orderListTable');
            const row = `<tr>
                <td>${new Date().toLocaleTimeString()}</td>
                <td>${service}</td>
                <td>${targetId}</td>
                <td><span class="status-pending">Pending</span></td>
                <td><button class="btn btn-sm btn-outline-success" onclick="this.parentElement.parentElement.remove()">Done</button></td>
            </tr>`;
            table.innerHTML = row + table.innerHTML;

            Swal.fire('সফল!', 'আপনার অর্ডারটি মালিকের কাছে পাঠানো হয়েছে।', 'success');
            document.getElementById('targetId').value = '';
        }
    </script>
</body>
</html>
