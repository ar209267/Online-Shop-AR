<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq SMM Master V12</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #f1c40f; --bg: #05080d; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; }

        /* Master Login Screen */
        #auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .master-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; backdrop-filter: blur(15px); text-align: center; }
        .master-card h2 { color: var(--primary); font-size: 24px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .master-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        .master-btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--primary); color: #000; font-weight: 900; border: none; cursor: pointer; margin-top: 15px; }

        /* Dashboard Interface */
        #main-ui { display: none; padding: 20px; max-width: 500px; margin: auto; }
        .header { background: var(--glass); padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; }
        .app-grid { display: grid; gap: 15px; }
        .app-box { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; }
        .app-info { padding: 18px; display: flex; align-items: center; cursor: pointer; }
        .app-info i { font-size: 24px; margin-right: 15px; }
        .fa-facebook { color: #1877f2; }
        .fa-youtube { color: #ff0000; }
        
        .service-list { display: none; background: rgba(0,0,0,0.3); padding: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .service-list div { display: flex; justify-content: space-between; padding: 12px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .price { color: var(--primary); font-weight: bold; }

        .payment-footer { background: #fff; color: #000; border-radius: 20px; padding: 20px; margin-top: 30px; text-align: center; border: 4px solid var(--primary); }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="master-card">
        <i class="fas fa-user-lock fa-3x" style="color:var(--primary); margin-bottom:15px;"></i>
        <h2>Atiq Master Login</h2>
        <input type="email" id="mEmail" placeholder="আপনার জিমেইল (@gmail.com)">
        <input type="password" id="mPass" placeholder="পাসওয়ার্ড">
        <button class="master-btn" onclick="masterLogin()">সার্ভারে প্রবেশ করুন</button>
        <p id="error" style="color: #ff4757; font-size: 11px; margin-top: 10px;"></p>
    </div>
</div>

<div id="main-ui">
    <div class="header">
        <div>
            <h3 id="user-head" style="text-transform: capitalize;">User</h3>
            <div style="color: var(--primary); font-size: 12px; font-weight: bold;">ব্যালেন্স: ৳ ৫৪০.০০</div>
        </div>
        <i class="fas fa-fingerprint fa-2x" style="color: var(--primary);"></i>
    </div>

    <div class="app-grid">
        <div class="app-box">
            <div class="app-info" onclick="toggle('fb-list')">
                <i class="fab fa-facebook"></i> <b>Facebook Services</b>
            </div>
            <div id="fb-list" class="service-list">
                <div><span>Profile Follower (5k)</span> <span class="price">৳১৩০</span></div>
                <div><span>Post Reactions</span> <span class="price">৳৫০</span></div>
            </div>
        </div>

        <div class="app-box">
            <div class="app-info" onclick="toggle('yt-list')">
                <i class="fab fa-youtube"></i> <b>YouTube Growth</b>
            </div>
            <div id="yt-list" class="service-list">
                <div><span>1k Subscribers</span> <span class="price">৳৮৫০</span></div>
                <div><span>4k Hours Watchtime</span> <span class="price">৳২৪০০</span></div>
            </div>
        </div>
    </div>

    <div class="payment-footer">
        <h4 style="margin-bottom: 5px;">বিকাশ / নগদ (পার্সোনাল)</h4>
        <div style="font-size: 24px; font-weight: 900; background: #fff9c4; padding: 10px; border-radius: 10px; border: 2px dashed #000;">০১৭৬৬৩৮০৯৩১</div>
        <button class="master-btn" style="margin-top: 10px; background: #000; color: #fff;">অ্যাড ব্যালেন্স</button>
    </div>
</div>

<script>
    function masterLogin() {
        const email = document.getElementById('mEmail').value.trim();
        const pass = document.getElementById('mPass').value.trim();
        const err = document.getElementById('error');

        // জিমেইল ভেরিফিকেশন
        if(!email.includes('@gmail.com')) {
            err.innerText = "দয়া করে আসল @gmail.com ব্যবহার করুন।";
            return;
        }

        if(pass.length < 4) {
            err.innerText = "পাসওয়ার্ড অন্তত ৪ অক্ষরের হতে হবে।";
            return;
        }

        // মাস্টার ডাটা লজিক (LocalStorage)
        const savedData = localStorage.getItem(email);

        if(!savedData) {
            // নতুন অ্যাকাউন্ট অটো সেভ
            localStorage.setItem(email, pass);
            accessDone(email);
        } else {
            // পুরাতন জিমেইল চেক
            if(savedData === pass) {
                accessDone(email);
            } else {
                err.innerText = "ভুল পাসওয়ার্ড! আগের পাসওয়ার্ডটি ব্যবহার করুন।";
            }
        }
    }

    function accessDone(email) {
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('user-head').innerText = email.split('@')[0];
    }

    function toggle(id) {
        const target = document.getElementById(id);
        target.style.display = (target.style.display === 'block') ? 'none' : 'block';
    }
</script>

</body>
</html>
