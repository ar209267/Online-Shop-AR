<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Ultimate v3</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-white">

<!-- NAVBAR -->
<header class="sticky top-0 bg-black border-b border-gray-800 z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
    <h1 class="text-cyan-400 font-extrabold text-2xl">AR Ultimate v3</h1>
    <nav class="space-x-4 text-sm">
      <a href="#services">Services</a>
      <a href="#order">Order</a>
      <a href="#admin">Admin</a>
      <a href="#payment">Payment</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="text-center py-20 bg-gradient-to-b from-cyan-900 to-gray-950">
  <h2 class="text-5xl font-bold">Gaming & Digital Marketplace</h2>
  <p class="text-gray-300 mt-3">Fast • Secure • Automated System</p>
</section>

<!-- SERVICES -->
<section id="services" class="max-w-6xl mx-auto py-16 grid md:grid-cols-3 gap-6 px-6">

  <div onclick="selectService('Free Fire Topup')" class="cursor-pointer bg-gray-900 p-6 rounded-xl border hover:border-cyan-400">
    <h3 class="text-cyan-400 font-bold">Free Fire Top-Up</h3>
  </div>

  <div onclick="selectService('PUBG UC')" class="cursor-pointer bg-gray-900 p-6 rounded-xl border hover:border-cyan-400">
    <h3 class="text-cyan-400 font-bold">PUBG UC</h3>
  </div>

  <div onclick="selectService('Website Service')" class="cursor-pointer bg-gray-900 p-6 rounded-xl border hover:border-cyan-400">
    <h3 class="text-cyan-400 font-bold">Website Service</h3>
  </div>

</section>

<!-- ORDER -->
<section id="order" class="bg-gray-900 py-12 px-6">
  <div class="max-w-xl mx-auto bg-black p-6 rounded-xl border border-gray-800">

    <h3 class="text-2xl font-bold mb-4 text-center">Place Order</h3>

    <input id="name" placeholder="Name" class="w-full p-3 mb-3 bg-gray-900 border rounded">
    <input id="uid" placeholder="UID / Username" class="w-full p-3 mb-3 bg-gray-900 border rounded">

    <input id="service" placeholder="Selected Service" readonly class="w-full p-3 mb-3 bg-gray-800 border rounded">

    <button onclick="placeOrder()" class="w-full bg-cyan-500 text-black font-bold p-3 rounded">
      Submit Order
    </button>

    <p id="msg" class="text-green-400 text-center mt-3 hidden">Order Placed ✔</p>

  </div>
</section>

<!-- PAYMENT -->
<section id="payment" class="py-12 text-center">
  <h2 class="text-3xl font-bold mb-4">Payment</h2>
  <p>bKash: 01766380931</p>
</section>

<!-- ADMIN -->
<section id="admin" class="py-12 px-6 bg-black border-t border-gray-800">
  <div class="max-w-4xl mx-auto">
    <h2 class="text-3xl font-bold text-center mb-6">Admin Dashboard</h2>
    <div id="orders" class="space-y-3"></div>
  </div>
</section>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs 
} from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SERVICE SELECT
window.selectService = function(service){
  document.getElementById("service").value = service;
};

// PLACE ORDER
window.placeOrder = async function(){

  let name = document.getElementById("name").value;
  let uid = document.getElementById("uid").value;
  let service = document.getElementById("service").value;

  if(!name || !uid || !service){
    alert("সব ফিল্ড পূরণ করুন");
    return;
  }

  await addDoc(collection(db,"orders"),{
    name,
    uid,
    service,
    status:"Pending",
    time:new Date()
  });

  document.getElementById("msg").classList.remove("hidden");

  loadOrders();
};

// LOAD ORDERS (ADMIN PANEL)
async function loadOrders(){

  let ordersDiv = document.getElementById("orders");
  ordersDiv.innerHTML = "";

  let snap = await getDocs(collection(db,"orders"));

  snap.forEach(doc=>{
    let data = doc.data();

    ordersDiv.innerHTML += `
      <div class="bg-gray-900 p-4 rounded border border-gray-800">
        <p><b>Name:</b> ${data.name}</p>
        <p><b>UID:</b> ${data.uid}</p>
        <p><b>Service:</b> ${data.service}</p>
        <p class="text-yellow-400"><b>Status:</b> ${data.status}</p>
      </div>
    `;
  });
}

loadOrders();

</script>

</body>
</html>
