<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop AR - V11.11</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #05080a; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* লোগো অ্যানিমেশন */
        .logo-container { text-align: center; padding: 50px 20px; }
        .main-logo {
            width: 120px;
            height: 120px;
            border-radius: 25px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
            border: 3px solid #00f2fe;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 25px rgba(0, 255, 255, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 45px rgba(0, 255, 255, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 25px rgba(0, 255, 255, 0.4); }
        }

        .brand-name {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* লগইন বক্স */
        .login-card {
            background: rgba(16, 22, 30, 0.9);
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto;
            backdrop-filter: blur(10px);
        }

        .form-control {
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 10px;
            padding: 12px;
        }

        .btn-prime {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            color: black;
            font-weight: bold;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/580956240598742323" alt="AR Logo" class="main-logo">
            <div class="brand-name">ONLINE SHOP AR</div>
            <p class="text-secondary">ভার্সন ১১.১১ - গ্লোবাল মাস্টার প্যানেল</p>
        </div>

        <div class="login-card shadow-lg" id="loginArea">
            <h4 class="text-center mb-4"><i class="fas fa-lock"></i> ইউজার লগইন</h4>
            <div class="mb-3">
                <label>জিমেইল এড্রেস</label>
                <input type="email" id="userEmail" class="form-control" placeholder="আপনার জিমেইল দিন">
            </div>
            <div class="mb-3">
                <label>সিক্রেট পাসওয়ার্ড</label>
                <input type="password" id="userPass" class="form-control" placeholder="পাসওয়ার্ড দিন">
            </div>
            <button class="btn btn-prime" onclick="handleAuth()">লগইন করুন</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // ওস্তাদ, এখানে সেই জিমেইল-পাসওয়ার্ড লকিং সিস্টেম
        function handleAuth() {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;

            // প্রথমবার রেজিস্ট্রেশন ডেটা হিসেবে সেভ হবে (উদাহরণস্বরূপ)
            if(!localStorage.getItem('registeredEmail')) {
                localStorage.setItem('registeredEmail', email);
                localStorage.setItem('registeredPass', pass);
                Swal.fire('সফল!', 'আপনার অ্যাকাউন্টটি এই ডিভাইসে লক করা হলো।', 'success');
            } else {
                // এরপর থেকে শুধু ওই জিমেইল এবং পাসওয়ার্ডই কাজ করবে
                const savedEmail = localStorage.getItem('registeredEmail');
                const savedPass = localStorage.getItem('registeredPass');

                if(email === savedEmail && pass === savedPass) {
                    Swal.fire('স্বাগতম!', 'আপনি সফলভাবে লগইন করেছেন।', 'success');
                    // এখানে আপনার মেইন শপ পেজ ওপেন হবে
                } else {
                    Swal.fire('ব্যর্থ!', 'ভুল জিমেইল অথবা পাসওয়ার্ড! এটি অন্য কারো অ্যাকাউন্ট।', 'error');
                }
            }
        }
    </script>
</body>
</html>
