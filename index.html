<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABR SMM Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; }
        .payment-banner {
            background: linear-gradient(90deg, #28a745, #1e7e34); color: white; padding: 15px;
            border-radius: 12px; text-align: center; cursor: pointer; font-weight: bold;
            margin: 20px 0; display: block; text-decoration: none; border: none; width: 100%;
        }
        .service-card { 
            background: #1e1e1e; border-radius: 15px; padding: 20px; text-align: center; 
            transition: 0.3s; cursor: pointer; border: 1px solid #333;
        }
        .service-card:hover { border-color: #ff8c00; transform: translateY(-5px); }
        .order-box { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; margin-top: 20px; }
        .form-control, .form-select { background: #2a2a2a; border: 1px solid #444; color: white; }
        .form-control:focus { background: #2a2a2a; color: white; border-color: #ff8c00; }
        .btn-order { background: #ff8c00; color: white; font-weight: bold; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container pb-5">
    <a href="add-funds.html" class="payment-banner shadow-lg">
        <i class="fas fa-wallet"></i> অ্যাড ফান্ড: ব্যালেন্স যোগ করতে এখানে ক্লিক করুন
    </a>

    <h3 class="fw-bold mb-4">আমাদের সার্ভিসসমূহ</h3>
    <div class="row g-3">
        <div class="col-6 col-md-3" onclick="showForm('Facebook')">
            <div class="service-card"><i class="fab fa-facebook text-primary fa-2x"></i><h6>Facebook</h6></div>
        </div>
        <div class="col-6 col-md-3" onclick="showForm('YouTube')">
            <div class="service-card"><i class="fab fa-youtube text-danger fa-2x"></i><h6>YouTube</h6></div>
        </div>
        <div class="col-6 col-md-3" onclick="showForm('Free Fire')">
            <div class="service-card"><i class="fas fa-gamepad text-warning fa-2x"></i><h6>Free Fire</h6></div>
        </div>
        <div class="col-6 col-md-3" onclick="showForm('ID Sale')">
            <div class="service-card"><i class="fas fa-user-shield text-success fa-2x"></i><h6>ID Sale</h6></div>
        </div>
    </div>

    <div id="order-form" class="order-box shadow-lg" style="display:none;">
        <h4 id="service-title" class="text-warning fw-bold mb-3">Service Name</h4>
        <div class="mb-3">
            <label class="form-label">প্যাকেজ বেছে নিন</label>
            <select id="package" class="form-select" onchange="calc()"></select>
        </div>
        <div class="mb-3">
            <label class="form-label">লিঙ্ক অথবা প্লেয়ার আইডি</label>
            <input type="text" id="target" class="form-control" placeholder="এখানে দিন...">
        </div>
        <div class="p-3 bg-dark rounded d-flex justify-content-between mb-3">
            <div><span>Total:</span> <h4 id="usd" class="text-primary">$0.00</h4></div>
            <div class="text-end"><span>In BDT:</span> <h4 id="bdt" class="text-success">৳0.00</h4></div>
        </div>
        <button onclick="placeOrder()" class="btn btn-order w-100">অর্ডার কনফার্ম এবং পেমেন্ট করুন</button>
    </div>
</div>

<script>
    const data = {
        'Facebook': [{n: "Followers (Premium)", p: 1.5}, {n: "Video Views", p: 0.8}],
        'YouTube': [{n: "Subscribers", p: 5.0}, {n: "Watch Time", p: 12.0}],
        'Free Fire': [{n: "115 Diamonds", p: 0.85}, {n: "Weekly", p: 1.65}],
        'ID Sale': [{n: "Level 60 ID", p: 20.0}, {n: "Gmail Pack", p: 2.0}]
    };

    function showForm(cat) {
        document.getElementById('order-form').style.display = 'block';
        document.getElementById('service-title').innerText = cat;
        let s = document.getElementById('package'); s.innerHTML = '';
        data[cat].forEach(o => { let e = document.createElement('option'); e.text = o.n; e.value = o.p; s.add(e); });
        calc();
    }

    function calc() {
        let p = document.getElementById('package').value;
        document.getElementById('usd').innerText = '$' + parseFloat(p).toFixed(2);
        document.getElementById('bdt').innerText = '৳' + (p * 120).toFixed(2);
    }

    function placeOrder() {
        window.location.href = 'add-funds.html';
    }
</script>
</body>
</html>
