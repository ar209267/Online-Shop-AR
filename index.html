<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR SHOP PRO | Ultimate Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7d40ff; --bg: #0b0e14; --card: #161b22; }
        body { background: var(--bg); color: #fff; font-family: 'Hind Siliguri', sans-serif; }
        
        /* Navbar */
        .navbar { background: #1a1d23; border-bottom: 2px solid var(--primary); }

        /* Product Cards with Real Logos */
        .service-card { background: var(--card); border-radius: 15px; border: 1px solid #30363d; transition: 0.3s; cursor: pointer; overflow: hidden; height: 100%; text-align: center; }
        .service-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .logo-box { height: 120px; display: flex; align-items: center; justify-content: center; background: #000; padding: 15px; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .service-name { padding: 12px; font-weight: 700; font-size: 14px; }

        /* Order Panel */
        #order-panel { display: none; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--primary); }
        .pkg-btn { background: #21262d; border: 1px solid #30363d; padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; }
        .pkg-btn.active { border-color: var(--primary); background: rgba(125, 64, 255, 0.1); }

        /* Admin Table */
        .admin-section { margin-top: 40px; background: #0d1117; padding: 20px; border-radius: 15px; border: 1px solid #238636; }
        .status-success { color: #238636; font-weight: bold; }
        .status-pending { color: #d29922; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#" onclick="location.reload()">AR DIGITAL SHOP</a>
        <span class="text-info small">মালিক: আতিক</span>
    </div>
</nav>

<div class="container mt-4 pb-5">
    <div id="home-view">
        <h4 class="mb-4 fw-bold">পছন্দের সার্ভিসটি বেছে নিন</h4>
        <div class="row g-3">
            <div class="col-6 col-md-3" onclick="openOrder('ff')">
                <div class="service-card">
                    <div class="logo-box"><img src="https://i.ibb.co/LhYpY0P/freefire-logo.png"></div>
                    <div class="service-name">Free Fire Diamond</div>
                </div>
            </div>
            <div class="col-6 col-md-3" onclick="openOrder('pubg')">
                <div class="service-card">
                    <div class="logo-box"><img src="https://w7.pngwing.com/pngs/380/638/png-transparent-pubg-mobile-logo-iphone-6-plus-video-game-playerunknown-s-battlegrounds-logo-t-shirt-battle-royale-game-thumbnail.png"></div>
                    <div class="service-name">PUBG Mobile UC</div>
                </div>
            </div>
            <div class="col-6 col-md-3" onclick="openOrder('fb')">
                <div class="service-card">
                    <div class="logo-box"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg"></div>
                    <div class="service-name">Facebook Service</div>
                </div>
            </div>
            <div class="col-6 col-md-3" onclick="openOrder('tk')">
                <div class="service-card">
                    <div class="logo-box"><img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg"></div>
                    <div class="service-name">TikTok Followers</div>
                </div>
            </div>
        </div>
    </div>

    <div id="order-panel" class="mt-3">
        <button class="btn btn-sm btn-outline-light mb-3" onclick="goHome()">← ফিরে যান</button>
        <div class="row">
            <div class="col-md-7">
                <h3 id="display-title" class="text-primary mb-3"></h3>
                <div id="pkg-list"></div>
            </div>
            <div class="col-md-5">
                <div class="p-4 border border-secondary rounded bg-dark">
                    <h5>অর্ডার কনফার্ম করুন</h5>
                    <input type="text" id="target-id" class="form-control mb-3" placeholder="ID বা লিঙ্ক দিন">
                    <div class="alert alert-info py-2 small">বিকাশ/নগদ: 01766 380 931</div>
                    <input type="text" id="trx-id" class="form-control mb-3" placeholder="ট্রানজেকশন আইডি (TrxID)">
                    <button class="btn btn-primary w-100 fw-bold" onclick="submitOrder()">সাবমিট অর্ডার</button>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-section">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="m-0 text-success fw-bold">অর্ডার হিস্টোরি (ডাটাবেজ)</h5>
            <button class="btn btn-danger btn-sm" onclick="clearData()">ডিলিট অল</button>
        </div>
        <div class="table-responsive">
            <table class="table table-dark table-hover small">
                <thead>
                    <tr><th>টাইম</th><th>সার্ভিস</th><th>টার্গেট</th><th>TrxID</th><th>স্ট্যাটাস</th></tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const data = {
        ff: { n: "Free Fire Diamond", pkgs: ["115 Diamond - ৳85", "505 Diamond - ৳340"] },
        pubg: { n: "PUBG Mobile UC", pkgs: ["60 UC - ৳75", "325 UC - ৳380"] },
        fb: { n: "Facebook Follower", pkgs: ["1K Follower - ৳150", "5K Follower - ৳600"] },
        tk: { n: "TikTok Follower", pkgs: ["1K Follower - ৳120", "10K Views - ৳50"] }
    };

    let selectedPkg = "";

    // পেইজ লোড হওয়ার সময় আগের ডাটা নিয়ে আসা
    window.onload = function() {
        renderHistory();
    };

    function openOrder(id) {
        const s = data[id];
        document.getElementById('display-title').innerText = s.n;
        const list = document.getElementById('pkg-list');
        list.innerHTML = '';
        s.pkgs.forEach(p => {
            list.innerHTML += `<div class="pkg-btn" onclick="selectThis(this, '${p}')"><span>${p}</span></div>`;
        });
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('order-panel').style.display = 'block';
    }

    function selectThis(el, p) {
        document.querySelectorAll('.pkg-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        selectedPkg = p;
    }

    function goHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('order-panel').style.display = 'none';
    }

    // পেমেন্ট ভেরিফাই এবং ডাটা সেভ লজিক
    function submitOrder() {
        const target = document.getElementById('target-id').value;
        const trx = document.getElementById('trx-id').value;
        const service = document.getElementById('display-title').innerText;

        // ১. অটো ভেরিফিকেশন লজিক (TrxID সাধারণত ৮-১০ অক্ষরের হয়)
        if(!selectedPkg || !target || trx.length < 8) {
            alert("ভুল তথ্য! সঠিক TrxID এবং প্যাকেজ সিলেক্ট করুন।");
            return;
        }

        // ২. ডাটা অবজেক্ট তৈরি
        const newOrder = {
            time: new Date().toLocaleString(),
            service: service + " (" + selectedPkg + ")",
            target: target,
            trx: trx,
            status: "Pending" // এটা মালিক পরে চেক করবে
        };

        // ৩. LocalStorage-এ সেভ করা (যাতে রিফ্রেশ দিলে না যায়)
        let orders = JSON.parse(localStorage.getItem('ar_orders')) || [];
        orders.unshift(newOrder);
        localStorage.setItem('ar_orders', JSON.stringify(orders));

        alert("অর্ডার সফল! মালিক এখন এটি চেক করবেন।");
        renderHistory();
        goHome();
    }

    function renderHistory() {
        const orders = JSON.parse(localStorage.getItem('ar_orders')) || [];
        const body = document.getElementById('history-body');
        body.innerHTML = '';
        
        if(orders.length === 0) {
            body.innerHTML = '<tr><td colspan="5" class="text-center py-3">কোনো ডাটা নেই।</td></tr>';
            return;
        }

        orders.forEach(o => {
            body.innerHTML += `<tr>
                <td>${o.time}</td>
                <td>${o.service}</td>
                <td>${o.target}</td>
                <td><span class="text-info">${o.trx}</span></td>
                <td><span class="status-pending">${o.status}</span></td>
            </tr>`;
        });
    }

    function clearData() {
        if(confirm("আপনি কি নিশ্চিত সব ডাটা মুছে ফেলতে চান?")) {
            localStorage.removeItem('ar_orders');
            renderHistory();
        }
    }
</script>
</body>
</html>
