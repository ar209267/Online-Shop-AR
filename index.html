<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR SHOP PRO | Ultimate v8.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7d40ff; --dark: #05070a; --glass: #161b22; }
        body { background: var(--dark); color: #fff; font-family: 'Hind Siliguri', sans-serif; }

        /* Login Screen Layer */
        #login-screen {
            position: fixed; inset: 0; background: #000; z-index: 20000;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .login-box { background: var(--glass); padding: 40px; border-radius: 25px; border: 1px solid var(--primary); max-width: 380px; width: 90%; }

        /* Product Cards UI */
        .glass-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; transition: 0.3s; cursor: pointer; height: 100%; }
        .glass-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(125, 64, 255, 0.2); }
        .logo-container { height: 100px; display: flex; align-items: center; justify-content: center; padding: 10px; background: #000; border-radius: 15px 15px 0 0; }
        .logo-container img { max-width: 80%; max-height: 80%; object-fit: contain; }

        /* Payment & Invoice Modals */
        #payment-gateway, #invoice-modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-box { background: #fff; color: #000; width: 90%; max-width: 400px; border-radius: 15px; overflow: hidden; padding: 25px; }
        .btn-pay { background: #d12053; color: #fff; border: none; padding: 12px; width: 100%; font-weight: bold; border-radius: 5px; }
        
        .navbar { background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--primary); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="font-family: 'Orbitron'; color: var(--primary);">AR SHOP</h2>
        <p class="text-secondary small mb-4">Secure Access Required</p>
        <button class="btn btn-light w-100 py-3 fw-bold rounded-pill" onclick="handleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" class="me-2">
            Login with Google
        </button>
    </div>
</div>

<div id="main-app" style="display:none;">
    <nav class="navbar navbar-dark p-3 sticky-top">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold" href="#">AR <span class="text-primary">PRO</span></a>
            <span class="small text-info" id="user-email"></span>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="home-view">
            <h5 class="mb-4 fw-bold">সার্ভিস ক্যাটাগরি</h5>
            <div class="row g-3">
                <div class="col-6 col-md-3" onclick="openOrder('ff', 'Free Fire Diamond')">
                    <div class="glass-card">
                        <div class="logo-container"><img src="https://logodownload.org/wp-content/uploads/2019/06/free-fire-logo-1.png"></div>
                        <div class="p-3 text-center"><h6>Free Fire</h6></div>
                    </div>
                </div>
                <div class="col-6 col-md-3" onclick="openOrder('fb', 'Facebook Services')">
                    <div class="glass-card">
                        <div class="logo-container"><img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg"></div>
                        <div class="p-3 text-center"><h6>Facebook</h6></div>
                    </div>
                </div>
                <div class="col-6 col-md-3" onclick="openOrder('tk', 'TikTok Services')">
                    <div class="glass-card">
                        <div class="logo-container"><img src="https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg"></div>
                        <div class="p-3 text-center"><h6>TikTok</h6></div>
                    </div>
                </div>
                <div class="col-6 col-md-3" onclick="openOrder('wa', 'WhatsApp Bot')">
                    <div class="glass-card">
                        <div class="logo-container"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"></div>
                        <div class="p-3 text-center"><h6>WhatsApp</h6></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="order-view" style="display:none;" class="mt-4">
            <button class="btn btn-outline-light btn-sm mb-4" onclick="goHome()">← ফিরে যান</button>
            <div class="row">
                <div class="col-md-7">
                    <h3 id="display-title" class="text-primary fw-bold"></h3>
                    <div id="pkg-container" class="mt-4"></div>
                </div>
                <div class="col-md-5">
                    <div class="p-4 bg-dark border border-secondary rounded-4">
                        <input type="text" id="target-id" class="form-control mb-3" placeholder="ID/লিঙ্ক দিন...">
                        <button class="btn btn-primary w-100 py-3 fw-bold" onclick="showGateway()">অর্ডার প্রসেস করুন</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="payment-gateway">
    <div class="modal-box">
        <h5 class="text-danger fw-bold text-center">Secure Payment</h5>
        <hr>
        <p class="small">বিকাশ/নগদ (Personal): <strong>01766 380 931</strong></p>
        <div class="bg-light p-2 mb-3 rounded">Payable: <strong id="pay-amount"></strong></div>
        <input type="text" id="trx-input" class="form-control mb-3" placeholder="ট্রানজেকশন আইডি (TrxID)">
        <button class="btn-pay" onclick="confirmPayment()">CONFIRM PAYMENT</button>
        <button class="btn btn-sm w-100 mt-2 text-secondary" onclick="closeGateway()">Cancel</button>
    </div>
</div>

<div id="invoice-modal">
    <div class="modal-box">
        <h4 class="text-center text-primary fw-bold">RECEIPT</h4>
        <div id="inv-content" class="small mt-3"></div>
        <hr>
        <button class="btn btn-dark w-100" onclick="location.reload()">ডাউনলোড ও শেষ করুন</button>
    </div>
</div>

<script>
    const db = {
        ff: { pkgs: [{n: "115 Diamond", p: "৳85"}, {n: "505 Diamond", p: "৳340"}] },
        fb: { pkgs: [{n: "1K Follower", p: "৳150"}] },
        tk: { pkgs: [{n: "1K Follower", p: "৳120"}] },
        wa: { pkgs: [{n: "Premium Bot", p: "৳500"}] }
    };

    let orderData = { service: "", pkg: "", price: "" };

    function handleLogin() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('user-email').innerText = "atiq.verified@gmail.com";
    }

    function openOrder(id, name) {
        orderData.service = name;
        document.getElementById('display-title').innerText = name;
        const area = document.getElementById('pkg-container');
        area.innerHTML = '';
        db[id].pkgs.forEach(p => {
            const div = document.createElement('div');
            div.className = "p-3 glass-card mb-2 d-flex justify-content-between";
            div.innerHTML = `<span>${p.n}</span><strong>${p.p}</strong>`;
            div.onclick = () => {
                orderData.pkg = p.n;
                orderData.price = p.p;
                document.querySelectorAll('.glass-card').forEach(c => c.style.borderColor = "rgba(255,255,255,0.1)");
                div.style.borderColor = "#7d40ff";
            };
            area.appendChild(div);
        });
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('order-view').style.display = 'block';
    }

    function showGateway() {
        if(!orderData.pkg || !document.getElementById('target-id').value) return alert("তথ্য দিন!");
        document.getElementById('pay-amount').innerText = orderData.price;
        document.getElementById('payment-gateway').style.display = 'flex';
    }

    function closeGateway() { document.getElementById('payment-gateway').style.display = 'none'; }

    function confirmPayment() {
        const trx = document.getElementById('trx-input').value;
        if(trx.length < 8) return alert("সঠিক TrxID দিন!");
        
        document.getElementById('payment-gateway').style.display = 'none';
        document.getElementById('invoice-modal').style.display = 'flex';
        document.getElementById('inv-content').innerHTML = `
            <p>Order ID: #AR${Math.floor(Math.random()*9999)}</p>
            <p>Service: ${orderData.service}</p>
            <p>Price: ${orderData.price}</p>
            <p>TrxID: ${trx}</p>
            <p class="text-success fw-bold">Status: Payment Received</p>
        `;
    }

    function goHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('order-view').style.display = 'none';
    }
</script>
</body>
</html>
