<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR ULTIMATE | MASTER ADMIN PANEL</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --dark: #0a0a0a; --gold: #d4af37; --panel: #1a1a1a; --text: #e0e0e0; --border: #333; }
        body { background: var(--dark); color: var(--text); font-family: 'Hind Siliguri', sans-serif; margin: 0; }

        /* --- FINAL SECURITY GATE --- */
        #gate-screen {
            position: fixed; inset: 0; background: var(--dark);
            z-index: 100000; display: flex; align-items: center; justify-content: center;
        }
        .gate-card {
            background: var(--panel); padding: 45px; border-radius: 30px;
            border: 1px solid var(--gold); width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
        }
        .gate-card h2 { color: var(--gold); font-weight: 800; letter-spacing: 2px; }
        .form-control { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; margin-bottom: 15px; }
        .form-control:focus { background: #000; color: #fff; border-color: var(--gold); box-shadow: none; }
        .btn-gate { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 900; }

        /* --- ADMIN MASTER DASHBOARD --- */
        .master-header { background: var(--panel); border-bottom: 2px solid var(--gold); padding: 15px; }
        .stat-box { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; padding: 25px; text-align: center; }
        .stat-box h3 { color: var(--gold); font-weight: 800; }
        
        .control-panel { background: var(--panel); border-radius: 20px; padding: 30px; margin-top: 30px; border: 1px solid var(--border); }
        .btn-action { background: #222; color: #fff; border: 1px solid var(--border); padding: 15px; border-radius: 12px; width: 100%; transition: 0.3s; }
        .btn-action:hover { border-color: var(--gold); background: #000; }

        /* --- FIREBASE TERMINAL --- */
        .terminal { background: #000; border-radius: 10px; padding: 20px; font-family: 'Courier New', monospace; font-size: 13px; color: #00ff00; height: 180px; overflow-y: auto; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="gate-screen">
    <div class="gate-card">
        <i class="fas fa-shield-halved fa-4x mb-4" style="color: var(--gold);"></i>
        <h2>ADMIN CORE</h2>
        <p class="small text-muted mb-4">প্রবেশের জন্য আপনার তথ্য দিন</p>
        <input type="text" id="master-user" class="form-control text-center" placeholder="অ্যাডমিন নাম (যেমন: Atique)">
        <input type="password" id="master-pass" class="form-control text-center" placeholder="ভার্চুয়াল পাসওয়ার্ড">
        <button class="btn-gate" onclick="Master.auth()">UNLOCK SYSTEM</button>
        <p id="fail-msg" class="text-danger mt-3 small" style="display:none;">Access Denied! ভুল পাসওয়ার্ড।</p>
    </div>
</div>

<div id="master-hub" style="display:none;">
    <header class="master-header">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="m-0 fw-bold"><i class="fas fa-crown me-2" style="color: var(--gold);"></i> AR ULTIMATE HUB</h4>
            <div class="d-flex align-items-center">
                <span class="me-3 small text-success"><i class="fas fa-signal me-1"></i> Firebase Live</span>
                <button class="btn btn-sm btn-outline-warning" onclick="location.reload()">Secure Logout</button>
            </div>
        </div>
    </header>

    <div class="container mt-4">
        <div class="row g-3">
            <div class="col-md-3">
                <div class="stat-box">
                    <small>Total Users</small>
                    <h3 id="u-count">1,580</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-box">
                    <small>Wallet Balance</small>
                    <h3 id="w-total">৳ ৪২,০০০</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-box">
                    <small>Orders Pending</small>
                    <h3 class="text-warning">১২</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-box">
                    <small>Server Status</small>
                    <h3 class="text-success">Stable</h3>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <h5 class="fw-bold mb-4 text-white">System Controls</h5>
            <div class="row g-3">
                <div class="col-md-3"><button class="btn-action" onclick="Master.run('User Management')"><i class="fas fa-users-cog d-block mb-2"></i> ইউজার কন্ট্রোল</button></div>
                <div class="col-md-3"><button class="btn-action" onclick="Master.run('Payment Verification')"><i class="fas fa-check-double d-block mb-2"></i> পেমেন্ট ভেরিফাই</button></div>
                <div class="col-md-3"><button class="btn-action" onclick="Master.run('Database Backup')"><i class="fas fa-database d-block mb-2"></i> ডাটাবেজ ব্যাকআপ</button></div>
                <div class="col-md-3"><button class="btn-action" onclick="Master.run('Global Notice')"><i class="fas fa-broadcast-tower d-block mb-2"></i> গ্লোবাল নোটিশ</button></div>
            </div>
        </div>

        <div class="mt-4 mb-5">
            <h6 class="small fw-bold text-muted mb-2">Firebase Data Stream:</h6>
            <div class="terminal" id="term">
                [SYSTEM] Final Security Check...<br>
                [AUTH] Waiting for master key...<br>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * AR MASTER v24.0 (FINAL VERSION)
 * ওস্তাদ, এখানে আপনার দেওয়া সব রুলস একদম ফাইনাল।
 */

const CONFIG = {
    user: "Atique",
    pass: "83৮৯৮০৬৩ @#" // আপনার সেই স্পেসিফিক পাসওয়ার্ড
};

const Master = {
    auth: () => {
        const u = document.getElementById('master-user').value;
        const p = document.getElementById('master-pass').value;
        const fail = document.getElementById('fail-msg');

        if(u === CONFIG.user && p === CONFIG.pass) {
            document.getElementById('gate-screen').style.display = 'none';
            document.getElementById('master-hub').style.display = 'block';
            Master.log("Master Session Started for " + u);
            Master.log("Firebase Database Linked Successfully.");
        } else {
            fail.style.display = 'block';
            Master.log("CRITICAL: Unauthorized Access Attempt!");
            setTimeout(() => fail.style.display = 'none', 3000);
        }
    },
    log: (msg) => {
        const t = document.getElementById('term');
        const time = new Date().toLocaleTimeString();
        t.innerHTML += `> [${time}] ${msg}<br>`;
        t.scrollTop = t.scrollHeight;
    },
    run: (task) => {
        Master.log("Action Triggered: " + task);
        alert(task + " মোড চালু হয়েছে। (অ্যাডমিন অনলি)");
    }
};

// Firebase Connection Logic (আপনার ড্যাশবোর্ডে ডাটা আনতে এটি কাজ করবে)
/* এখানে আপনার Firebase SDK কনফিগ বসালে এই ড্যাশবোর্ডটি লাইভ হয়ে যাবে।
*/
</script>
</body>
</html>
