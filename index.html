<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR ONLINE SHOPPING CONNECTED</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{background:#050816;color:white;}
.card{background:rgba(255,255,255,0.06);backdrop-filter:blur(10px);padding:15px;border-radius:15px;}
.hide{display:none;}
</style>
</head>

<body>

<h1 class="text-center text-green-400 text-2xl font-bold mt-4">AR ONLINE SHOPPING</h1>

<!-- LOGIN -->
<div class="card w-80 mx-auto mt-5">

  <h2 class="text-xl">Login</h2>

  <input id="email" class="w-full p-2 text-black mt-2 rounded" placeholder="Email">
  <input id="pass" class="w-full p-2 text-black mt-2 rounded" placeholder="Password">

  <button onclick="login()" class="bg-green-500 w-full mt-3 p-2 rounded">Login</button>

</div>

<!-- ORDER -->
<div class="card w-80 mx-auto mt-5">

  <h2>Order Free Fire Diamond</h2>

  <input id="uid" class="w-full p-2 text-black mt-2 rounded" placeholder="UID">

  <select id="price" class="w-full p-2 text-black mt-2 rounded">
    <option value="80">100 Diamond - ৳80</option>
    <option value="240">310 Diamond - ৳240</option>
  </select>

  <button onclick="order()" class="bg-blue-500 w-full mt-3 p-2 rounded">Place Order</button>

</div>

<!-- HISTORY -->
<div class="card w-80 mx-auto mt-5">
  <h2>History</h2>
  <button onclick="loadHistory()" class="bg-purple-500 w-full mt-2 p-2 rounded">Load History</button>

  <div id="history"></div>
</div>

<script>

/* ================= YOUR FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyC5i7SOEJeFO8NsO7VbIU63rfRBrGwBWQY",
  authDomain: "online-shop-ar.firebaseapp.com",
  projectId: "online-shop-ar",
  storageBucket: "online-shop-ar.firebasestorage.app",
  messagingSenderId: "913434308973",
  appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64",
  measurementId: "G-T20TRS2F59"
};

/* INIT FIREBASE */
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
  let email=document.getElementById("email").value;
  let pass=document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email,pass)
  .then(u=>{
    alert("Login Success: "+u.user.email);
  })
  .catch(e=>alert(e.message));
}

/* ORDER */
function order(){
  let uid=document.getElementById("uid").value;
  let price=document.getElementById("price").value;

  db.collection("orders").add({
    uid:uid,
    price:price,
    product:"Free Fire Diamond",
    status:"pending",
    time:Date.now()
  });

  alert("Order placed successfully!");
}

/* HISTORY */
function loadHistory(){

  let box=document.getElementById("history");
  box.innerHTML="Loading...";

  db.collection("orders").get()
  .then(snap=>{
    let html="";
    snap.forEach(doc=>{
      let d=doc.data();
      html+=`<div class='card mt-2'>${d.product} - UID:${d.uid} - ৳${d.price}</div>`;
    });

    box.innerHTML=html;
  });

}

</script>

</body>
</html>
