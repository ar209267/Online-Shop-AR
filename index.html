<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop AR - Members Area</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #0084ff; --dark: #111; --gray: #f4f7f6; --orange: #ff8c00; }
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--gray); }
        nav { background: var(--dark); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; height: 60px; box-sizing: border-box; }
        .logo { font-size: 20px; font-weight: bold; }
        .logo span { color: var(--orange); }
        .top-profile { display: flex; align-items: center; gap: 15px; }
        .top-wallet { background: #222; border: 1px solid var(--orange); padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--orange); font-size: 14px; }
        .top-wallet button { background: none; border: none; color: white; cursor: pointer; font-size: 16px; padding: 0; }
        .user-info-box { display: flex; align-items: center; gap: 10px; cursor: pointer; position: relative; }
        .user-info-box img { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--orange); }
        .dropdown { display: none; position: absolute; top: 45px; right: 0; background: white; border-radius: 8px; width: 150px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .dropdown a { display: block; padding: 12px; color: #333; text-decoration: none; font-size: 14px; border-bottom: 1px solid #eee; }
        .full-screen-center { height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        .google-btn { background: #4285F4; color: white; border: none; padding: 15px 25px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .container { max-width: 1200px; margin: auto; padding: 30px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .icon-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 15px; color: white; font-size: 22px; }
        .fb-bg { background: #1877F2; } .yt-bg { background: #FF0000; } .ff-bg { background: #ff8c00; } .tt-bg { background: #000; }
        .package-select { width: 100%; padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px solid #ddd; }
        .buy-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; }
        .modal-content { background: white; width: 90%; max-width: 380px; margin: 80px auto; padding: 25px; border-radius: 20px; text-align: center; position: relative; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .confirm-btn { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Online Shop <span>AR</span></div>
        <div id="nav-user-area" style="display:none;">
            <div class="top-profile">
                <div class="top-wallet">
                    <span id="nav-balance">৳ ০.০০</span>
                    <button onclick="alert('Admin-কে TrxID পাঠিয়ে ব্যালেন্স অ্যাড করুন।')"><i class="fas fa-plus-circle"></i></button>
                </div>
                <div class="user-info-box" onclick="toggleMenu()">
                    <span id="user-display-name">User</span>
                    <img src="https://www.w3schools.com/howto/img_avatar.png">
                    <div id="profile-dropdown" class="dropdown">
                        <a href="#" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> লগআউট</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div id="login-screen" class="full-screen-center">
        <div class="login-card">
            <h1>Online Shop <span>AR</span></h1>
            <p>আপনার একাউন্টে লগইন করুন</p>
            <button onclick="loginProcess()" class="google-btn">
                <i class="fab fa-google"></i> Google দিয়ে লগইন করুন
            </button>
        </div>
    </div>

    <div id="main-content" class="container" style="display:none;">
        <h2 id="welcome-msg">স্বাগতম, Atiqur Rahman</h2>
        <div class="grid">
            <div class="card">
                <div class="icon-circle fb-bg"><i class="fab fa-facebook-f"></i></div>
                <h3>Facebook Service</h3>
                <select id="fb-pack" class="package-select">
                    <option value="5K Followers - 130 TK">5K Followers - 130 TK</option>
                    <option value="Post Boost (1K Like) - 150 TK">Post Boost (1K Like) - 150 TK</option>
                    <option value="Meta Verified Payment - 1200 TK">Meta Verified Payment - 1200 TK</option>
                </select>
                <button class="buy-btn" onclick="openOrder('Facebook')">অর্ডার করুন</button>
            </div>
            <div class="card">
                <div class="icon-circle yt-bg"><i class="fab fa-youtube"></i></div>
                <h3>YouTube Growth</h3>
                <select id="yt-pack" class="package-select">
                    <option value="1K Subs - 1200 TK">1K Subs - 1200 TK</option>
                </select>
                <button class="buy-btn" onclick="openOrder('YouTube')">অর্ডার করুন</button>
            </div>
            <div class="card">
                <div class="icon-circle ff-bg"><i class="fas fa-gem"></i></div>
                <h3>FF Diamond</h3>
                <select id="ff-pack" class="package-select">
                    <option value="115 Diamond - 85 TK">115 Diamond - 85 TK</option>
                </select>
                <button class="buy-btn" onclick="openOrder('Free Fire')">টপ-আপ করুন</button>
            </div>
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h3>অর্ডার কনফার্ম করুন</h3>
            <input type="text" id="targetLink" placeholder="আইডি বা লিংক দিন">
            <input type="text" id="trxId" placeholder="ট্রানজেকশন আইডি (TrxID)">
            <button class="confirm-btn" onclick="submitOrder()">কনফার্ম করুন</button>
            <button onclick="closeModal()" style="background:none; border:none; margin-top:10px; cursor:pointer;">বন্ধ করুন</button>
        </div>
    </div>

    <script>
        // আপনার ফায়ারবেস কনফিগ (স্ক্রিনশট থেকে নেওয়া)
        const firebaseConfig = {
            apiKey: "AIzaSyC5i7SOEJeFO8NsO7VbIU63rfRBrGwBWQY",
            authDomain: "online-shop-ar.firebaseapp.com",
            projectId: "online-shop-ar",
            storageBucket: "online-shop-ar.appspot.com",
            messagingSenderId: "913434308973",
            appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64",
            measurementId: "G-T20TRS2F59"
        };

        // ফায়ারবেস ইনিশিয়ালাইজ
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function loginProcess() {
            // ডিজাইন পরিবর্তন
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('nav-user-area').style.display = 'block';

            // ডাটাবেজ থেকে ব্যালেন্স আনা
            const userId = "atiqur_123"; // আপাতত একটি আইডি
            database.ref('users/' + userId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    document.getElementById('nav-balance').innerText = "৳ " + data.balance.toFixed(2);
                } else {
                    // প্রথমবার লগইন করলে ০.০০ সেট হবে
                    database.ref('users/' + userId).set({
                        name: "Atiqur Rahman",
                        balance: 0.00
                    });
                }
            });
        }

        function openOrder(name) { document.getElementById('paymentModal').style.display = 'block'; }
        function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }
        function toggleMenu() {
            let m = document.getElementById('profile-dropdown');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }
        function submitOrder() {
            alert("অর্ডার রিসিভ হয়েছে! ২-৫ মিনিটের মধ্যে চেক করে কাজ শুরু হবে।");
            closeModal();
        }
    </script>
</body>
</html>
