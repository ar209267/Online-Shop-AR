<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABR Panel - Fiverr Server Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #fff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        
        .login-box { background: #161a1e; padding: 40px; border-radius: 20px; border: 1px solid #1dbf73; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(29, 191, 115, 0.1); }
        
        .fiverr-logo { color: #1dbf73; font-size: 50px; font-weight: 900; margin-bottom: 10px; }
        .server-status { font-size: 12px; color: #1dbf73; background: rgba(29, 191, 115, 0.1); padding: 5px 15px; border-radius: 50px; display: inline-block; margin-bottom: 25px; }
        
        .form-control { background: #0b0e11; border: 1px solid #2d3436; color: white; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .form-control:focus { background: #0b0e11; color: white; border-color: #1dbf73; box-shadow: none; }
        
        .btn-login { background: #1dbf73; color: white; font-weight: bold; padding: 12px; width: 100%; border: none; border-radius: 10px; transition: 0.3s; }
        .btn-login:hover { background: #19a463; transform: translateY(-2px); }
        
        .footer-text { font-size: 12px; color: #636e72; margin-top: 20px; }
        .highlight { color: #ff8c00; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-box shadow-lg">
    <div class="fiverr-logo">fiverr<span style="color:white;">.</span></div>
    <div class="server-status"><i class="fas fa-circle"></i> Fiverr Server Online</div>
    
    <h4 class="mb-4">সার্ভার লগইন</h4>
    
    <form id="loginForm">
        <input type="text" id="username" class="form-control" placeholder="আপনার ইউজারনেম" required>
        <input type="password" id="password" class="form-control" placeholder="পাসওয়ার্ড" required>
        
        <button type="submit" class="btn-login">LOGIN VIA FIVERR SERVER</button>
    </form>

    <div class="footer-text">
        <p>পেমেন্ট ও অর্ডার ভেরিফিকেশন: <br><span class="highlight">বিকাশ/নগদ: ০১৭৬৬৩৮০৯৩১</span></p>
        <i class="fas fa-shield-alt"></i> Secured by Firebase & Fiverr SSL
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyC5i7SOEJeF08NsO7VbIU63r...", 
    authDomain: "online-shop-ar.firebaseapp.com",
    projectId: "online-shop-ar",
    storageBucket: "online-shop-ar.firebasestorage.app",
    messagingSenderId: "913434308973",
    appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64",
    measurementId: "G-T20TRS2F59"
  };

  const app = initializeApp(firebaseConfig);

  // লগইন হ্যান্ডলার
  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    // সফল লগইন হলে ড্যাশবোর্ডে নিয়ে যাবে
    alert("লগইন সফল! ফাইভার সার্ভারের সাথে কানেক্ট হচ্ছে...");
    window.location.href = "dashboard.html"; // আপনার ড্যাশবোর্ড ফাইলের নাম
  });
</script>

</body>
</html>
