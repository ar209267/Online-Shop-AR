<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR ULTIMATE | Google Authenticated OS</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --white: #ffffff; --black: #000000; --gray: #111111; --border: rgba(255,255,255,0.15); }
        body { background-color: var(--black); color: var(--white); font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }

        /* --- 1. GOOGLE LOGIN LAYER --- */
        #auth-layer {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
        }
        .auth-card {
            background: var(--gray); padding: 50px; border-radius: 40px;
            border: 1px solid var(--white); text-align: center; max-width: 420px; width: 90%;
        }

        /* --- 2. LOGGED IN HUD --- */
        .master-nav { background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--border); padding: 15px 0; }
        .profile-hud {
            background: var(--gray); border: 1px solid var(--border);
            border-radius: 20px; padding: 15px 25px; display: flex; 
            justify-content: space-between; align-items: center; margin-top: 20px;
        }
        .user-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; }
        .balance-box { background: var(--white); color: var(--black); padding: 5px 20px; border-radius: 50px; font-weight: 900; font-size: 20px; }

        /* --- 3. UI COMPONENTS --- */
        .cat-tab { background: var(--gray); border: 1px solid var(--border); padding: 10px 25px; border-radius: 50px; cursor: pointer; white-space: nowrap; }
        .cat-tab.active { background: var(--white); color: var(--black); font-weight: bold; }
        .service-card { background: var(--gray); border: 1px solid var(--border); border-radius: 25px; transition: 0.4s; overflow: hidden; height: 100%; }
        .service-card:hover { transform: translateY(-10px); border-color: var(--white); }
        .img-wrap { height: 140px; background: #080808; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* --- 4. OVERLAYS --- */
        .full-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal-box { background: #fff; color: #000; border-radius: 30px; width: 100%; max-width: 420px; padding: 35px; }
        .btn-black { background: #000; color: #fff; border-radius: 50px; padding: 12px; font-weight: bold; width: 100%; border: none; }
    </style>
</head>
<body>

<div id="auth-layer">
    <div class="auth-card shadow-lg">
        <i class="fab fa-google fa-4x mb-4 text-white"></i>
        <h2 class="fw-900 mb-2">AR ULTIMATE HUB</h2>
        <p class="text-secondary small mb-5">সুরক্ষার জন্য আপনার জিমেইল দিয়ে লগইন করুন</p>
        
        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin d-flex justify-content-center" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
        
        <button class="btn btn-outline-light btn-sm mt-4 rounded-pill" onclick="Core.mockLogin()">Quick Login (Demo)</button>
    </div>
</div>

<div id="main-hub" style="display:none;">
    <nav class="master-nav sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="h4 m-0 fw-900">AR <span class="text-secondary">PRO</span></div>
            <button class="btn btn-sm btn-outline-danger rounded-pill" onclick="location.reload()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="profile-hud">
            <div class="d-flex align-items-center">
                <img id="u-photo" src="" class="user-img me-3" alt="User">
                <div>
                    <h6 id="u-name" class="m-0 fw-bold">User Name</h6>
                    <small id="u-email" class="text-secondary">email@gmail.com</small>
                </div>
            </div>
            <div class="text-end">
                <div class="balance-box mb-2">৳ <span id="user-bal">0.00</span></div>
                <button class="btn btn-outline-light btn-sm rounded-pill px-3" onclick="Wallet.openAdd()">+ Add Money</button>
            </div>
        </div>

        <div class="d-flex gap-2 mt-5 overflow-auto pb-3" id="cat-scroll">
            <div class="cat-tab active" onclick="Core.filter('all')">সব সার্ভিস</div>
            <div class="cat-tab" onclick="Core.filter('game')">Gaming</div>
            <div class="cat-tab" onclick="Core.filter('social')">Social SMM</div>
        </div>

        <div class="row g-4 mt-1" id="service-grid"></div>

        <div class="mt-5 p-4 border border-secondary rounded-4">
            <h6 class="text-secondary mb-3 fw-bold">লেনদেন হিস্ট্রি</h6>
            <div id="db-logs" class="small"></div>
        </div>
    </div>
</div>

<div id="wallet-modal" class="full-overlay">
    <div class="modal-box">
        <h4 class="fw-900 text-center mb-4">Add Money</h4>
        <div class="p-3 bg-light rounded-4 mb-4 text-center">
            বিকাশ/নগদ (Personal): <strong>01766 380 931</strong>
        </div>
        <input type="number" id="add-amt" class="form-control mb-2 py-3" placeholder="টাকার পরিমাণ">
        <input type="text" id="add-trx" class="form-control mb-4 py-3" placeholder="Transaction ID (TrxID)">
        <button class="btn-black" onclick="Wallet.confirm()">Confirm Deposit</button>
        <button class="btn btn-link w-100 text-secondary mt-2 text-decoration-none" onclick="Wallet.close()">Cancel</button>
    </div>
</div>

<script>
/**
 * AR CORE v14.0 - Google Authentication
 */

function handleCredentialResponse(response) {
    // এখানে গুগল থেকে ইউজারের ডাটা পাওয়া যাবে
    const responsePayload = parseJwt(response.credential);
    console.log("User Info: ", responsePayload);
    
    // ইউজার ইনফো সেট করা
    document.getElementById('u-name').innerText = responsePayload.name;
    document.getElementById('u-email').innerText = responsePayload.email;
    document.getElementById('u-photo').src = responsePayload.picture;
    
    // মেইন হাব ওপেন করা
    document.getElementById('auth-layer').style.display = 'none';
    document.getElementById('main-hub').style.display = 'block';
    Core.init();
}

function parseJwt(token) {
    var base64Url = token.split('.')[1];
    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
}

const DATA = [
    { id:1, c:'game', n:'Free Fire Diamond', i:'https://logodownload.org/wp-content/uploads/2019/06/free-fire-logo-1.png', p:[{n:'115💎',p:85},{n:'505💎',p:340}] },
    { id:2, c:'social', n:'Facebook Follower', i:'https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg', p:[{n:'1K',p:150}] }
];

let state = { balance: 0 };

const Core = {
    mockLogin: () => {
        // টেস্ট করার জন্য ডেমো লগইন বাটন
        document.getElementById('u-name').innerText = "Atique User";
        document.getElementById('u-email').innerText = "atiq@gmail.com";
        document.getElementById('u-photo').src = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
        document.getElementById('auth-layer').style.display = 'none';
        document.getElementById('main-hub').style.display = 'block';
        Core.init();
    },
    init: () => {
        state.balance = parseFloat(localStorage.getItem('ar_balance')) || 0;
        document.getElementById('user-bal').innerText = state.balance.toFixed(2);
        Core.render('all');
        Core.loadLogs();
    },
    render: (cat) => {
        const grid = document.getElementById('service-grid');
        grid.innerHTML = '';
        const list = cat === 'all' ? DATA : DATA.filter(x => x.c === cat);
        list.forEach(s => {
            grid.innerHTML += `
            <div class="col-6 col-md-3">
                <div class="service-card" onclick="alert('পেমেন্ট লজিক লোড হচ্ছে...')">
                    <div class="img-wrap"><img src="${s.i}"></div>
                    <div class="p-3 text-center">
                        <small class="text-secondary fw-bold text-uppercase">${s.c}</small>
                        <h6 class="m-0 fw-bold mt-1 text-white">${s.n}</h6>
                    </div>
                </div>
            </div>`;
        });
    },
    loadLogs: () => {
        const logs = JSON.parse(localStorage.getItem('ar_master_logs')) || [];
        document.getElementById('db-logs').innerHTML = logs.map(l => `<div class="mb-2 border-bottom border-secondary pb-2">${l.time}: ${l.service} - Approved</div>`).join('') || "No logs.";
    }
};

const Wallet = {
    openAdd: () => { document.getElementById('wallet-modal').style.display = 'flex'; },
    close: () => { document.getElementById('wallet-modal').style.display = 'none'; },
    confirm: () => {
        const amt = parseFloat(document.getElementById('add-amt').value);
        if(amt > 0) {
            state.balance += amt;
            localStorage.setItem('ar_balance', state.balance);
            document.getElementById('user-bal').innerText = state.balance.toFixed(2);
            alert("টাকা অ্যাড হয়েছে!");
            Wallet.close();
        }
    }
};
</script>
</body>
</html>
