<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Online Shop | V11.11 Nexus Prime</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --ar-cyan: #00f2fe;
            --ar-gold: #FFD700;
            --ar-dark: #010409;
            --glass: rgba(13, 17, 23, 0.95);
        }

        body {
            background-color: var(--ar-dark);
            color: #e6edf3;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            background: radial-gradient(circle at 50% 50%, #0d1117 0%, #010409 100%);
        }

        .orbitron { font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }

        /* [LOGIN SECTION] */
        #authSection {
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .login-card {
            background: var(--glass);
            padding: 40px; border-radius: 35px;
            border: 1px solid var(--ar-cyan);
            width: 100%; max-width: 380px;
            text-align: center; box-shadow: 0 0 40px rgba(0, 242, 254, 0.1);
        }

        .brand-logo {
            width: 120px; height: 120px; border-radius: 25px;
            border: 2px solid var(--ar-gold); margin-bottom: 25px;
            box-shadow: 0 0 20px var(--ar-gold);
        }

        /* [DASHBOARD SECTION] */
        #dashboard { display: none; padding: 15px; }

        .nexus-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px; padding: 20px;
            border: 1px solid #30363d; margin-bottom: 20px;
        }

        .service-card {
            background: var(--glass); border-radius: 25px;
            padding: 20px; border: 1px solid #30363d;
            transition: 0.4s; text-align: center; position: relative;
        }

        .service-card:hover {
            border-color: var(--ar-cyan); transform: translateY(-8px);
        }

        .price-tag {
            background: var(--ar-cyan); color: #000;
            padding: 2px 10px; border-radius: 8px;
            font-weight: bold; font-size: 11px;
            position: absolute; top: 15px; right: 15px;
        }

        .btn-ar {
            background: var(--ar-cyan); color: #000; font-weight: bold;
            border: none; border-radius: 12px; padding: 10px; width: 100%;
            margin-top: 15px;
        }

        .history-item {
            background: #0d1117; border-radius: 15px; padding: 15px;
            margin-bottom: 10px; border-left: 5px solid var(--ar-cyan);
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<div id="authSection">
    <div class="login-card">
        <img src="ar-logo.png" class="brand-logo" alt="AR LOGO">
        <h3 class="orbitron fw-bold">SYSTEM V11.11</h3>
        <p class="text-secondary small mb-4">ডিভাইস এবং জিমেইল ভেরিফিকেশন</p>
        
        <input type="email" id="uEmail" class="form-control bg-dark text-white border-secondary mb-3" placeholder="জিমেইল এড্রেস">
        <input type="password" id="uPass" class="form-control bg-dark text-white border-secondary mb-4" placeholder="মাস্টার পাসওয়ার্ড">
        
        <button class="btn btn-ar" onclick="secureLogin()">সিস্টেম আনলক করুন</button>
    </div>
</div>

<div id="dashboard">
    <div class="container">
        <div class="nexus-box d-flex justify-content-between align-items-center mt-3">
            <div class="d-flex align-items-center">
                <img src="ar-logo.png" style="width: 50px; border-radius: 10px; margin-right: 15px; border: 1px solid var(--ar-gold);">
                <div>
                    <h4 class="orbitron mb-0">AR SHOP</h4>
                    <span id="userDisplay" class="small text-info"></span>
                </div>
            </div>
            <div class="text-end">
                <span class="text-secondary small">BALANCE</span>
                <h4 class="text-success orbitron mb-0">৳ ৯৫০.০০</h4>
            </div>
        </div>

        <marquee class="text-warning small mb-4">🔥 V11.11 আপডেট: জিমেইল লক সিস্টেম সচল করা হয়েছে। পেমেন্ট করার ৫ মিনিটে ডেলিভারি।</marquee>

        <h5 class="orbitron mb-3 text-info">PREMIUM SERVICES</h5>
        <div class="row g-3">
            <div class="col-6 col-md-3">
                <div class="service-card">
                    <span class="price-tag">৳৮৫</span>
                    <i class="fas fa-gem fs-2 text-info mb-2"></i>
                    <h6 class="fw-bold">FF Diamond</h6>
                    <button class="btn-ar btn-sm" onclick="checkout('Free Fire')">অর্ডার</button>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="service-card">
                    <span class="price-tag">৳১৩০</span>
                    <i class="fab fa-facebook fs-2 text-primary mb-2"></i>
                    <h6 class="fw-bold">FB Follower</h6>
                    <button class="btn-ar btn-sm" onclick="checkout('FB Follower')">অর্ডার</button>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="service-card">
                    <span class="price-tag">৳৯৫</span>
                    <i class="fab fa-tiktok fs-2 text-light mb-2"></i>
                    <h6 class="fw-bold">TikTok Views</h6>
                    <button class="btn-ar btn-sm" onclick="checkout('TikTok')">অর্ডার</button>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="service-card">
                    <span class="price-tag">৳৫৫০</span>
                    <i class="fab fa-youtube fs-2 text-danger mb-2"></i>
                    <h6 class="fw-bold">YT Watchtime</h6>
                    <button class="btn-ar btn-sm" onclick="checkout('YouTube')">অর্ডার</button>
                </div>
            </div>
        </div>

        <div class="mt-5 mb-5">
            <h5 class="orbitron mb-3 text-warning">সাম্প্রতিক অর্ডার হিস্ট্রি</h5>
            <div id="historyList">
                <div class="history-item">
                    <div><span class="fw-bold d-block">#AR-1102</span><small class="text-secondary">সিস্টেম চেকআপ</small></div>
                    <span class="badge bg-success">Active</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ১. পারমানেন্ট জিমেইল ও পাসওয়ার্ড লক (Strict Logic)
    function secureLogin() {
        const mail = document.getElementById('uEmail').value.trim().toLowerCase();
        const pass = document.getElementById('uPass').value;

        if(!mail || !pass) {
            Swal.fire('ভুল!', 'জিমেইল এবং পাসওয়ার্ড দুইটাই দিন।', 'error');
            return;
        }

        const savedMail = localStorage.getItem('ar_locked_mail');
        const savedPass = localStorage.getItem('ar_locked_pass');

        if(!savedMail) {
            // প্রথমবার রেজিস্ট্রেশন - ডাটা লক করা হলো
            localStorage.setItem('ar_locked_mail', mail);
            localStorage.setItem('ar_locked_pass', pass);
            launchDashboard(mail);
        } else {
            // পরবর্তী সময়ে জিমেইল এবং পাসওয়ার্ড দুইটাই চেক করা হবে
            if(mail === savedMail && pass === savedPass) {
                launchDashboard(mail);
            } else if(mail !== savedMail) {
                Swal.fire('এক্সেস ডিনাইড!', 'এই ডিভাইসে শুধুমাত্র '+ savedMail +' অনুমোদিত।', 'warning');
            } else {
                Swal.fire('ভুল পাসওয়ার্ড!', 'সঠিক পাসওয়ার্ড দিয়ে সিস্টেম আনলক করুন।', 'error');
            }
        }
    }

    function launchDashboard(mail) {
        document.getElementById('authSection').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userDisplay').innerText = "ইউজার: " + mail;
    }

    // ২. পেমেন্ট গেটওয়ে ও অর্ডার লজিক
    function checkout(service) {
        const oid = "AR-" + Math.floor(Math.random() * 99999);
        Swal.fire({
            title: 'পেমেন্ট গেটওয়ে',
            html: `
                <div class="text-start" style="color:#fff">
                    <p class="small text-info">অর্ডার আইডি: ${oid}</p>
                    <label class="small">১. প্লেয়ার আইডি বা লিঙ্ক দিন:</label>
                    <input id="target" class="swal2-input bg-dark text-white border-secondary" placeholder="ID/Link">
                    <label class="small mt-2">২. বিকাশ/নগদ TrxID দিন (01XXXXXXX):</label>
                    <input id="trx" class="swal2-input bg-dark text-white border-secondary" placeholder="Transaction ID">
                </div>
            `,
            background: '#0d1117',
            confirmButtonText: 'অর্ডার জমা দিন',
            confirmButtonColor: '#00f2fe',
            showCancelButton: true
        }).then((res) => {
            if(res.isConfirmed) {
                const trx = document.getElementById('trx').value;
                if(trx.length < 8) {
                    Swal.fire('ব্যর্থ!', 'সঠিক ট্রানজেকশন আইডি দিন।', 'error');
                } else {
                    addHistory(oid, service);
                    Swal.fire('সফল!', 'আপনার অর্ডারটি ভেরিফাই হচ্ছে। ৫ মিনিটে ডেলিভারি পাবেন।', 'success');
                }
            }
        });
    }

    function addHistory(id, name) {
        const list = document.getElementById('historyList');
        list.innerHTML = `
            <div class="history-item animate__animated animate__fadeIn">
                <div><span class="fw-bold d-block">#${id}</span><small class="text-secondary">${name}</small></div>
                <span class="badge bg-warning text-dark">Pending</span>
            </div>
        ` + list.innerHTML;
    }

    // অটো লগইন চেক
    window.onload = () => {
        const mail = localStorage.getItem('ar_locked_mail');
        if(mail) launchDashboard(mail);
    }
</script>
</body>
</html>
