<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq SMM V12 - Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #f1c40f; --bg: #05080d; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        .box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; margin: 50px auto; max-width: 400px; border: 1px solid #333; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { width: 90%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #dashboard { display:none; padding: 20px; }
        .app-card { background: #111; padding: 20px; border-radius: 15px; margin: 10px; border: 1px solid #222; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="box">
        <h2 style="color:var(--primary)">ATIQUI LOGIN</h2>
        <input type="email" id="email" placeholder="example@gmail.com">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p id="msg" style="color:red; font-size:12px"></p>
    </div>
</div>

<div id="dashboard">
    <h2 id="user-welcome">স্বাগতম!</h2>
    <div class="app-card" onclick="placeOrder('Facebook Followers', 130)">
        <b>Facebook Followers</b> <br> ৳১৩০
    </div>
    <div class="app-card" onclick="placeOrder('FF Diamond', 80)">
        <b>Free Fire Diamond</b> <br> ৳৮০
    </div>
</div>

<script>
    // তোমার ফায়ারবেস কনসোল থেকে এই সেটিংসগুলো পরিবর্তন করে নিও
    const firebaseConfig = {
        databaseURL: "https://online-shop-ar-default-rtdb.firebaseio.com" 
    };
    
    // ফায়ারবেস ইনিশিয়ালাইজ চেক
    try {
        firebase.initializeApp(firebaseConfig);
        var database = firebase.database();
        console.log("Firebase Connected!");
    } catch (e) {
        alert("Firebase লোড হতে সমস্যা হচ্ছে। ইন্টারনেট চেক করো।");
    }

    function handleLogin() {
        const emailInput = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value;
        const msg = document.getElementById('msg');

        if(!emailInput.includes('@gmail.com')) {
            msg.innerText = "সঠিক জিমেইল দিন!"; return;
        }

        const emailKey = emailInput.replace(/\./g, ',');

        database.ref('users/' + emailKey).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                if (snapshot.val().password === pass) {
                    showApp(emailInput);
                } else {
                    msg.innerText = "ভুল পাসওয়ার্ড!";
                }
            } else {
                database.ref('users/' + emailKey).set({ password: pass });
                showApp(emailInput);
            }
        }).catch(err => {
            alert("ডাটাবেস কানেকশন এরর! রুলস চেক করো।");
            console.log(err);
        });
    }

    function showApp(email) {
        window.userEmail = email;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('user-welcome').innerText = "স্বাগতম, " + email.split('@')[0];
    }

    function placeOrder(service, price) {
        const orderId = Date.now();
        database.ref('orders/' + orderId).set({
            user: window.userEmail,
            service: service,
            price: price,
            time: new Date().toLocaleString()
        }).then(() => {
            alert("অর্ডার সার্ভারে সেভ হয়েছে!");
        });
    }
</script>
</body>
</html>
