<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq Master - Enterprise V6.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css"> <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
    <div id="preloader"><div class="ring"></div></div>

    <div id="auth-area" class="auth-screen">
        <div class="auth-card" id="login-panel">
            <h1>ATIQ MASTER</h1>
            <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" class="input-box" placeholder="Email"></div>
            <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="pass" class="input-box" placeholder="Password"></div>
            <button class="btn-main" onclick="handleLogin()">Login</button>
            <p onclick="toggleAuth(true)">নতুন একাউন্ট খুলুন</p>
        </div>
    </div>

    <div id="app-ui" style="display:none;">
        <div class="header">
            <b>ATIQ MASTER</b>
            <button onclick="firebase.auth().signOut()"><i class="fas fa-power-off"></i></button>
        </div>
        <div class="balance-card">
            <p>বর্তমান ব্যালেন্স</p>
            <h1 id="bal-val">৳ ০.০০</h1>
        </div>
        </div>

    <script src="script.js"></script> </body>
</html>
