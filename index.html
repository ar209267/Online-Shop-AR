<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq SMM Master V12 - Live Server</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --primary: #f1c40f; --bg: #05080d; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; transition: 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; overflow-x: hidden; }

        /* Auth/Login Screen */
        #login-screen { position: fixed; inset: 0; background: #05080d; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 35px 25px; border-radius: 25px; width: 100%; max-width: 400px; backdrop-filter: blur(15px); text-align: center; }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: rgba(0,0,0,0.5); color: #fff; outline: none; }
        .login-btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--primary); color: #000; font-weight: bold; border: none; cursor: pointer; }

        /* Dashboard Styles */
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .header { background: var(--glass); padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        
        .app-item { background: var(--glass); border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 12px; overflow: hidden; }
        .app-header { display: flex; align-items: center; padding: 18px; cursor: pointer; }
        .app-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-right: 15px; }
        
        .bg-fb { background: #1877f2; }
        .bg-yt { background: #ff0000; }
        .bg-game { background: #ff8c00; }

        .service-list { display: none; padding: 5px 15px 15px; background: rgba(0,0,0,0.2); }
        .app-item.open .service-list { display: block; animation: slideDown 0.3s ease; }
        .service-row { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; cursor: pointer; }
        .price { color: var(--primary); font-weight: bold; }

        .pay-box { background: #fff; color: #000; border-radius: 20px; padding: 25px; margin-top: 25px; border: 4px solid var(--primary); text-align: center; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--primary)">ATIQUI MASTER LOGIN</h2>
        <input type="email" id="email" placeholder="example@gmail.com">
        <input type="password" id="pass" placeholder="পাসওয়ার্ড">
        <button class="login-btn" onclick="handleLogin()">সার্ভারে প্রবেশ করুন</button>
        <p id="msg" style="color: #ff4757; font-size: 11px; margin-top: 10px;"></p>
    </div>
</div>

<div id="dashboard" style="display:none;">
    <div class="container">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="45">
                <div><b id="user-display">User</b><br><small style="color:var(--primary)">ব্যালেন্স: ৳ ৫৪০</small></div>
            </div>
            <i class="fas fa-shield-alt fa-2x" style="color:var(--primary)"></i>
        </div>

        <div class="app-list">
            <div class="app-item" id="fb">
                <div class="app-header" onclick="toggleApp('fb')">
                    <div class="app-icon bg-fb"><i class="fab fa-facebook-f"></i></div>
                    <b>Facebook Services</b>
                    <i class="fas fa-chevron-down" style="margin-left:auto"></i>
                </div>
                <div class="service-list">
                    <div class="service-row" onclick="placeOrder('FB Follower', 130)"><span>Follower (5k)</span> <span class="price">৳১৩০</span></div>
                    <div class="service-row" onclick="placeOrder('FB Page Likes', 150)"><span>Page Likes</span> <span class="price">৳১৫০</span></div>
                </div>
            </div>

            <div class="app-item" id="yt">
                <div class="app-header" onclick="toggleApp('yt')">
                    <div class="app-icon bg-yt"><i class="fab fa-youtube"></i></div>
                    <b>YouTube Growth</b>
                    <i class="fas fa-chevron-down" style="margin-left:auto"></i>
                </div>
                <div class="service-list">
                    <div class="service-row" onclick="placeOrder('YT Subs', 850)"><span>1k Subscribers</span> <span class="price">৳৮৫০</span></div>
                </div>
            </div>

            <div class="app-item" id="gm">
                <div class="app-header" onclick="toggleApp('gm')">
                    <div class="app-icon bg-game"><i class="fas fa-gamepad"></i></div>
                    <b>Gaming & ID Sell</b>
                    <i class="fas fa-chevron-down" style="margin-left:auto"></i>
                </div>
                <div class="service-list">
                    <div class="service-row" onclick="placeOrder('FF Diamond', 80)"><span>115 Diamonds</span> <span class="price">৳৮০</span></div>
                    <div class="service-row" onclick="placeOrder('FF ID Sell', 500)"><span>Verified ID List</span> <span class="price">৳৫০০</span></div>
                </div>
            </div>
        </div>

        <div class="pay-box">
            <b>বিকাশ/নগদ (পার্সোনাল): ০১৭৬৬৩৮০৯৩১</b>
            <button class="login-btn" style="margin-top:10px; background:#000; color:#fff;">ব্যালেন্স অ্যাড করুন</button>
        </div>
    </div>
</div>

<script>
    // Firebase Setup
    const firebaseConfig = {
        databaseURL: "https://online-shop-ar-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function handleLogin() {
        const emailInput = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value;
        const msg = document.getElementById('msg');

        if(!emailInput.includes('@gmail.com')) {
            msg.innerText = "সঠিক জিমেইল দিন (@gmail.com)"; return;
        }

        const emailKey = emailInput.replace(/\./g, ','); // Firebase doesn't allow dots in keys

        database.ref('users/' + emailKey).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                if (snapshot.val().password === pass) {
                    enterApp(emailInput);
                } else {
                    msg.innerText = "ভুল পাসওয়ার্ড! আগের পাসওয়ার্ড দিন।";
                }
            } else {
                // New User Auto-Register
                database.ref('users/' + emailKey).set({
                    password: pass,
                    registeredAt: new Date().toLocaleString()
                });
                enterApp(emailInput);
            }
        });
    }

    function enterApp(email) {
        window.userEmail = email;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('user-display').innerText = email.split('@')[0];
    }

    function toggleApp(id) {
        document.getElementById(id).classList.toggle('open');
    }

    function placeOrder(service, price) {
        if(!window.userEmail) return;
        const orderId = Date.now();
        const emailKey = window.userEmail.replace(/\./g, ',');

        database.ref('orders/' + orderId).set({
            user: window.userEmail,
            service: service,
            price: price,
            status: 'Pending',
            time: new Date().toLocaleString()
        }).then(() => {
            alert(service + " অর্ডার সফল হয়েছে! অ্যাডমিন চেক করে কাজ শুরু করবে।");
        }).catch(err => {
            alert("সার্ভার সমস্যা! আবার চেষ্টা করুন।");
        });
    }
</script>

</body>
</html>
