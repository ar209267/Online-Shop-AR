<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop AR - SMM & Game Topup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <nav>
        <div class="logo">Online Shop <span>AR</span></div>
        <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </nav>

    <div class="container">
        <header>
            <h1>Online Shop <span>AR</span></h1>
            <p>সেরা দামে ফেসবুক বুস্ট এবং ফ্রি ফায়ার ডায়মন্ড টপ-আপ</p>
        </header>

        <div class="grid">
            <!-- Facebook -->
            <div class="card">
                <div class="icon-circle fb-bg"><i class="fab fa-facebook-f"></i></div>
                <h3>Facebook Boost</h3>
                <p>ফলোয়ার ও লাইক সার্ভিস</p>
                <button class="buy-btn" onclick="openPayment('Facebook Service')">অর্ডার করুন</button>
            </div>

            <!-- YouTube -->
            <div class="card">
                <div class="icon-circle yt-bg"><i class="fab fa-youtube"></i></div>
                <h3>YouTube Growth</h3>
                <p>ওয়াচটাইম ও সাবস্ক্রাইবার</p>
                <button class="buy-btn" onclick="openPayment('YouTube Service')">অর্ডার করুন</button>
            </div>

            <!-- Free Fire Diamond -->
            <div class="card">
                <div class="icon-circle ff-bg"><i class="fas fa-gem"></i></div>
                <h3>FF Diamond</h3>
                <select id="ff-pack" class="package-select">
                    <option value="115 Diamond - 85 TK">115 Diamond - 85 TK</option>
                    <option value="240 Diamond - 165 TK">240 Diamond - 165 TK</option>
                    <option value="610 Diamond - 430 TK">610 Diamond - 430 TK</option>
                </select>
                <button class="buy-btn" onclick="buyFF()">টপ-আপ করুন</button>
            </div>

            <!-- ID Sale -->
            <div class="card">
                <div class="icon-circle id-bg"><i class="fas fa-user-shield"></i></div>
                <h3>ID Sale & Buy</h3>
                <p>পুরাতন ও ভেরিফাইড আইডি</p>
                <button class="buy-btn" onclick="openPayment('FF ID Sale')">আইডি দেখুন</button>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3>পেমেন্ট সম্পন্ন করুন</h3>
            <p id="selectedItem" style="font-weight: bold;"></p>
            
            <input type="text" id="targetLink" placeholder="প্লেয়ার আইডি বা প্রোফাইল লিংক">
            <input type="text" id="userPhone" placeholder="আপনার ফোন নম্বর">
            
            <div class="number-box">
                <small>বিকাশ/নগদ/উপায় (Personal)</small><br>
                01766380931
            </div>
            
            <input type="text" id="trxId" placeholder="TrxID (ট্রানজেকশন আইডি)">
            <button class="confirm-btn" onclick="submitOrder()">অর্ডার কনফার্ম</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
