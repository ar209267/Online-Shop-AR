<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq SMM Master - Firebase Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1dbf73;
            --bg: #0b0e14;
            --card-bg: #1a1e29;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; overflow-x: hidden; }

        /* Auth Screen */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1e29 0%, #0b0e14 100%);
            z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-card {
            background: var(--card-bg); padding: 35px; border-radius: 30px;
            width: 100%; max-width: 420px; border: 1px solid #2d3748; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-box {
            width: 100%; padding: 15px; margin-top: 15px; border-radius: 12px;
            border: 1px solid #2d3748; background: #0b0e14; color: #fff; outline: none;
        }
        .auth-btn {
            width: 100%; padding: 16px; background: var(--primary); border: none;
            border-radius: 12px; font-weight: bold; cursor: pointer; color: #fff; margin-top: 20px; font-size: 16px;
        }

        /* Main UI */
        .container { max-width: 600px; margin: auto; padding: 20px; display: none; }
        .app-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
            background: var(--card-bg); padding: 20px; border-radius: 25px; border: 1px solid #2d3748;
        }
        .app-item { text-align: center; cursor: pointer; padding: 10px; border-radius: 15px; }
        .app-icon { width: 50px; height: 50px; border-radius: 12px; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff; }
        
        /* Modals */
        #service-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%;
            background: var(--card-bg); z-index: 999; border-radius: 30px 30px 0 0;
            padding: 25px; border-top: 2px solid var(--primary); overflow-y: auto;
        }
        #service-modal.active { bottom: 0; }
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display:none; z-index: 998; }

        /* Service Cards */
        .service-row { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d3748; }
        .price-btn { background: var(--primary); color: white; padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        /* Brand Colors */
        .bg-fb { background: #1877F2; } .bg-yt { background: #FF0000; } .bg-insta { background: #E4405F; }
        .bg-tt { background: #000000; } .bg-wa { background: #25D366; } .bg-game { background: #ff8c00; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color:var(--primary)">Atiq SMM Login</h2>
        <p style="color:var(--text-dim); font-size:12px">Real-time Security via Firebase</p>
        <input type="email" id="email" class="input-box" placeholder="আপনার জিমেইল">
        <input type="password" id="pass" class="input-box" placeholder="পাসওয়ার্ড">
        <button class="auth-btn" onclick="handleAuth()">লগইন / সাইন আপ</button>
        <p id="msg" style="margin-top:10px; font-size:12px; color:#e74c3c"></p>
    </div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>

<div class="container" id="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:20px;">
        <h3>SMM Dashboard</h3>
        <div style="background: var(--primary); padding: 5px 15px; border-radius: 20px; font-weight: bold;">৳ ০.০০</div>
    </div>

    <div class="app-grid">
        <div class="app-item" onclick="openServices('fb')"><div class="app-icon bg-fb"><i class="fab fa-facebook-f"></i></div><span>Facebook</span></div>
        <div class="app-item" onclick="openServices('yt')"><div class="app-icon bg-yt"><i class="fab fa-youtube"></i></div><span>YouTube</span></div>
        <div class="app-item" onclick="openServices('insta')"><div class="app-icon bg-insta"><i class="fab fa-instagram"></i></div><span>Insta</span></div>
        <div class="app-item" onclick="openServices('tt')"><div class="app-icon bg-tt"><i class="fab fa-tiktok"></i></div><span>TikTok</span></div>
    </div>

    <h4 style="margin-top:30px; color:var(--primary)">Gaming & Others</h4>
    <div class="app-grid">
        <div class="app-item" onclick="openServices('ff')"><div class="app-icon bg-game"><i class="fas fa-fire"></i></div><span>Free Fire</span></div>
        <div class="app-item" onclick="openServices('pubg')"><div class="app-icon bg-game"><i class="fas fa-gun"></i></div><span>PUBG UC</span></div>
        <div class="app-item" onclick="openServices('wa')"><div class="app-icon bg-wa"><i class="fab fa-whatsapp"></i></div><span>WhatsApp</span></div>
    </div>
</div>

<div id="service-modal">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 id="modal-name" style="color:var(--primary)">Services</h3>
        <i class="fas fa-times" onclick="closeModal()" style="cursor:pointer;"></i>
    </div>
    <div id="service-list"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

  // আপনার স্ক্রিনশট থেকে নেওয়া অরিজিনাল কনফিগারেশন
  const firebaseConfig = {
    apiKey: "AIzaSyC5i7S0EJeF08NsO7VbiU63r-", 
    authDomain: "online-shop-ar.firebaseapp.com",
    projectId: "online-shop-ar",
    storageBucket: "online-shop-ar.firebasestorage.app",
    messagingSenderId: "913434308973",
    appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64",
    measurementId: "G-T20TRS2F59"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  
  console.log("Firebase Connected Successfully!");
</script>

<script>
    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const msg = document.getElementById('msg');

        // জিমেইল ভ্যালিডেশন
        const emailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
        
        if (!emailPattern.test(email)) {
            msg.innerText = "সঠিক @gmail.com অ্যাড্রেস ব্যবহার করুন।";
            return;
        }
        if (pass.length < 6) {
            msg.innerText = "পাসওয়ার্ড অন্তত ৬ অক্ষরের দিন।";
            return;
        }

        // লগইন সফল (সিস্টেম শো)
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }

    const servicesData = {
        fb: { name: "Facebook Services", items: [
            {n: "Profile Followers", p: "৳ ১৩০"}, {n: "Page Like/Follow", p: "৳ ১৬০"}, {n: "60k Watchtime", p: "৳ ৪৫০"}
        ]},
        yt: { name: "YouTube Boost", items: [
            {n: "1k Subscribers", p: "৳ ৪৮০"}, {n: "4k Watchtime", p: "৳ ১৬০০"}
        ]},
        ff: { name: "Free Fire Diamonds", items: [
            {n: "115 Diamonds", p: "৳ ৮৫"}, {n: "Weekly Membership", p: "৳ ১৬০"}
        ]},
        pubg: { name: "PUBG Mobile UC", items: [
            {n: "60 UC", p: "৳ ৯৫"}, {n: "325 UC", p: "৳ ৪১০"}
        ]}
    };

    function openServices(key) {
        const modal = document.getElementById('service-modal');
        const list = document.getElementById('service-list');
        const data = servicesData[key] || {name: "Coming Soon", items: []};

        document.getElementById('modal-name').innerText = data.name;
        list.innerHTML = '';
        data.items.forEach(item => {
            list.innerHTML += `
                <div class="service-row">
                    <div><b>${item.n}</b></div>
                    <button class="price-btn" onclick="alert('পেমেন্ট গেটওয়েতে পাঠানো হচ্ছে...')">${item.p}</button>
                </div>
            `;
        });
        modal.classList.add('active');
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('service-modal').classList.remove('active');
        document.getElementById('overlay').style.display = 'none';
    }
</script>

</body>
</html>
