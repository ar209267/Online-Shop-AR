<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Login - ABR Secure Server</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0e11; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: #161a1e; padding: 40px; border-radius: 20px; border: 1px solid #1dbf73; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(29,191,115,0.1); }
        .form-control { background: #0b0e11; border: 1px solid #2d3436; color: white; margin-bottom: 15px; }
        .btn-login { background: #1dbf73; color: white; width: 100%; border: none; padding: 12px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h2 style="color: #1dbf73;">fiverr.</h2>
        <p class="text-secondary">Secured Login Server</p>
        <div id="msg"></div>
        <input type="text" id="email" class="form-control" placeholder="জিমেইল বা ইউজারনেম">
        <input type="password" id="pass" class="form-control" placeholder="পাসওয়ার্ড">
        <button onclick="checkAuth()" class="btn-login">সার্ভারে প্রবেশ করুন</button>
        <p style="font-size: 11px; margin-top: 15px; color: #636e72;">Managed by Firebase Security</p>
    </div>

<script>
    function checkAuth() {
        let email = document.getElementById('email').value;
        let pass = document.getElementById('pass').value;
        let msg = document.getElementById('msg');

        // নকল আইডি/জিমেইল চেক করার লজিক
        if (!email.includes("@") || email.length < 5) {
            msg.innerHTML = "<p style='color:red;'>⚠️ এটি একটি নকল বা ভুল জিমেইল!</p>";
        } else if (pass.length < 6) {
            msg.innerHTML = "<p style='color:red;'>⚠️ পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে!</p>";
        } else {
            msg.innerHTML = "<p style='color:#1dbf73;'>✅ পরিচয় নিশ্চিত! সার্ভারে প্রবেশ করা হচ্ছে...</p>";
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1500);
        }
    }
</script>
</body>
</html>
