<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR EMPIRE | ULTIMATE MASTER V2</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Hind+Siliguri:wght@300;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section id="serverGate">
    <div class="auth-card glass-container animate__animated animate__zoomIn">
        <img src="ar-logo.png" alt="AR Logo" class="logo-main">
        <h2 class="orbitron">AR NEXUS</h2>
        <p class="small text-secondary">MASTER SECURE LOGIN</p>
        <div class="mt-4">
            <input type="email" id="masterEmail" class="nexus-input" placeholder="আপনার জিমেইল">
            <input type="password" id="masterPass" class="nexus-input" placeholder="পাসওয়ার্ড">
            <button class="btn-nexus-main w-100" onclick="triggerAuth()">ACTIVATE CORE</button>
        </div>
    </div>
</section>

<section id="mainApplication" style="display: none;">
    <div class="payment-banner">
        <h1 class="orbitron">01766380931</h1>
        <p>বিকাশ/নগদ পারসোনাল নম্বর (কপি করুন)</p>
        <button class="copy-btn" onclick="copyMasterNumber()">COPY NUMBER</button>
    </div>

    <div class="container mt-5">
        <div class="row g-4">
            <div class="col-6 col-md-3">
                <div class="package-tile">
                    <i class="fas fa-gem"></i>
                    <h5>১১৫ ডায়মন্ড</h5>
                    <h3 class="price">৳ ৮০</h3>
                    <button class="order-btn" onclick="processOrder('115 Diamond', '80')">অর্ডার</button>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="package-tile">
                    <i class="fas fa-crown"></i>
                    <h5>উইকলি</h5>
                    <h3 class="price">৳ ১৯০</h3>
                    <button class="order-btn" onclick="processOrder('Weekly', '190')">অর্ডার</button>
                </div>
            </div>
        </div>
        
        <div id="userActivityArea" class="mt-5 pb-5"></div>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
