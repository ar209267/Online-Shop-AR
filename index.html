<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop AR - Live</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* আপনার আগের সব স্টাইল এখানে থাকবে */
        :root { --primary: #0084ff; --dark: #0f172a; --orange: #f59e0b; }
        body { margin: 0; font-family: sans-serif; background: #f8fafc; }
        nav { background: var(--dark); padding: 15px; color: white; display: flex; justify-content: space-between; }
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; }
        #login-screen { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <nav id="navbar" style="display:none;">
        <div>Online Shop <b>AR</b></div>
        <div id="balance-area">৳ <span id="balance">0.00</span></div>
    </nav>

    <div id="login-screen">
        <h2>Online Shop AR</h2>
        <button class="btn" onclick="startApp()">প্রবেশ করুন</button>
    </div>

    <div id="main-content" class="container" style="display:none;">
        <div class="card">
            <h3>Facebook Service</h3>
            <select id="fb-service">
                <option value="5K Followers">5K Followers - 130 TK</option>
                <option value="Post Boost">Post Boost - 150 TK</option>
                <option value="Meta Verified">Meta Verified - 1200 TK</option>
            </select>
            <button class="btn" onclick="orderNow()">অর্ডার করুন</button>
        </div>
    </div>

    <script>
        // আপনার স্ক্রিনশট থেকে নেওয়া কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyC5i7SOEJeFO8NsO7VbIU63rfRBrGwBWQY",
            authDomain: "online-shop-ar.firebaseapp.com",
            projectId: "online-shop-ar",
            storageBucket: "online-shop-ar.appspot.com",
            messagingSenderId: "913434308973",
            appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function startApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('navbar').style.display = 'flex';
            
            // ডাটাবেজ থেকে ব্যালেন্স আনা
            db.ref('users/atiq_user').on('value', (snapshot) => {
                const val = snapshot.val();
                if(val) {
                    document.getElementById('balance').innerText = val.balance.toFixed(2);
                } else {
                    db.ref('users/atiq_user').set({ balance: 0.00 });
                }
            });
        }

        function orderNow() {
            alert("অর্ডার সফল! এডমিন চেক করে কাজ শুরু করবে।");
        }
    </script>
</body>
</html>
