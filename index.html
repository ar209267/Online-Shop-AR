<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR EMPIRE | SECURE SERVER</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --ar-cyan: #00f2fe; --ar-purple: #bc13fe; --ar-bg: #010409; }
        body { background-color: var(--ar-bg); color: white; font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        
        /* Login Design */
        #loginGate { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #0a192f 0%, #010409 100%); }
        .auth-card { background: rgba(13, 17, 23, 0.95); border: 1px solid var(--ar-cyan); border-radius: 30px; padding: 40px; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); }
        .nexus-input { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; transition: 0.3s; }
        .nexus-input:focus { border-color: var(--ar-cyan); box-shadow: 0 0 10px var(--ar-cyan); outline: none; }
        
        /* Dashboard Design */
        #mainApplication { display: none; }
        .package-tile { background: #0d1117; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #21262d; transition: 0.3s; height: 100%; }
        .package-tile:hover { border-color: var(--ar-cyan); transform: translateY(-5px); }
        .package-tile i { font-size: 2rem; color: var(--ar-cyan); margin-bottom: 10px; }
        .price { color: #FFD700; font-weight: bold; }
        .order-btn { background: var(--ar-cyan); color: black; border: none; padding: 8px; border-radius: 10px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<section id="loginGate">
    <div class="auth-card text-center animate__animated animate__fadeIn">
        <img src="ar-logo.png" style="width: 100px; border-radius: 20px; margin-bottom: 20px; border: 2px solid var(--ar-cyan);" onerror="this.src='https://cdn-icons-png.flaticon.com/512/7032/7032338.png'">
        <h4 class="orbitron text-white">AR MASTER LOCK</h4>
        <p class="text-secondary small mb-4">শুধুমাত্র আতিক ওস্তাদ প্রবেশ করতে পারবেন</p>
        
        <input type="email" id="uMail" class="nexus-input" placeholder="আপনার জিমেইল">
        <input type="password" id="uPass" class="nexus-input" placeholder="মাস্টার পাসওয়ার্ড">
        <button class="btn btn-info w-100 py-2 fw-bold" onclick="masterLogin()">LOGIN SYSTEM</button>
    </div>
</section>

<section id="mainApplication">
    <nav class="navbar navbar-dark bg-dark py-3 border-bottom border-secondary">
        <div class="container d-flex justify-content-between align-items-center">
            <h6 class="orbitron mb-0">AR EMPIRE HUB</h6>
            <button class="btn btn-sm btn-info px-3 rounded-pill" onclick="showAdmin()">ADMIN</button>
        </div>
    </nav>

    <div class="text-center py-5 bg-dark border-bottom border-secondary">
        <p class="text-secondary mb-1">বিকাশ/নগদ নম্বর</p>
        <h2 class="orbitron fw-bold">01766380931</h2>
        <button class="btn btn-sm btn-outline-info" onclick="copyNum()">COPY</button>
    </div>

    <div class="container mt-4 pb-5">
        <div class="row g-3">
            <div class="col-6 col-md-3">
                <div class="package-tile">
                    <i class="fas fa-user-shield"></i>
                    <p class="mb-1 small">Account Verify</p>
                    <p class="price">৳ ৫০০</p>
                    <button class="order-btn" onclick="doOrder('Account Verify', '500')">অর্ডার</button>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="package-tile">
                    <i class="fab fa-facebook"></i>
                    <p class="mb-1 small">FB Follower</p>
                    <p class="price">৳ ১৩৫</p>
                    <button class="order-btn" onclick="doOrder('FB 1K', '135')">অর্ডার</button>
                </div>
            </div>
        </div>
        <div id="userActivity" class="mt-4"></div>
    </div>
</section>

<section id="adminRoom" style="display:none;" class="container mt-4">
    <div class="d-flex justify-content-between mb-3">
        <h4 class="orbitron">ADMIN</h4>
        <button class="btn btn-sm btn-danger" onclick="location.reload()">LOGOUT</button>
    </div>
    <div class="table-responsive">
        <table class="table table-dark small">
            <thead><tr><th>কাস্টমার</th><th>কাজ</th><th>TrxID</th><th>অ্যাকশন</th></tr></thead>
            <tbody id="adminTable"></tbody>
        </table>
    </div>
</section>

<script>
    // --- ফায়ারবেস সেটআপ ---
    const firebaseConfig = {
        apiKey: "AIzaSyC5i7SOEJeFO8NsO7VbIU63rfRBrGwBWQY",
        authDomain: "online-shop-ar.firebaseapp.com",
        projectId: "online-shop-ar",
        databaseURL: "https://online-shop-ar-default-rtdb.firebaseio.com", // আপনার ডাটাবেস URL
        storageBucket: "online-shop-ar.appspot.com",
        messagingSenderId: "913434308973",
        appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- লগইন লজিক (নির্ধারিত জিমেইল ও পাসওয়ার্ড) ---
    function masterLogin() {
        const email = document.getElementById('uMail').value.trim();
        const pass = document.getElementById('uPass').value;

        // আপনার নির্দিষ্ট জিমেইল এবং পাসওয়ার্ড এখানে সেট করুন
        const MASTER_EMAIL = "atiq@gmail.com"; 
        const MASTER_PASS = "atiq8389";

        if(email === MASTER_EMAIL && pass === MASTER_PASS) {
            // সার্ভারে লগ সেভ হবে (কে কখন ঢুকল)
            db.ref('login_logs/').push({ user: email, time: new Date().toLocaleString() });
            
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', email);
            
            document.getElementById('loginGate').style.display = 'none';
            document.getElementById('mainApplication').style.display = 'block';
            loadOrders();
        } else {
            Swal.fire('Access Denied', 'সঠিক জিমেইল বা পাসওয়ার্ড দিন ওস্তাদ!', 'error');
        }
    }

    function doOrder(item, pr) {
        Swal.fire({
            title: item,
            html: `<input id="target" class="swal2-input" placeholder="ID/Link"><input id="trx" class="swal2-input" placeholder="TrxID">`,
            showCancelButton: true
        }).then((r) => {
            if(r.isConfirmed) {
                const t = document.getElementById('target').value;
                const trx = document.getElementById('trx').value;
                db.ref('orders/').push({
                    customer: localStorage.getItem('userEmail'),
                    item: item, target: t, trx: trx, status: 'Pending', date: new Date().toLocaleString()
                });
                Swal.fire('Success', 'অর্ডার সার্ভারে সেভ হয়েছে!', 'success');
            }
        });
    }

    function loadOrders() {
        const mail = localStorage.getItem('userEmail');
        db.ref('orders/').on('value', (s) => {
            const area = document.getElementById('userActivity');
            area.innerHTML = "<h6 class='text-secondary'>Recent Logs:</h6>";
            s.forEach((c) => {
                const d = c.val();
                if(d.customer === mail) {
                    area.innerHTML += `<div class='p-2 mb-2 bg-dark border-start border-info'>${d.item} - ${d.status}</div>`;
                }
            });
        });
    }

    function showAdmin() {
        document.getElementById('mainApplication').style.display = 'none';
        document.getElementById('adminRoom').style.display = 'block';
        db.ref('orders/').on('value', (s) => {
            const tbody = document.getElementById('adminTable');
            tbody.innerHTML = "";
            s.forEach((c) => {
                const d = c.val();
                tbody.innerHTML += `<tr><td>${d.customer}</td><td>${d.item}</td><td>${d.trx}</td><td><button class='btn btn-xs btn-success' onclick="db.ref('orders/${c.key}').update({status:'Success'})">OK</button></td></tr>`;
            });
        });
    }

    function copyNum() { navigator.clipboard.writeText('01766380931'); Swal.fire('Copied','','success'); }

    // Auto Login
    if(localStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('loginGate').style.display = 'none';
        document.getElementById('mainApplication').style.display = 'block';
        loadOrders();
    }
</script>
</body>
</html>
