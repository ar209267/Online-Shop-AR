<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq Master - Business Pro V25</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00ff88; --bg: #05070a; --card: #11151c; --border: #1e2530; --text: #ffffff; --dim: #94a3b8; --danger: #ff4757; --warning: #f3ad1b; }
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }

        /* --- Global Components --- */
        .marquee-bar { background: var(--danger); color: #000; padding: 8px; font-weight: 800; font-size: 12px; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
        .balance-hero { background: linear-gradient(135deg, #00ff88, #006636); margin: 20px; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0, 255, 136, 0.2); position: relative; }
        
        /* --- Grid & Cards --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .service-card { background: var(--card); padding: 25px 15px; border-radius: 25px; text-align: center; border: 1px solid var(--border); position: relative; cursor: pointer; }
        .offer-tag { position: absolute; top: 10px; right: 10px; background: var(--danger); font-size: 9px; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
        .timer { font-size: 10px; color: var(--danger); margin-top: 8px; font-weight: bold; }

        /* --- Order Tracker --- */
        .tracker-box { margin: 0 20px; background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid var(--border); }
        .status-pill { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: bold; }

        /* --- Support Button --- */
        .wa-float { position: fixed; bottom: 90px; right: 20px; background: #25d366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); z-index: 1000; }

        /* Modal Styles */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; z-index: 10001; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 35px; width: 90%; max-width: 400px; border: 1px solid var(--primary); text-align: center; }
        .input-box { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: #fff; margin-top: 15px; outline: none; }
    </style>
</head>
<body>

<div class="marquee-bar"><marquee>🔥 ধামাকা অফার: সকল গেমিং টপ-আপে বিশেষ ছাড়! অর্ডার করার সাথে সাথেই ডেলিভারি। 🔥</marquee></div>

<div id="app-content">
    <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:40px; height:40px; background:var(--primary); border-radius:12px; display:flex; align-items:center; justify-content:center; color:#000; font-weight:bold;">A</div>
            <b id="display-name">ATIQUE</b>
        </div>
        <i class="fas fa-sign-out-alt" onclick="logout()" style="color:var(--danger)"></i>
    </div>

    <div class="balance-hero">
        <small style="font-weight:bold; opacity:0.8;">আমার ওয়ালেট</small>
        <h1 style="margin:5px 0 0 0; font-size:40px;">৳ <span id="user-balance">৫৪০.০০</span></h1>
        <button onclick="openDeposit()" style="margin-top:15px; background:white; color:black; border:none; padding:8px 20px; border-radius:12px; font-weight:bold; font-size:12px;">ADD MONEY +</button>
    </div>

    <div class="tracker-box">
        <h4 style="margin:0 0 15px 0; font-size:13px; color:var(--primary);"><i class="fas fa-history"></i> লাস্ট অর্ডার স্ট্যাটাস</h4>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="track-item" style="font-size:12px;">অর্ডার নেই</span>
            <span id="track-status" class="status-pill" style="background:var(--dim); color:#000;">N/A</span>
        </div>
    </div>

    <div class="grid">
        <div class="service-card" onclick="openOrder('Free Fire 115💎', '৳ ৮৫', 'UID')">
            <span class="offer-tag">HOT</span>
            <i class="fas fa-fire" style="color:#ff8c00; font-size:35px;"></i>
            <b style="display:block; margin-top:10px;">Free Fire</b>
            <span style="color:var(--primary); font-size:12px; font-weight:bold;">৳ ৮৫</span>
            <div class="timer">শেষ হতে: ০২:১০:৪৫</div>
        </div>
        <div class="service-card" onclick="openOrder('Facebook Follower', '৳ ১৩০', 'Link')">
            <i class="fab fa-facebook" style="color:#1877f2; font-size:35px;"></i>
            <b style="display:block; margin-top:10px;">Facebook</b>
            <span style="color:var(--primary); font-size:12px; font-weight:bold;">৳ ১৩০</span>
        </div>
    </div>
</div>

<div class="modal" id="order-modal">
    <div class="modal-content">
        <h3 id="m-title" style="margin:0; color:var(--primary)">Service</h3>
        <h2 id="m-price" style="margin:10px 0;">৳ 0.00</h2>
        <input type="text" id="target-input" class="input-box" placeholder="আইডি বা লিঙ্ক দিন">
        <input type="text" id="txn-input" class="input-box" placeholder="পেমেন্ট TxnID দিন">
        <button class="input-box" style="background:var(--primary); color:#000; font-weight:bold; border:none;" onclick="confirmOrder()">CONFIRM ORDER</button>
        <button onclick="closeModal()" style="background:none; border:none; color:var(--danger); margin-top:15px; font-weight:bold; cursor:pointer;">CANCEL</button>
    </div>
</div>

<div class="modal" id="deposit-modal">
    <div class="modal-content">
        <h3 style="color:var(--primary); margin:0;">Add Money</h3>
        <p style="font-size:12px; color:var(--dim);">বিকাশ/নগদ (পার্সোনাল): 01766380931</p>
        <input type="number" id="dep-amount" class="input-box" placeholder="টাকার পরিমাণ">
        <input type="text" id="dep-txn" class="input-box" placeholder="Transaction ID">
        <button class="input-box" style="background:var(--primary); color:#000; font-weight:bold; border:none;" onclick="requestDeposit()">REQUEST DEPOSIT</button>
        <button onclick="closeModal()" style="background:none; border:none; color:var(--danger); margin-top:15px; font-weight:bold; cursor:pointer;">CLOSE</button>
    </div>
</div>

<a href="https://wa.me/8801766380931" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script>
    // --- Firebase Initialization ---
    const firebaseConfig = {
        apiKey: "AIzaSyC5i7S0EJeF08NsO7VbiU63r-",
        authDomain: "online-shop-ar.firebaseapp.com",
        databaseURL: "https://online-shop-ar-default-rtdb.firebaseio.com",
        projectId: "online-shop-ar",
        storageBucket: "online-shop-ar.appspot.com",
        messagingSenderId: "913434308973",
        appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // --- Core Functions ---
    function openOrder(name, price) {
        document.getElementById('m-title').innerText = name;
        document.getElementById('m-price').innerText = price;
        document.getElementById('order-modal').style.display = 'flex';
    }

    function openDeposit() { document.getElementById('deposit-modal').style.display = 'flex'; }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    function confirmOrder() {
        const target = document.getElementById('target-input').value;
        const txn = document.getElementById('txn-input').value;
        if(target && txn) {
            db.ref('orders/' + Date.now()).set({
                user: auth.currentUser.email,
                item: document.getElementById('m-title').innerText,
                target: target,
                txn: txn,
                status: 'Pending'
            }).then(() => { alert("অর্ডার সফল!"); closeModal(); });
        } else { alert("সব তথ্য দিন!"); }
    }

    function requestDeposit() {
        const amount = document.getElementById('dep-amount').value;
        const txn = document.getElementById('dep-txn').value;
        if(amount && txn) {
            db.ref('deposits/' + Date.now()).set({
                user: auth.currentUser.email,
                amount: amount,
                txn: txn,
                status: 'Pending'
            }).then(() => { alert("রিকোয়েস্ট পাঠানো হয়েছে!"); closeModal(); });
        }
    }

    function logout() { auth.signOut().then(() => location.reload()); }
</script>

</body>
</html>
