<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR EMPIRE | SECURE SERVER V100</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --ar-primary: #00f2fe; --ar-danger: #ff4b2b; --ar-dark: #010409; }
        body { background: var(--ar-dark); color: white; font-family: 'Hind Siliguri', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Security Shield Login */
        #loginGate { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(45deg, #010409, #0a192f); }
        .auth-card { background: rgba(13, 17, 23, 0.98); border: 1px solid var(--ar-primary); border-radius: 25px; padding: 40px; box-shadow: 0 0 40px rgba(0, 242, 254, 0.1); width: 95%; max-width: 400px; }
        
        /* Payment Security Banner */
        .secure-banner { background: rgba(0, 242, 254, 0.05); border-left: 5px solid var(--ar-primary); padding: 15px; margin: 20px 0; border-radius: 10px; }
        .trx-input { background: #0d1117; border: 2px solid #30363d; color: var(--ar-primary); font-weight: bold; }
        .trx-input:focus { border-color: var(--ar-primary); box-shadow: 0 0 10px var(--ar-primary); }

        .package-tile { background: #0d1117; padding: 15px; border-radius: 20px; border: 1px solid #21262d; text-align: center; height: 100%; transition: 0.3s; }
        .package-tile:hover { border-color: var(--ar-primary); transform: scale(1.02); }
        .order-btn { background: var(--ar-primary); color: #000; font-weight: 700; border: none; width: 100%; border-radius: 10px; padding: 8px; }
    </style>
</head>
<body>

<section id="loginGate">
    <div class="auth-card text-center">
        <h2 class="orbitron text-info mb-4"><i class="fas fa-shield-alt"></i> AR SECURE</h2>
        <input type="email" id="uMail" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Admin Gmail">
        <input type="password" id="uPass" class="form-control mb-4 bg-dark text-white border-secondary" placeholder="Master Password">
        <button class="btn btn-info w-100 fw-bold" onclick="masterLogin()">DECRYPT & ENTER</button>
        <p class="mt-3 small text-secondary">Authorized Access Only</p>
    </div>
</section>

<section id="mainApplication" style="display:none;">
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container d-flex justify-content-between">
            <span class="orbitron text-info">MASTER CONSOLE</span>
            <span id="displayUser" class="small text-secondary"></span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="secure-banner animate__animated animate__pulse animate__infinite">
            <h6 class="orbitron"><i class="fas fa-lock"></i> PAYMENT SECURITY ENABLED</h6>
            <p class="small mb-0">ভুল TrxID দিলে অর্ডার অটোমেটিক ক্যানসেল হয়ে যাবে। টাকা পাঠানোর পর সঠিকভাবে ট্রানজেকশন আইডি দিন।</p>
        </div>

        <div class="text-center my-4 p-4 glass-container" style="background:#0d1117; border-radius:20px; border:1px dashed var(--ar-primary)">
            <p class="mb-1">Send Money (Personal)</p>
            <h3 class="orbitron text-white fw-bold">01766380931</h3>
            <button class="btn btn-sm btn-outline-info" onclick="copyNum()">COPY NUMBER</button>
        </div>

        <div class="row g-3">
            <div class="col-6 col-md-3">
                <div class="package-tile">
                    <i class="fas fa-user-check fa-2x mb-2 text-info"></i>
                    <p class="mb-1">ID Verify</p>
                    <p class="text-warning fw-bold">৳ ৫০০</p>
                    <button class="order-btn" onclick="secureOrder('Account Verify', '500')">ORDER</button>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="package-tile">
                    <i class="fab fa-facebook fa-2x mb-2 text-primary"></i>
                    <p class="mb-1">1K Follower</p>
                    <p class="text-warning fw-bold">৳ ১৩৫</p>
                    <button class="order-btn" onclick="secureOrder('FB Follower', '135')">ORDER</button>
                </div>
            </div>
            </div>

        <div id="statusLogs" class="mt-5 pb-5"></div>
    </div>
</section>

<script>
    // সার্ভার সারাজীবন চলার জন্য ফায়ারবেস কনফিগ (End-to-End Encryption)
    const firebaseConfig = {
        apiKey: "AIzaSyC5i7SOEJeFO8NsO7VbIU63rfRBrGwBWQY",
        authDomain: "online-shop-ar.firebaseapp.com",
        projectId: "online-shop-ar",
        databaseURL: "https://online-shop-ar-default-rtdb.firebaseio.com",
        storageBucket: "online-shop-ar.appspot.com",
        messagingSenderId: "913434308973",
        appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // মাস্টার লগইন (সার্ভার সিকিউরিটি)
    function masterLogin() {
        const mail = document.getElementById('uMail').value.trim();
        const pass = document.getElementById('uPass').value;
        
        // ওস্তাদ, এখানে আপনার জিমেইল আর পাসওয়ার্ড দিন
        if(mail === "atiq@gmail.com" && pass === "atiq8389") {
            localStorage.setItem('ar_session', 'active');
            localStorage.setItem('ar_user', mail);
            location.reload();
        } else {
            Swal.fire('Error', 'ভুল তথ্য! সার্ভার ব্লক হতে পারে।', 'error');
        }
    }

    // পেমেন্ট সিকিউরিটি অর্ডার সিস্টেম
    function secureOrder(item, price) {
        Swal.fire({
            title: `Confirm: ${item}`,
            text: `পেমেন্ট ফী: ${price} টাকা`,
            html: `
                <input id="target_id" class="swal2-input trx-input" placeholder="User ID / Link">
                <input id="trx_id" class="swal2-input trx-input" placeholder="Enter TrxID (8-10 Digits)">
            `,
            showCancelButton: true,
            confirmButtonText: 'Verify & Submit',
            preConfirm: () => {
                const target = document.getElementById('target_id').value;
                const trx = document.getElementById('trx_id').value;
                if (!target || trx.length < 8) {
                    Swal.showValidationMessage('সঠিক TrxID এবং টার্গেট দিন!');
                }
                return { target: target, trx: trx };
            }
        }).then((result) => {
            if (result.isConfirmed) {
                // ডাটাবেসে সিকিউর অর্ডার পাঠানো
                db.ref('secure_orders/').push({
                    user: localStorage.getItem('ar_user'),
                    item: item,
                    price: price,
                    target: result.value.target,
                    trx: result.value.trx,
                    status: 'Verifying',
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                Swal.fire('Success', 'আপনার পেমেন্ট ভেরিফাই করা হচ্ছে...', 'success');
            }
        });
    }

    // অর্ডার স্ট্যাটাস ট্র্যাকিং
    function trackLive() {
        const myMail = localStorage.getItem('ar_user');
        db.ref('secure_orders/').on('value', (snap) => {
            const logArea = document.getElementById('statusLogs');
            logArea.innerHTML = "<h5 class='orbitron text-secondary'>LIVE SERVER LOGS:</h5>";
            snap.forEach((child) => {
                const d = child.val();
                if(d.user === myMail) {
                    logArea.innerHTML += `
                        <div class="p-3 mb-2 border-start border-3 ${d.status==='Verifying'?'border-warning':'border-success'}" style="background:#0d1117">
                            <b>${d.item}</b> - <span class="badge bg-dark text-info">${d.status}</span><br>
                            <small class="text-secondary">TrxID: ${d.trx}</small>
                        </div>`;
                }
            });
        });
    }

    // অটো সেশন চেক
    if(localStorage.getItem('ar_session') === 'active') {
        document.getElementById('loginGate').style.display = 'none';
        document.getElementById('mainApplication').style.display = 'block';
        document.getElementById('displayUser').innerText = localStorage.getItem('ar_user');
        trackLive();
    }

    function copyNum() { navigator.clipboard.writeText('01766380931'); Swal.fire('Copied','','success'); }
</script>
</body>
</html>
