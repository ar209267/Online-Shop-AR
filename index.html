<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR ULTIMATE | Pro Wallet OS v12.0</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --white: #ffffff; --dark: #000000; --gray: #1a1a1a; --border: rgba(255,255,255,0.1); }
        body { background: var(--dark); color: var(--white); font-family: 'Hind Siliguri', sans-serif; }

        /* --- AUTH & PROFILE HUD --- */
        .profile-bar { 
            background: var(--gray); border-radius: 15px; border: 1px solid var(--border);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .balance-tag { background: var(--white); color: var(--dark); padding: 5px 15px; border-radius: 50px; font-weight: 900; font-size: 18px; }

        /* --- CARDS & UI --- */
        .glass-card { 
            background: var(--gray); border: 1px solid var(--border); border-radius: 20px; 
            transition: 0.3s; cursor: pointer; overflow: hidden;
        }
        .glass-card:hover { border-color: var(--white); transform: translateY(-5px); }
        .img-box { height: 120px; background: #080808; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* --- MODALS --- */
        .full-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 10000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content-box { background: #fff; color: #000; border-radius: 25px; width: 100%; max-width: 400px; padding: 30px; }
        
        .btn-master { background: #000; color: #fff; padding: 12px; border-radius: 50px; font-weight: bold; width: 100%; border: none; }
        .btn-add-money { background: #d12053; color: #fff; border: none; padding: 8px 15px; border-radius: 50px; font-size: 13px; }
    </style>
</head>
<body>

<div id="auth-layer" style="position:fixed; inset:0; background:#000; z-index:20000; display:flex; align-items:center; justify-content:center;">
    <div class="text-center p-5 border border-white rounded-5" style="max-width:400px; width:90%;">
        <i class="fas fa-user-shield fa-4x mb-4"></i>
        <h2 class="fw-900 mb-4">AR SYSTEM ACCESS</h2>
        <input type="password" id="sys-pin" class="form-control bg-dark text-white border-white text-center py-3 mb-3 rounded-pill" placeholder="System PIN">
        <button class="btn btn-light w-100 py-3 fw-bold rounded-pill" onclick="Engine.login()">UNLOCK HUB</button>
    </div>
</div>

<div id="app-content" style="display:none;" class="container py-4">
    <div class="profile-bar mb-4">
        <div class="d-flex align-items-center">
            <div class="rounded-circle bg-white text-dark d-flex align-items-center justify-content-center me-3" style="width:45px; height:45px;">
                <i class="fas fa-user"></i>
            </div>
            <div>
                <small class="text-secondary d-block">স্বাগতম, আতিক</small>
                <span class="fw-bold">My Wallet</span>
            </div>
        </div>
        <div class="text-end">
            <div class="balance-tag mb-1">৳ <span id="user-balance">0.00</span></div>
            <button class="btn-add-money" onclick="Wallet.showAdd()">+ টাকা অ্যাড করুন</button>
        </div>
    </div>

    <div class="d-flex gap-2 overflow-auto pb-3 mb-4" id="cat-list">
        <button class="btn btn-outline-light rounded-pill px-4 active" onclick="Engine.filter('all')">All</button>
        <button class="btn btn-outline-light rounded-pill px-4" onclick="Engine.filter('game')">Gaming</button>
        <button class="btn btn-outline-light rounded-pill px-4" onclick="Engine.filter('social')">SMM</button>
    </div>

    <div class="row g-3" id="service-grid"></div>

    <div class="mt-5 p-4 border border-secondary rounded-4">
        <h6 class="text-secondary mb-3"><i class="fas fa-history"></i> সাম্প্রতিক লেনদেন</h6>
        <div id="log-list" class="small"></div>
    </div>
</div>

<div id="add-money-modal" class="full-overlay">
    <div class="modal-content-box">
        <h4 class="fw-bold text-center mb-4">Add Money to Wallet</h4>
        <div class="p-3 bg-light rounded mb-3 text-center">
            বিকাশ/নগদ পার্সোনাল: <br> <strong class="fs-5">01766 380 931</strong>
        </div>
        <input type="number" id="add-amount" class="form-control mb-2 py-3" placeholder="টাকার পরিমাণ">
        <input type="text" id="add-trx" class="form-control mb-3 py-3" placeholder="TrxID (Ex: 8XLA92)">
        <p class="small text-muted text-center">টাকা পাঠিয়ে TrxID দিন, অটোমেটিক ব্যালেন্স যোগ হবে।</p>
        <button class="btn-master" onclick="Wallet.processAdd()">CONFIRM ADD MONEY</button>
        <button class="btn btn-link w-100 text-secondary mt-2" onclick="Wallet.close()">Cancel</button>
    </div>
</div>

<div id="order-modal" class="full-overlay">
    <div class="modal-content-box">
        <h4 id="ord-name" class="fw-bold mb-3"></h4>
        <div id="pkg-options" class="mb-3"></div>
        <input type="text" id="ord-target" class="form-control mb-3 py-3" placeholder="ID বা লিঙ্ক দিন">
        <div class="d-flex justify-content-between mb-4"><span>Total:</span><strong id="ord-price">৳0</strong></div>
        <button class="btn-master" onclick="Engine.confirmOrder()">BUY NOW</button>
        <button class="btn btn-link w-100 text-secondary mt-2" onclick="Engine.closeOrder()">Close</button>
    </div>
</div>

<script>
/**
 * AR PRO WALLET ENGINE v12.0
 */

const DB = [
    { id:1, c:'game', n:'Free Fire Diamond', i:'https://logodownload.org/wp-content/uploads/2019/06/free-fire-logo-1.png', p:[{n:'115💎',p:85},{n:'505💎',p:340}] },
    { id:2, c:'social', n:'Facebook Follower', i:'https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg', p:[{n:'1K',p:150}] }
];

let state = { balance: 0, currentService: null, selectedPkg: null };

const Engine = {
    login: () => {
        if(document.getElementById('sys-pin').value === "1234") {
            document.getElementById('auth-layer').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            Engine.init();
        } else { alert("ভুল পিন!"); }
    },

    init: () => {
        state.balance = parseFloat(localStorage.getItem('ar_bal')) || 0;
        document.getElementById('user-balance').innerText = state.balance.toFixed(2);
        Engine.render('all');
        Engine.loadLogs();
    },

    render: (cat) => {
        const grid = document.getElementById('service-grid');
        grid.innerHTML = '';
        const items = cat === 'all' ? DB : DB.filter(x => x.c === cat);
        items.forEach(s => {
            grid.innerHTML += `
            <div class="col-6 col-md-3">
                <div class="glass-card" onclick="Engine.openOrder(${s.id})">
                    <div class="img-box"><img src="${s.i}"></div>
                    <div class="p-3 text-center">
                        <small class="text-secondary fw-bold text-uppercase">${s.c}</small>
                        <h6 class="m-0 fw-bold">${s.n}</h6>
                    </div>
                </div>
            </div>`;
        });
    },

    openOrder: (id) => {
        state.currentService = DB.find(x => x.id === id);
        document.getElementById('ord-name').innerText = state.currentService.n;
        const opt = document.getElementById('pkg-options');
        opt.innerHTML = '';
        state.currentService.p.forEach(p => {
            opt.innerHTML += `<div class="p-3 border rounded mb-2 d-flex justify-content-between" onclick="Engine.selectPkg(this, '${p.n}', ${p.p})">
                <span>${p.n}</span><strong>৳${p.p}</strong>
            </div>`;
        });
        document.getElementById('order-modal').style.display = 'flex';
    },

    selectPkg: (el, n, p) => {
        state.selectedPkg = { n, p };
        document.querySelectorAll('#pkg-options div').forEach(d => d.style.borderColor = '#dee2e6');
        el.style.borderColor = '#000';
        document.getElementById('ord-price').innerText = "৳" + p;
    },

    confirmOrder: () => {
        const target = document.getElementById('ord-target').value;
        if(!state.selectedPkg || !target) return alert("তথ্য দিন!");
        if(state.balance < state.selectedPkg.p) return alert("ব্যালেন্স নেই! টাকা অ্যাড করুন।");

        state.balance -= state.selectedPkg.p;
        Engine.updateBalance();
        Engine.saveLog(`Service: ${state.currentService.n} (${state.selectedPkg.n}) - Success`);
        alert("অর্ডার সফল! ব্যালেন্স থেকে টাকা কাটা হয়েছে।");
        location.reload();
    },

    saveLog: (msg) => {
        let logs = JSON.parse(localStorage.getItem('ar_logs')) || [];
        logs.unshift({ time: new Date().toLocaleString(), msg });
        localStorage.setItem('ar_logs', JSON.stringify(logs));
    },

    loadLogs: () => {
        const logs = JSON.parse(localStorage.getItem('ar_logs')) || [];
        document.getElementById('log-list').innerHTML = logs.map(l => `<div class="mb-2 pb-2 border-bottom border-secondary text-secondary">${l.time}: ${l.msg}</div>`).join('');
    },

    updateBalance: () => {
        localStorage.setItem('ar_bal', state.balance);
        document.getElementById('user-balance').innerText = state.balance.toFixed(2);
    },

    closeOrder: () => { document.getElementById('order-modal').style.display = 'none'; }
};

const Wallet = {
    showAdd: () => { document.getElementById('add-money-modal').style.display = 'flex'; },
    close: () => { document.getElementById('add-money-modal').style.display = 'none'; },
    processAdd: () => {
        const amt = parseFloat(document.getElementById('add-amount').value);
        const trx = document.getElementById('add-trx').value;
        if(!amt || trx.length < 6) return alert("সঠিক তথ্য দিন!");

        // অটো-চেকিং লজিক সিমুলেশন (টাকা অ্যাড হওয়া)
        state.balance += amt;
        Engine.updateBalance();
        Engine.saveLog(`Wallet Recharge: +৳${amt} (Trx: ${trx}) - Auto Verified`);
        alert(`অভিনন্দন! আপনার ওয়ালেটে ৳${amt} যোগ করা হয়েছে।`);
        Wallet.close();
    }
};
</script>
</body>
</html>
