<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR ULTIMATE | Pro Stable v18.0</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #ffffff; --card: #f9f9f9; --accent: #000000; --border: #eeeeee; }
        body { background-color: var(--bg); color: #222; font-family: 'Hind Siliguri', sans-serif; }

        /* --- AUTH --- */
        #auth-layer { position: fixed; inset: 0; background: #fff; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #fff; padding: 40px; border-radius: 35px; border: 1px solid #ddd; text-align: center; max-width: 400px; width: 90%; }

        /* --- HEADER --- */
        .top-nav { background: #fff; border-bottom: 1px solid var(--border); padding: 15px 0; sticky-top; z-index: 100; }
        .profile-hud { background: var(--card); border: 1px solid var(--border); border-radius: 25px; padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .bal-tag { background: #000; color: #fff; padding: 5px 18px; border-radius: 50px; font-weight: 900; font-size: 20px; }

        /* --- PROMO --- */
        .promo-banner { background: #000; color: #fff; border-radius: 25px; padding: 25px; margin-top: 20px; }

        /* --- CARDS --- */
        .service-card { background: #fff; border: 1px solid var(--border); border-radius: 20px; transition: 0.3s; cursor: pointer; overflow: hidden; height: 100%; position: relative; }
        .service-card:hover { transform: translateY(-5px); border-color: #000; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .hot-tag { position: absolute; top: 10px; left: 10px; background: #ff3e3e; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 50px; }
        .img-box { height: 120px; background: #fafafa; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .img-box img { max-height: 100%; max-width: 100%; }

        /* --- OVERLAYS --- */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal-box { background: #fff; border-radius: 30px; width: 100%; max-width: 400px; padding: 30px; }
        .btn-main { background: #000; color: #fff; border: none; padding: 14px; border-radius: 50px; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn-main:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div id="auth-layer">
    <div class="auth-card shadow-lg">
        <div class="mb-4"><i class="fas fa-user-shield fa-4x text-dark"></i></div>
        <h3 class="fw-900 mb-2">AR ULTIMATE HUB</h3>
        <p class="text-muted small mb-5">লগইন সমস্যা সমাধান করা হয়েছে। সরাসরি প্রবেশ করুন।</p>
        <button class="btn btn-dark w-100 py-3 rounded-pill fw-bold" onclick="App.login()">
            <i class="fab fa-google me-2"></i> জিমেইল দিয়ে লগইন করুন
        </button>
    </div>
</div>

<div id="main-hub" style="display:none;">
    <nav class="top-nav sticky-top shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="fw-900 m-0">AR <span class="text-muted">ULTIMATE</span></h4>
            <button class="btn btn-sm btn-dark rounded-pill px-3" onclick="App.logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="profile-hud">
            <div class="d-flex align-items-center">
                <img id="user-pfp" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" class="me-3 shadow-sm" style="width:55px; height:55px; border-radius:50%; border:2px solid #000;">
                <div>
                    <h6 class="m-0 fw-bold" id="user-display-name">Atique User</h6>
                    <small class="text-muted" id="user-display-email">atiq80054@gmail.com</small>
                </div>
            </div>
            <div class="text-end">
                <div class="bal-tag mb-2">৳ <span id="u-bal">0.00</span></div>
                <button class="btn btn-dark btn-sm rounded-pill px-3 fw-bold" onclick="Wallet.open()">+ অ্যাড মানি</button>
            </div>
        </div>

        <div class="promo-banner d-flex justify-content-between align-items-center shadow-sm">
            <div>
                <h3 class="fw-900 m-0 text-white">Mega Bonus!</h3>
                <p class="small m-0 text-white-50">৫০০৳ রিচার্জে ৫০৳ বোনাস পাবেন।</p>
            </div>
            <i class="fas fa-gift fa-3x opacity-25"></i>
        </div>

        <div class="d-flex gap-2 mt-4 overflow-auto pb-2" style="scrollbar-width: none;">
            <button class="btn btn-dark rounded-pill px-4" onclick="App.render('all')">সব</button>
            <button class="btn btn-outline-dark rounded-pill px-4" onclick="App.render('game')">গেমিং</button>
            <button class="btn btn-outline-dark rounded-pill px-4" onclick="App.render('offer')">অফার</button>
        </div>

        <div class="row g-3 mt-2" id="grid"></div>

        <div class="mt-5 p-4 border rounded-4 bg-light">
            <h6 class="fw-bold mb-3"><i class="fas fa-database me-2"></i> লেনদেন ডাটাবেজ</h6>
            <div id="log-list" class="small text-muted">লোডিং...</div>
        </div>
    </div>
</div>

<div id="wallet-modal" class="overlay">
    <div class="modal-box shadow-lg border">
        <h5 class="fw-bold text-center mb-4">অ্যাড মানি গেটওয়ে</h5>
        <div class="p-3 bg-light rounded-4 text-center mb-4">
            বিকাশ/নগদ (Personal): <br> <strong class="fs-4">01766 380 931</strong>
        </div>
        <input type="number" id="amt" class="form-control mb-3 py-3 rounded-pill border-dark shadow-sm" placeholder="টাকার পরিমাণ">
        <input type="text" id="trx" class="form-control mb-4 py-3 rounded-pill border-dark shadow-sm" placeholder="TrxID দিন">
        <button class="btn-main" onclick="Wallet.add()">CONFIRM DEPOSIT</button>
        <button class="btn btn-link w-100 text-muted mt-2 text-decoration-none" onclick="Wallet.close()">Cancel</button>
    </div>
</div>

<div id="order-modal" class="overlay">
    <div class="modal-box">
        <h5 class="fw-bold mb-3" id="ord-name">Order Service</h5>
        <p class="text-muted small mb-4">নিচে আপনার আইডি বা নম্বর দিন।</p>
        <input type="text" id="target-id" class="form-control mb-4 py-3 rounded-3" placeholder="Target ID / Phone Number">
        <button class="btn-main" onclick="App.confirmOrder()">অর্ডার নিশ্চিত করুন</button>
        <button class="btn btn-link w-100 text-muted mt-2 text-decoration-none" onclick="App.closeOrder()">বাতিল</button>
    </div>
</div>

<script>
const DB = [
    { id:1, c:'game', n:'Free Fire 115💎', i:'https://logodownload.org/wp-content/uploads/2019/06/free-fire-logo-1.png', hot:true },
    { id:2, c:'game', n:'PUBG 60 UC', i:'https://w7.pngwing.com/pngs/380/638/png-transparent-pubg-mobile-logo-iphone-6-plus-video-game-playerunknown-s-battlegrounds-logo-t-shirt-battle-royale-game-thumbnail.png', hot:false },
    { id:3, c:'offer', n:'Canva Pro (1Yr)', i:'https://upload.wikimedia.org/wikipedia/commons/0/08/Canva_icon_2021.svg', hot:true },
    { id:4, c:'offer', n:'Netflix Premium', i:'https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg', hot:true }
];

let state = { bal: 0, currentOrd: null };

const App = {
    login: () => {
        localStorage.setItem('ar_logged', 'true');
        document.getElementById('auth-layer').style.display = 'none';
        document.getElementById('main-hub').style.display = 'block';
        App.init();
    },
    logout: () => {
        localStorage.removeItem('ar_logged');
        location.reload();
    },
    init: () => {
        state.bal = parseFloat(localStorage.getItem('ar_bal')) || 0;
        document.getElementById('u-bal').innerText = state.bal.toFixed(2);
        App.render('all');
        App.loadLogs();
        
        // লগইন স্ট্যাটাস ধরে রাখা
        if(localStorage.getItem('ar_logged') === 'true') {
            document.getElementById('auth-layer').style.display = 'none';
            document.getElementById('main-hub').style.display = 'block';
        }
    },
    render: (cat) => {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const list = cat === 'all' ? DB : DB.filter(x => x.c === cat);
        list.forEach(s => {
            grid.innerHTML += `
            <div class="col-6 col-md-3">
                <div class="service-card" onclick="App.openOrder('${s.n}')">
                    ${s.hot ? '<span class="hot-tag">HOT</span>' : ''}
                    <div class="img-box"><img src="${s.i}"></div>
                    <div class="p-3 text-center"><strong>${s.n}</strong></div>
                </div>
            </div>`;
        });
    },
    openOrder: (name) => {
        state.currentOrd = name;
        document.getElementById('ord-name').innerText = name;
        document.getElementById('order-modal').style.display = 'flex';
    },
    closeOrder: () => document.getElementById('order-modal').style.display = 'none',
    confirmOrder: () => {
        const id = document.getElementById('target-id').value;
        if(!id) return alert("টার্গেট আইডি দিন!");
        alert(state.currentOrd + " অর্ডারটি পেন্ডিং এ আছে।");
        App.closeOrder();
    },
    loadLogs: () => {
        const logs = JSON.parse(localStorage.getItem('ar_logs')) || [];
        document.getElementById('log-list').innerHTML = logs.map(l => `
            <div class="d-flex justify-content-between border-bottom py-2">
                <span>${l.t}: ${l.m}</span>
                <span class="badge bg-dark rounded-pill">Success</span>
            </div>`).join('') || "এখনো কোনো লেনদেন হয়নি।";
    }
};

const Wallet = {
    open: () => document.getElementById('wallet-modal').style.display = 'flex',
    close: () => document.getElementById('wallet-modal').style.display = 'none',
    add: () => {
        const a = parseFloat(document.getElementById('amt').value);
        if(a > 0) {
            state.bal += a;
            localStorage.setItem('ar_bal', state.bal);
            document.getElementById('u-bal').innerText = state.bal.toFixed(2);
            let logs = JSON.parse(localStorage.getItem('ar_logs')) || [];
            logs.unshift({ t: new Date().toLocaleTimeString(), m: "Cash-In ৳"+a });
            localStorage.setItem('ar_logs', JSON.stringify(logs));
            alert("৳"+a+" সফলভাবে যোগ হয়েছে!");
            Wallet.close();
            App.loadLogs();
        }
    }
};

// Auto-run on load
if(localStorage.getItem('ar_logged') === 'true') App.init();
</script>
</body>
</html>
