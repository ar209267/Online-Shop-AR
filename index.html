<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- PAYMENT MODAL -->
<div class="modal fade" id="paymentModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-info">

      <div class="modal-header border-secondary">
        <h5 class="modal-title orbitron">
          <i class="fas fa-shield-alt text-info"></i>
          Secure Payment Gateway
        </h5>

        <button type="button" class="btn-close btn-close-white"
        data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <div class="alert alert-info small">
          বিকাশ / নগদ এ পেমেন্ট করুন
        </div>

        <div class="text-center mb-3">
          <h3 class="text-warning orbitron">018XXXXXXXX</h3>
          <p class="small text-secondary">
            Send Money Only
          </p>
        </div>

        <label class="small mb-1">প্লেয়ার আইডি / লিংক</label>
        <input type="text" id="playerID"
        class="form-control bg-black text-white border-secondary mb-3">

        <label class="small mb-1">Transaction ID</label>
        <input type="text" id="trxID"
        class="form-control bg-black text-white border-secondary mb-3">

        <label class="small mb-1">Payment Method</label>

        <select id="payMethod"
        class="form-select bg-black text-white border-secondary">
          <option>bKash</option>
          <option>Nagad</option>
          <option>Rocket</option>
        </select>

      </div>

      <div class="modal-footer border-secondary">

        <button class="btn btn-secondary"
        data-bs-dismiss="modal">
          Cancel
        </button>

        <button class="btn btn-info fw-bold"
        onclick="confirmPayment()">
          Confirm Payment
        </button>

      </div>
    </div>
  </div>
</div>
