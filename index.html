<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR ULTIMATE | FINAL WEB HUB</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #010409; --panel: #0d1117; --gold: #ffd700; --border: #30363d; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Hind Siliguri', sans-serif; margin: 0; }

        /* AUTH SCREEN */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--panel); border: 1px solid var(--border);
            padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 400px;
            text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }
        .btn-auth {
            border: none; padding: 15px; border-radius: 15px; width: 100%; 
            font-weight: 700; display: flex; align-items: center; justify-content: center; 
            gap: 10px; margin-bottom: 15px; transition: 0.3s;
        }
        .btn-google { background: #fff; color: #000; }
        .btn-github { background: #24292e; color: #fff; }
        
        /* DASHBOARD */
        #dashboard { display: none; }
        .nav-header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 15px; }
        .user-status { background: linear-gradient(135deg, #161b22, #0d1117); border: 1px solid var(--border); border-radius: 25px; padding: 25px; margin-top: 20px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #222; flex: 1; }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--gold); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="login-card">
        <h2 class="fw-bold mb-1">AR ULTIMATE</h2>
        <p class="text-muted small mb-4">স্বয়ংক্রিয়ভাবে লগইন করুন</p>
        
        <button class="btn-auth btn-google" onclick="System.login('google')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
            Google দিয়ে লগইন
        </button>

        <button class="btn-auth btn-github" onclick="System.login('github')">
            <i class="fab fa-github"></i>
            GitHub দিয়ে লগইন
        </button>

        <div id="recaptcha-container"></div>
    </div>
</div>

<div id="dashboard">
    <nav class="nav-header d-flex justify-content-between align-items-center">
        <span class="fw-bold">AR USER PORTAL</span>
        <button class="btn btn-sm btn-outline-danger" onclick="System.logout()">Logout</button>
    </nav>

    <div class="container mt-4">
        <div class="user-status">
            <div class="d-flex align-items-center mb-4">
                <img id="u-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="60" class="rounded-circle me-3 border border-warning">
                <div>
                    <h5 class="m-0 fw-bold" id="u-name">Loading...</h5>
                    <small class="text-muted" id="u-mail">---</small>
                </div>
            </div>
            <div class="d-flex gap-3">
                <div class="stat-box"><small>ব্যালেন্স</small><div class="stat-val">৳ ০.০০</div></div>
                <div class="stat-box"><small>অর্ডার</small><div class="stat-val">০</div></div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
    // আপনার প্রজেক্টের সঠিক কনফিগ এখানে বসানো হয়েছে
    const firebaseConfig = {
      apiKey: "AIzaSyC5i7SOEJeFO8NsO7VbIU63rfRBrGwBWQY",
      authDomain: "online-shop-ar.firebaseapp.com",
      projectId: "online-shop-ar",
      storageBucket: "online-shop-ar.firebasestorage.app",
      messagingSenderId: "913434308973",
      appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64",
      measurementId: "G-T20TRS2F59" 
    };

    firebase.initializeApp(firebaseConfig);

    const System = {
        login: (type) => {
            let provider;
            if(type === 'google') provider = new firebase.auth.GoogleAuthProvider();
            else provider = new firebase.auth.GithubAuthProvider();

            firebase.auth().signInWithPopup(provider).then(res => {
                System.render(res.user);
            }).catch(e => alert("Login Error: " + e.message));
        },
        render: (user) => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('u-name').innerText = user.displayName || "User";
            document.getElementById('u-mail').innerText = user.email || user.uid.substring(0,10);
            if(user.photoURL) document.getElementById('u-img').src = user.photoURL;
        },
        logout: () => {
            firebase.auth().signOut().then(() => location.reload());
        }
    };

    firebase.auth().onAuthStateChanged(user => { if(user) System.render(user); });
</script>
</body>
</html>
