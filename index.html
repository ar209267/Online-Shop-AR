<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop AR - Pro Max</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7d40ff; --dark: #0b0e14; --card: #161b22; }
        body { background-color: var(--dark); color: #c9d1d9; font-family: 'Hind Siliguri', sans-serif; }
        
        .navbar { background: #1a1d23; border-bottom: 2px solid var(--primary); }
        .hero-section { background: linear-gradient(135deg, #1f6feb, #090c10); padding: 40px; border-radius: 15px; text-align: center; margin-bottom: 30px; }

        /* Category Nav - EnjoyShop Style */
        .cat-scroll { overflow-x: auto; white-space: nowrap; padding: 10px 0; margin-bottom: 20px; }
        .cat-btn { display: inline-block; padding: 8px 20px; background: var(--card); border: 1px solid #30363d; color: #fff; border-radius: 30px; margin-right: 10px; text-decoration: none; cursor: pointer; }
        .cat-btn.active { background: var(--primary); border-color: var(--primary); }

        /* Game Grid */
        .game-card { background: var(--card); border-radius: 12px; border: 1px solid #30363d; overflow: hidden; transition: 0.3s; cursor: pointer; height: 100%; text-align: center; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .game-img { width: 100%; height: 160px; object-fit: contain; background: #000; padding: 10px; }
        .game-info { padding: 12px; font-weight: 600; }

        /* Order Panel */
        #order-panel { display: none; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--primary); }
        .pkg-item { background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .pkg-item:hover, .pkg-item.selected { border-color: var(--primary); background: #1c2128; }

        /* Admin/Owner Dashboard */
        .admin-section { margin-top: 50px; background: #1a1d23; padding: 20px; border-radius: 12px; border-top: 3px solid #238636; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">ONLINE SHOP AR</a>
        <span class="text-info">ব্যালেন্স: ৳০.০০</span>
    </div>
</nav>

<div class="container mt-4">
    <div id="home-content">
        <div class="hero-section">
            <h2 class="fw-bold text-white">স্বাগতম, আতিক!</h2>
            <p>আপনার পছন্দের গেম টপ-আপ করুন দ্রুত এবং নিরাপদে।</p>
        </div>

        <div class="cat-scroll">
            <div class="cat-btn active">Game Top Up</div>
            <div class="cat-btn">Gift Card</div>
            <div class="cat-btn">Software</div>
        </div>

        <div class="row g-3">
            <div class="col-6 col-md-3" onclick="showOrderPage('ff')">
                <div class="game-card">
                    <img src="https://i.ibb.co/LhYpY0P/freefire-logo.png" class="game-img">
                    <div class="game-info">Free Fire Diamond</div>
                </div>
            </div>
            <div class="col-6 col-md-3" onclick="showOrderPage('pubg')">
                <div class="game-card">
                    <img src="https://logolook.net/wp-content/uploads/2023/11/PUBG-Logo.png" class="game-img">
                    <div class="game-info">PUBG Mobile UC</div>
                </div>
            </div>
        </div>
    </div>

    <div id="order-panel">
        <button class="btn btn-outline-light btn-sm mb-4" onclick="hideOrderPage()">← ফিরে যান</button>
        <div class="row">
            <div class="col-md-7">
                <h3 id="displayGameName" class="text-primary mb-4"></h3>
                <div id="packageList">
                    </div>
            </div>
            <div class="col-md-5">
                <div class="p-4 border border-secondary rounded bg-dark">
                    <h4 class="mb-3">অর্ডার ডিটেইলস</h4>
                    <label class="mb-2">প্লেয়ার আইডি / লিঙ্ক</label>
                    <input type="text" id="playerId" class="form-control mb-3" placeholder="এখানে আইডি লিখুন">
                    
                    <div class="alert alert-info py-2">বিকাশ/নগদ: <strong>01766 380 931</strong></div>
                    
                    <label class="mb-2">ট্রানজেকশন আইডি (TrxID)</label>
                    <input type="text" id="trxId" class="form-control mb-3" placeholder="TrxID লিখুন">
                    
                    <button class="btn btn-primary w-100 py-2 fw-bold" onclick="placeOrder()">অর্ডার কনফার্ম করুন</button>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-section">
        <h4 class="text-success mb-3"><i class="fa fa-lock"></i> মালিক ড্যাশবোর্ড (অর্ডার হিস্টোরি)</h4>
        <div class="table-responsive">
            <table class="table table-dark table-hover small">
                <thead>
                    <tr>
                        <th>সময়</th>
                        <th>গেম</th>
                        <th>আইডি/লিঙ্ক</th>
                        <th>TrxID</th>
                        <th>স্ট্যাটাস</th>
                    </tr>
                </thead>
                <tbody id="adminOrderTable">
                    <tr><td colspan="5" class="text-center">এখনও কোনো অর্ডার আসেনি।</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const games = {
        ff: {
            name: "Free Fire Diamond",
            pkgs: [{n:"115 Diamond", p:85}, {n:"505 Diamond", p:340}, {n:"Weekly", p:160}, {n:"Monthly", p:850}]
        },
        pubg: {
            name: "PUBG Mobile UC",
            pkgs: [{n:"60 UC", p:75}, {n:"325 UC", p:380}, {n:"660 UC", p:730}]
        }
    };

    function showOrderPage(key) {
        const game = games[key];
        document.getElementById('displayGameName').innerText = game.name;
        const list = document.getElementById('packageList');
        list.innerHTML = '';
        game.pkgs.forEach(p => {
            list.innerHTML += `<div class="pkg-item" onclick="selectPkg(this)"><span>${p.n}</span><strong>৳${p.p}</strong></div>`;
        });
        document.getElementById('home-content').style.display = 'none';
        document.getElementById('order-panel').style.display = 'block';
        window.scrollTo(0,0);
    }

    function hideOrderPage() {
        document.getElementById('home-content').style.display = 'block';
        document.getElementById('order-panel').style.display = 'none';
    }

    function selectPkg(el) {
        document.querySelectorAll('.pkg-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
    }

    function placeOrder() {
        const id = document.getElementById('playerId').value;
        const trx = document.getElementById('trxId').value;
        const gameName = document.getElementById('displayGameName').innerText;

        if(!id || !trx) {
            alert("সবগুলো তথ্য সঠিকভাবে পূরণ করুন!");
            return;
        }

        alert("আপনার অর্ডারটি সফলভাবে জমা হয়েছে। মালিক চেক করে কনফার্ম করবে।");

        // মালিকের ড্যাশবোর্ডে অর্ডার যোগ করা
        const table = document.getElementById('adminOrderTable');
        if(table.innerText.includes("কোনো অর্ডার আসেনি")) table.innerHTML = "";
        
        const now = new Date().toLocaleTimeString();
        const newRow = `<tr>
            <td>${now}</td>
            <td>${gameName}</td>
            <td>${id}</td>
            <td>${trx}</td>
            <td><span class="badge bg-warning text-dark">Pending</span></td>
        </tr>`;
        table.innerHTML = newRow + table.innerHTML;

        // ইনপুট ক্লিয়ার করা
        document.getElementById('playerId').value = '';
        document.getElementById('trxId').value = '';
    }
</script>

</body>
</html>
