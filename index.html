<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq Master - Enterprise VFinal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00ff88; --bg: #05070a; --card: #11151c; --border: #1e2530; --text: #ffffff; --dim: #94a3b8; --danger: #ff4757; }
        * { box-sizing: border-box; transition: 0.3s; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        /* Notification */
        #notif-popup { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 15px 25px; border-radius: 20px; font-weight: bold; z-index: 1000000; box-shadow: 0 5px 20px rgba(0,255,136,0.4); }
        .marquee-bar { background: var(--danger); color: #fff; padding: 8px; font-size: 12px; font-weight: bold; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 100000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 35px; border-radius: 35px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        .input-box { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid var(--border); background: #000; color: #fff; margin-top: 15px; outline: none; }
        .btn-prime { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; background: var(--primary); color: #000; margin-top: 20px; cursor: pointer; font-size: 16px; }

        /* Dashboard */
        #app-screen { display: none; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
        .balance-card { background: linear-gradient(135deg, #00ff88, #006636); margin: 20px; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,255,136,0.2); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { background: var(--card); padding: 25px 15px; border-radius: 25px; text-align: center; border: 1px solid var(--border); position: relative; cursor: pointer; }
        .offer-tag { position: absolute; top: 10px; right: 10px; background: var(--danger); font-size: 9px; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
        .timer { font-size: 10px; color: var(--danger); margin-top: 8px; font-weight: bold; }

        .wa-float { position: fixed; bottom: 85px; right: 20px; background: #25d366; color: white; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); z-index: 1000; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; z-index: 10001; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 35px; width: 90%; max-width: 400px; border: 1px solid var(--primary); text-align: center; }
    </style>
</head>
<body>

<div id="notif-popup">🔔 অভিনন্দন! Atiq Master এ স্বাগতম।</div>

<div id="auth-screen">
    <div class="auth-card" id="login-form">
        <h2 style="color:var(--primary); margin:0;">লগইন করুন</h2>
        <input type="email" id="u-email" class="input-box" placeholder="আপনার ইমেইল">
        <input type="password" id="u-pass" class="input-box" placeholder="পাসওয়ার্ড">
        <button class="btn-prime" onclick="handleLogin()">লগইন</button>
        <p style="color:var(--dim); font-size:12px; margin-top:15px;">একাউন্ট নেই? <b style="color:var(--primary); cursor:pointer;" onclick="toggleAuth(true)">সাইন-আপ</b></p>
    </div>

    <div class="auth-card" id="signup-form" style="display:none;">
        <h2 style="color:var(--primary); margin:0;">নতুন একাউন্ট</h2>
        <input type="email" id="s-email" class="input-box" placeholder="আপনার ইমেইল">
        <input type="password" id="s-pass" class="input-box" placeholder="পাসওয়ার্ড (মিনিমাম ৬ সংখ্যা)">
        <button class="btn-prime" onclick="handleSignup()">একাউন্ট খুলুন</button>
        <p style="color:var(--dim); font-size:12px; margin-top:15px;" onclick="toggleAuth(false)">আগে থেকেই আছে? <b>লগইন</b></p>
    </div>
</div>

<div id="app-screen">
    <div class="marquee-bar"><marquee>🚀 সকল সার্ভিস সচল! দ্রুত ডেলিভারি পেতে এখনই অর্ডার করুন। 🚀</marquee></div>
    <div class="header">
        <b><i class="fas fa-bolt" style="color:var(--primary)"></i> ATIQ MASTER</b>
        <i class="fas fa-sign-out-alt" onclick="logout()" style="color:var(--danger); cursor:pointer;"></i>
    </div>
    <div class="balance-card">
        <small style="font-weight:bold;">ওয়ালেট ব্যালেন্স</small>
        <h1 id="bal-text" style="margin:5px 0 0 0; font-size:38px;">৳ ০.০০</h1>
        <button onclick="openModal('deposit-modal')" style="margin-top:15px; background:#fff; color:#000; border:none; padding:8px 20px; border-radius:12px; font-weight:bold; font-size:11px;">টাকা অ্যাড করুন +</button>
    </div>
    <div class="grid">
        <div class="card" onclick="openOrder('Free Fire 115💎', '৳ ৮৫')">
            <span class="offer-tag">HOT</span>
            <i class="fas fa-fire" style="color:#ff8c00; font-size:30px;"></i>
            <b style="display:block; margin-top:8px;">Free Fire</b>
            <span style="color:var(--primary); font-size:12px; font-weight:bold;">৳ ৮৫</span>
            <div class="timer">শেষ হবে: ০১:১০:০০</div>
        </div>
        <div class="card" onclick="openOrder('Facebook Follower', '৳ ১৩০')">
            <i class="fab fa-facebook" style="color:#1877f2; font-size:30px;"></i>
            <b style="display:block; margin-top:8px;">Facebook</b>
            <span style="color:var(--primary); font-size:12px; font-weight:bold;">৳ ১৩০</span>
        </div>
    </div>
</div>
