<script>
function openForm(service, selectElement) {
    const optionText = selectElement.options[selectElement.selectedIndex].text;
    const price = selectElement.value;
    
    document.getElementById('payment-panel').style.display = 'block';
    document.getElementById('order-title').innerText = service + " - " + optionText;
    document.getElementById('order-price').innerText = price;
    
    window.scrollTo({ top: document.getElementById('payment-panel').offsetTop - 20, behavior: 'smooth' });
}

function confirmAndSend() {
    const link = document.getElementById('link-field').value;
    const txn = document.getElementById('txn-field').value;
    const title = document.getElementById('order-title').innerText;
    const bill = document.getElementById('order-price').innerText;

    if(!link || !txn) {
        alert("সবগুলো তথ্য দিন।");
        return;
    }

    const waMsg = `*নতুন অর্ডার*%0A------------------%0A*সার্ভিস:* ${title}%0A*লিঙ্ক/UID:* ${link}%0A*বিল:* ${bill} টাকা%0A*Transaction ID:* ${txn}%0A------------------`;
    window.open(`https://wa.me/8801766380931?text=${waMsg}`, '_blank');
}
</script>
