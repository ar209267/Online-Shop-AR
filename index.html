<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR ONLINE SHOPPING PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{background:#070b18;}
.glass{background:rgba(255,255,255,0.06);backdrop-filter:blur(10px);border-radius:16px;}
</style>
</head>

<body class="text-white">

<!-- HEADER -->
<header class="flex justify-between p-4 bg-black/40">
  <h1 class="text-green-400 font-bold">🛒 AR ONLINE SHOPPING</h1>
  <button onclick="openLogin()" class="bg-green-500 px-3 py-1 rounded">Login</button>
</header>

<!-- PRODUCTS -->
<section class="grid md:grid-cols-3 gap-4 p-6">

  <!-- FREE FIRE -->
  <div class="glass p-4">
    <h2 class="font-bold">🔥 Free Fire Diamond</h2>

    <input id="uid" class="w-full mt-2 p-2 text-black rounded" placeholder="Player UID">

    <select id="ff_price" class="w-full mt-2 p-2 text-black rounded">
      <option value="80">100 Diamond - ৳80</option>
      <option value="240">310 Diamond - ৳240</option>
      <option value="400">520 Diamond - ৳400</option>
    </select>

    <button onclick="order('Free Fire Diamond')" class="bg-green-500 w-full mt-3 p-2 rounded">
      Order Now
    </button>
  </div>

</section>

<!-- PAYMENT SECTION -->
<section class="p-6">

<h2 class="text-xl font-bold mb-3">💳 Payment Methods</h2>

<div class="grid md:grid-cols-2 gap-4">

  <div class="glass p-4">
    <h3 class="text-pink-400 font-bold">🟣 bKash Payment</h3>
    <p>Send Money to:</p>
    <h2 class="text-2xl font-bold">01766380931</h2>
    <p class="text-gray-400 text-sm">Manual verification required</p>
  </div>

  <div class="glass p-4">
    <h3 class="text-orange-400 font-bold">🟠 Nagad Payment</h3>
    <p>Send Money to:</p>
    <h2 class="text-2xl font-bold">01766380931</h2>
    <p class="text-gray-400 text-sm">Manual verification required</p>
  </div>

</div>

</section>

<!-- LOGIN -->
<div id="loginBox" class="hidden fixed inset-0 bg-black/80 flex justify-center items-center">
  <div class="glass p-6 w-80">
    <h2 class="text-xl mb-3">Login</h2>

    <input id="email" class="w-full p-2 text-black rounded mb-2" placeholder="Email">
    <input id="pass" class="w-full p-2 text-black rounded" placeholder="Password">

    <button onclick="login()" class="bg-green-500 w-full mt-3 p-2 rounded">Login</button>
    <button onclick="closeLogin()" class="text-red-400 mt-2 w-full">Close</button>
  </div>
</div>

<script>

/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= LOGIN ================= */
function openLogin(){
  document.getElementById("loginBox").classList.remove("hidden");
}

function closeLogin(){
  document.getElementById("loginBox").classList.add("hidden");
}

function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(()=>{
    alert("Login Success");
    closeLogin();
  })
  .catch(e=>alert(e.message));
}

/* ================= ORDER SYSTEM ================= */
function order(product){

  let uid = document.getElementById("uid").value;
  let price = document.getElementById("ff_price").value;

  if(uid === ""){
    alert("UID দিতে হবে");
    return;
  }

  db.collection("orders").add({
    product: product,
    uid: uid,
    price: price,
    status: "pending",
    time: Date.now()
  });

  alert("Order placed! Payment send to 01766380931");
}

</script>

</body>
</html>
