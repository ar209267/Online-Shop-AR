<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR ULTIMATE | AUTOMATIC USER HUB</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #010409; --panel: #0d1117; --gold: #ffd700; --border: #30363d; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Hind Siliguri', sans-serif; margin: 0; }

        /* লগইন স্ক্রিন */
        #auth-gate {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--panel); border: 1px solid var(--border);
            padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 400px;
            text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }
        .btn-google {
            background: #fff; color: #000; border: none; padding: 15px;
            border-radius: 15px; width: 100%; font-weight: 700; display: flex;
            align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px;
        }
        .btn-otp { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 800; margin-top: 15px; }
        .input-box { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; text-align: center; }

        /* ড্যাশবোর্ড */
        #user-hub { display: none; padding-bottom: 80px; }
        .nav-bar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 15px; }
        .user-status { background: linear-gradient(135deg, #161b22, #0d1117); border: 1px solid var(--border); border-radius: 25px; padding: 25px; margin-top: 20px; }
        .stat-val { font-size: 26px; font-weight: 800; color: var(--gold); }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="login-card">
        <h2 class="fw-bold mb-1">AR ULTIMATE</h2>
        <p class="text-muted small mb-4">স্বয়ংক্রিয় লগইন করুন</p>
        
        <button class="btn-google" onclick="System.googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
            গুগল দিয়ে লগইন
        </button>

        <div class="text-muted mb-3">অথবা</div>

        <div id="phone-view">
            <input type="text" id="phone" class="input-box" placeholder="+8801XXXXXXXXX">
            <button class="btn-otp" onclick="System.sendOTP()">OTP পাঠান</button>
        </div>

        <div id="otp-view" style="display:none;">
            <input type="text" id="otp" class="input-box" placeholder="৬ ডিজিটের কোড">
            <button class="btn-otp" onclick="System.verifyOTP()">ভেরিফাই করুন</button>
        </div>

        <div id="recaptcha-container" class="mt-3"></div>
    </div>
</div>

<div id="user-hub">
    <nav class="nav-bar d-flex justify-content-between align-items-center">
        <span class="fw-bold">USER HUB</span>
        <button class="btn btn-sm btn-outline-danger" onclick="System.logout()">Logout</button>
    </nav>

    <div class="container">
        <div class="user-status">
            <div class="d-flex align-items-center mb-3">
                <img id="u-img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="60" class="rounded-circle me-3 border border-warning">
                <div>
                    <h5 class="m-0 fw-bold" id="u-name">Loading...</h5>
                    <small class="text-muted" id="u-contact">---</small>
                </div>
            </div>
            <div class="row text-center mt-4">
                <div class="col-6 border-end">
                    <small class="text-muted">ব্যালেন্স</small>
                    <div class="stat-val">৳ ০.০০</div>
                </div>
                <div class="col-6">
                    <small class="text-muted">অর্ডার</small>
                    <div class="stat-val">০</div>
                </div>
            </div>
        </div>
        
        <div class="mt-4">
            <h6 class="fw-bold mb-3">সার্ভিসসমূহ:</h6>
            <div class="row g-3">
                <div class="col-6"><div class="p-3 bg-dark border rounded-4 text-center"><i class="fas fa-gamepad text-warning mb-2"></i><br>টপআপ</div></div>
                <div class="col-6"><div class="p-3 bg-dark border rounded-4 text-center"><i class="fas fa-mobile-alt text-info mb-2"></i><br>রিচার্জ</div></div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
    // ওস্তাদ, আপনার স্ক্রিনশট থেকে ডাটা এখানে বসিয়ে দিয়েছি
    const firebaseConfig = {
        apiKey: "AIzaSyCXXXXXXXXXXXXXXXXXXXX", // আপনার প্রজেক্ট সেটিংস থেকে apiKey-টা এখানে বসান
        authDomain: "project-913434308973.firebaseapp.com",
        projectId: "project-913434308973",
        storageBucket: "project-913434308973.appspot.com",
        messagingSenderId: "913434308973",
        appId: "1:913434308973:web:XXXXXXXXXXXX" // আপনার প্রজেক্ট সেটিংস থেকে appId-টা এখানে বসান
    };

    firebase.initializeApp(firebaseConfig);

    const System = {
        googleLogin: () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then(res => System.render(res.user)).catch(e => alert(e.message));
        },
        sendOTP: () => {
            const num = document.getElementById('phone').value;
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {size: 'invisible'});
            firebase.auth().signInWithPhoneNumber(num, window.recaptchaVerifier).then(res => {
                window.otpResult = res;
                document.getElementById('phone-view').style.display = 'none';
                document.getElementById('otp-view').style.display = 'block';
                alert("ওটিপি পাঠানো হয়েছে!");
            }).catch(e => alert(e.message));
        },
        verifyOTP: () => {
            const code = document.getElementById('otp').value;
            window.otpResult.confirm(code).then(res => System.render(res.user)).catch(e => alert("ভুল কোড!"));
        },
        render: (user) => {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('user-hub').style.display = 'block';
            document.getElementById('u-name').innerText = user.displayName || "User";
            document.getElementById('u-contact').innerText = user.email || user.phoneNumber;
            if(user.photoURL) document.getElementById('u-img').src = user.photoURL;
        },
        logout: () => {
            firebase.auth().signOut().then(() => location.reload());
        }
    };

    firebase.auth().onAuthStateChanged(user => { if(user) System.render(user); });
</script>
</body>
</html>
