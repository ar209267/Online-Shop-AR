<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR ULTIMATE | Pro White Fixed</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #fdfdfd;
            --accent: #000000;
            --border: #eeeeee;
        }

        body {
            background-color: var(--bg);
            color: #222;
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0; padding: 0;
        }

        /* --- AUTH LAYER (WHITE THEME) --- */
        #auth-layer {
            position: fixed; inset: 0; background: #fff; z-index: 99999;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: #fff; padding: 40px; border-radius: 35px;
            border: 1px solid #ddd; text-align: center; max-width: 400px; width: 90%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
        }

        /* --- DASHBOARD UI --- */
        .top-nav { background: #fff; border-bottom: 1px solid var(--border); padding: 15px 0; }
        .profile-section {
            background: #f9f9f9; border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; display: flex; 
            justify-content: space-between; align-items: center; margin-top: 20px;
        }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #000; }
        .wallet-bal { background: #000; color: #fff; padding: 5px 15px; border-radius: 50px; font-weight: 900; font-size: 20px; }

        .service-card {
            background: #fff; border: 1px solid var(--border); border-radius: 20px;
            transition: 0.3s; cursor: pointer; text-align: center; overflow: hidden;
        }
        .service-card:hover { border-color: #000; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .img-box { height: 120px; background: #fafafa; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .img-box img { max-height: 100%; max-width: 100%; object-fit: contain; }

        /* --- MODAL --- */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 10000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); }
        .modal-box { background: #fff; border-radius: 25px; width: 100%; max-width: 400px; padding: 30px; }
        .btn-main { background: #000; color: #fff; border: none; padding: 12px; border-radius: 50px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-layer">
    <div class="auth-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="50" class="mb-4">
        <h3 class="fw-900 mb-3 text-dark">Welcome to AR Hub</h3>
        <p class="text-muted small mb-4">গুগল এরর ফিক্সড করা হয়েছে। ডেমো বাটন দিয়েও সরাসরি ঢুকতে পারবেন।</p>
        
        <div id="g_id_onload" data-client_id="YOUR_REAL_ID_HERE" data-callback="onSignIn"></div>
        <div class="g_id_signin d-flex justify-content-center mb-3" data-type="standard" data-shape="pill"></div>

        <button class="btn btn-dark w-100 py-3 rounded-pill fw-bold" onclick="Core.directEntry()">
            <i class="fas fa-sign-in-alt me-2"></i> সরাসরি লগইন করুন
        </button>
    </div>
</div>

<div id="main-hub" style="display:none;">
    <nav class="top-nav">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="fw-900 m-0">AR <span class="text-muted">ULTIMATE</span></h4>
            <button class="btn btn-sm btn-outline-dark rounded-pill" onclick="location.reload()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="profile-section">
            <div class="d-flex align-items-center">
                <img id="u-img" src="" class="user-avatar me-3">
                <div>
                    <h6 id="u-name" class="m-0 fw-bold">User Name</h6>
                    <small id="u-mail" class="text-muted">email@gmail.com</small>
                </div>
            </div>
            <div class="text-end">
                <div class="wallet-bal mb-2">৳ <span id="u-bal">0.00</span></div>
                <button class="btn btn-dark btn-sm rounded-pill" onclick="Wallet.open()">+ টাকা অ্যাড</button>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4 overflow-auto pb-2">
            <button class="btn btn-dark rounded-pill px-4" onclick="Core.render('all')">সব সার্ভিস</button>
            <button class="btn btn-outline-dark rounded-pill px-4" onclick="Core.render('game')">গেমিং</button>
            <button class="btn btn-outline-dark rounded-pill px-4" onclick="Core.render('social')">সোশ্যাল</button>
        </div>

        <div class="row g-3 mt-3" id="service-grid"></div>

        <div class="mt-5 p-4 border rounded-4 bg-light">
            <h6 class="fw-bold mb-3">Transaction History</h6>
            <div id="logs" class="small text-muted">No transactions yet.</div>
        </div>
    </div>
</div>

<div id="wallet-modal" class="overlay">
    <div class="modal-box">
        <h5 class="fw-bold text-center mb-4">Add Money</h5>
        <div class="p-3 bg-light rounded text-center mb-3">
            বিকাশ (Personal): <strong>01766 380 931</strong>
        </div>
        <input type="number" id="amt" class="form-control mb-2" placeholder="টাকা">
        <input type="text" id="trx" class="form-control mb-4" placeholder="TrxID">
        <button class="btn-main" onclick="Wallet.add()">Confirm</button>
        <button class="btn btn-link w-100 text-muted mt-2" onclick="Wallet.close()">Cancel</button>
    </div>
</div>

<script>
/**
 * AR ULTIMATE v15.1 - FIXED
 */

const DB = [
    { id:1, c:'game', n:'Free Fire Diamond', i:'https://logodownload.org/wp-content/uploads/2019/06/free-fire-logo-1.png' },
    { id:2, c:'social', n:'Facebook Like/Follow', i:'https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg' }
];

let state = { balance: 0 };

const Core = {
    onSignIn: (res) => {
        const p = JSON.parse(atob(res.credential.split('.')[1]));
        Core.loadUser(p.name, p.email, p.picture);
    },
    directEntry: () => {
        Core.loadUser("Atique User", "atiq80054@gmail.com", "https://cdn-icons-png.flaticon.com/512/3135/3135715.png");
    },
    loadUser: (n, e, i) => {
        document.getElementById('u-name').innerText = n;
        document.getElementById('u-mail').innerText = e;
        document.getElementById('u-img').src = i;
        document.getElementById('auth-layer').style.display = 'none';
        document.getElementById('main-hub').style.display = 'block';
        Core.init();
    },
    init: () => {
        state.balance = parseFloat(localStorage.getItem('ar_bal')) || 0;
        document.getElementById('u-bal').innerText = state.balance.toFixed(2);
        Core.render('all');
    },
    render: (c) => {
        const g = document.getElementById('service-grid');
        g.innerHTML = '';
        const list = c === 'all' ? DB : DB.filter(x => x.c === c);
        list.forEach(s => {
            g.innerHTML += `
            <div class="col-6 col-md-3">
                <div class="service-card" onclick="alert('অর্ডার করা হচ্ছে...')">
                    <div class="img-box"><img src="${s.i}"></div>
                    <div class="p-3"><strong>${s.n}</strong></div>
                </div>
            </div>`;
        });
    }
};

const Wallet = {
    open: () => document.getElementById('wallet-modal').style.display = 'flex',
    close: () => document.getElementById('wallet-modal').style.display = 'none',
    add: () => {
        const a = parseFloat(document.getElementById('amt').value);
        if(a > 0) {
            state.balance += a;
            localStorage.setItem('ar_bal', state.balance);
            document.getElementById('u-bal').innerText = state.balance.toFixed(2);
            alert("টাকা যোগ হয়েছে!");
            Wallet.close();
        }
    }
};
</script>
</body>
</html>
