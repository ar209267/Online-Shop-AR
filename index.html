<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop AR - Professional Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #ff8c00; --dark-bg: #1a1a1a; --card-bg: #2d2d2d; --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: var(--text); }
        
        /* Header */
        header { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .logo { font-size: 22px; font-weight: bold; color: var(--primary); }

        /* Stats Grid - MarufSMM Style */
        .stats-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .stat-box { background: var(--card-bg); padding: 15px; border-radius: 15px; border-left: 4px solid var(--primary); }
        .stat-box small { color: #aaa; font-size: 12px; }
        .stat-box h3 { margin: 5px 0; font-size: 18px; }

        /* Category Icons */
        .category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 20px; max-width: 1100px; margin: 0 auto; }
        .cat-icon { background: #333; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #444; }
        .cat-icon:hover { border-color: var(--primary); background: #444; }
        .cat-icon i { font-size: 20px; }

        /* Order Form */
        .order-section { background: var(--card-bg); margin: 25px 20px; padding: 25px; border-radius: 20px; max-width: 1100px; margin: 25px auto; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #ccc; }
        select, input, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; }
        
        .submit-btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        /* Notice Box */
        .notice { background: rgba(255, 140, 0, 0.1); border: 1px solid var(--primary); padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 13px; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="logo">Online Shop AR</div>
        <i class="fas fa-bars" style="font-size: 20px;"></i>
    </header>

    <div class="stats-container">
        <div class="stat-box">
            <small>Username</small>
            <h3>Atiqur Rahman</h3>
        </div>
        <div class="stat-box">
            <small>Remaining balance</small>
            <h3>৳ <span id="balance">0.00</span></h3>
        </div>
        <div class="stat-box">
            <small>Total Cost</small>
            <h3>৳ 0.00</h3>
        </div>
        <div class="stat-box">
            <small>Total Orders</small>
            <h3>1,831</h3>
        </div>
    </div>

    <div class="category-grid">
        <div class="cat-icon" style="color: #1877F2;"><i class="fab fa-facebook"></i></div>
        <div class="cat-icon" style="color: #E1306C;"><i class="fab fa-instagram"></i></div>
        <div class="cat-icon" style="color: #0088cc;"><i class="fab fa-telegram"></i></div>
        <div class="cat-icon" style="color: #FF0000;"><i class="fab fa-youtube"></i></div>
    </div>

    <div class="order-section">
        <label>Category</label>
        <select id="category">
            <option>Facebook Followers | High Quality</option>
            <option>YouTube Watch Time | Non Drop</option>
            <option>TikTok Followers | Real</option>
        </select>

        <label>Service</label>
        <select id="service">
            <option>Facebook 5K Followers - 130 TK</option>
            <option>Facebook 10K Followers - 250 TK</option>
        </select>

        <label>Link</label>
        <input type="text" id="orderLink" placeholder="https://facebook.com/yourprofile">

        <label>Quantity (Min: 100 - Max: 50,000)</label>
        <input type="number" id="quantity" placeholder="0">

        <button class="submit-btn" onclick="submitOrder()">Submit Order</button>

        <div class="notice">
            <b>Please Follow:</b><br>
            * No Refill: There is no guarantee in any case.<br>
            * Orders will be marked as completed if the link is changed or account is hidden.
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5i7SOEJeFO8NsO7VbIU63rfRBrGwBWQY",
            authDomain: "online-shop-ar.firebaseapp.com",
            projectId: "online-shop-ar",
            storageBucket: "online-shop-ar.appspot.com",
            messagingSenderId: "913434308973",
            appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ব্যালেন্স সিঙ্ক
        db.ref('users/atiq_user_01').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) document.getElementById('balance').innerText = data.balance.toFixed(2);
        });

        function submitOrder() {
            const link = document.getElementById('orderLink').value;
            const qty = document.getElementById('quantity').value;
            if(!link || !qty) { alert("সব তথ্য পূরণ করুন!"); return; }
            alert("Order Submitted Successfully!");
        }
    </script>
</body>
</html>
