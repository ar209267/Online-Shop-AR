<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR ULTIMATE | Admin Panel v23.0</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --admin-bg: #0d1117; --accent: #238636; }
        body { background: #010409; color: #c9d1d9; font-family: 'Hind Siliguri', sans-serif; }

        /* --- ADMIN LOGIN UI --- */
        #login-screen { position: fixed; inset: 0; background: var(--admin-bg); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; width: 90%; max-width: 400px; text-align: center; }
        .login-box h3 { color: #fff; margin-bottom: 25px; font-weight: 800; }
        .form-control { background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 10px; padding: 12px; margin-bottom: 15px; }
        .form-control:focus { background: #0d1117; color: #fff; border-color: var(--accent); box-shadow: none; }
        .btn-admin { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }

        /* --- DASHBOARD UI --- */
        .admin-nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 15px; position: sticky; top: 0; z-index: 100; }
        .stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 15px; padding: 20px; margin-top: 20px; transition: 0.3s; }
        .stat-card:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box shadow-lg">
        <div class="mb-3"><i class="fas fa-user-shield fa-4x text-success"></i></div>
        <h3>সিকিউরিটি লগইন</h3>
        <p class="small text-secondary">শুধুমাত্র অ্যাডমিন এক্সেস</p>
        <input type="text" id="adminName" class="form-control" placeholder="আপনার নাম দিন (Atique)">
        <input type="password" id="adminPass" class="form-control" placeholder="ভার্চুয়াল পাসওয়ার্ড দিন">
        <button class="btn-admin" onclick="Auth.validate()">প্রবেশ করুন</button>
        <div id="errMsg" class="text-danger small mt-2" style="display:none;">ভুল তথ্য দিয়েছেন! আবার চেষ্টা করুন।</div>
    </div>
</div>

<div id="dashboard" style="display:none;">
    <nav class="admin-nav">
        <div class="container d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold"><i class="fas fa-server me-2"></i> Firebase Admin</h5>
            <span class="badge bg-success" id="active-user">Welcome, Atique</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="stat-card">
                    <small class="text-muted">টোটাল ব্যালেন্স</small>
                    <h2 class="fw-bold">৳ ৫,৪৫০</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <small class="text-muted">পেন্ডিং অর্ডার</small>
                    <h2 class="fw-bold text-warning">১২টি</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <small class="text-muted">সার্ভার স্ট্যাটাস</small>
                    <h2 class="fw-bold text-success">Active</h2>
                </div>
            </div>
        </div>

        <div class="stat-card mt-4 mb-5">
            <h5 class="fw-bold border-bottom pb-2 mb-3">সার্ভার কন্ট্রোল প্যানেল</h5>
            <div class="row">
                <div class="col-6 mb-3">
                    <button class="btn btn-outline-light w-100 py-3" onclick="alert('Firebase Syncing...')">
                        <i class="fas fa-sync me-2"></i> ডাটা সিঙ্ক করুন
                    </button>
                </div>
                <div class="col-6 mb-3">
                    <button class="btn btn-outline-danger w-100 py-3" onclick="location.reload()">
                        <i class="fas fa-power-off me-2"></i> লগ আউট
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js"></script>

<script>
    // আপনার চাওয়া পাসওয়ার্ড
    const MASTER_NAME = "Atique"; // এখানে আপনার নাম দিন
    const MASTER_PASS = "83৮৯৮০৬৩ @#";

    const Auth = {
        validate: () => {
            const name = document.getElementById('adminName').value;
            const pass = document.getElementById('adminPass').value;
            const err = document.getElementById('errMsg');

            if(name === MASTER_NAME && pass === MASTER_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                // Firebase initialization logic goes here
                console.log("Firebase Connection Established");
            } else {
                err.style.display = 'block';
                setTimeout(() => err.style.display = 'none', 2000);
            }
        }
    };

    // আপনার Firebase কনফিগারেশন এখানে দিলে সার্ভার কাজ শুরু করবে
    /*
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "YOUR_DB_URL",
        projectId: "YOUR_PROJECT_ID",
    };
    */
</script>
</body>
</html>
