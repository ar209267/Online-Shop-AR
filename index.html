<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Shop AR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron',sans-serif;
}

body{
    background:#050505;
    color:white;
}

/* LOGIN */

.login-page{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:320px;
    background:#111;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px #00ffb3;
}

.login-box h1{
    color:#00ffb3;
    margin-bottom:10px;
}

.login-box p{
    color:#aaa;
    margin-bottom:20px;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#00ffb3;
    color:black;
}

/* MAIN PANEL */

.main-panel{
    display:none;
    padding:20px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    color:#00ffb3;
    font-size:32px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#111;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px #00ffb344;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    color:#00ffb3;
    margin-bottom:10px;
}

.price{
    font-size:24px;
    margin:10px 0;
}

.order-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00ffb3;
    color:black;
    cursor:pointer;
    font-weight:bold;
}

.order-btn:hover{
    opacity:0.8;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div class="login-page" id="loginPage">

    <div class="login-box">
        <h1>Online Shop AR</h1>
        <p>Please login to continue</p>

        <button class="login-btn" onclick="login()">
            Sign in with GitHub
        </button>
    </div>

</div>

<!-- MAIN PANEL -->

<div class="main-panel" id="mainPanel">

    <div class="header">
        <h1>ONLINE SHOP AR</h1>
    </div>

    <div class="products">

        <div class="card">
            <h2>Facebook Followers</h2>
            <p>High Quality Followers</p>
            <div class="price">৳150</div>
            <button class="order-btn">Buy Now</button>
        </div>

        <div class="card">
            <h2>Facebook Likes</h2>
            <p>Real Like Service</p>
            <div class="price">৳100</div>
            <button class="order-btn">Buy Now</button>
        </div>

        <div class="card">
            <h2>Meta Verified</h2>
            <p>Verification Service</p>
            <div class="price">৳500</div>
            <button class="order-btn">Buy Now</button>
        </div>

        <div class="card">
            <h2>Instagram Followers</h2>
            <p>Fast Delivery</p>
            <div class="price">৳200</div>
            <button class="order-btn">Buy Now</button>
        </div>

    </div>

</div>

<script>

function login(){

    document.getElementById("loginPage").style.display="none";
    document.getElementById("mainPanel").style.display="block";

}

</script>

</body>
</html>
