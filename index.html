<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq rocky & Gaming Hub - Professional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1dbf73; /* Fiverr Green Theme */
            --bg: #0b0e14;
            --card-bg: #1a1e29;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; overflow-x: hidden; }

        /* Auth Screen */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1e29 0%, #0b0e14 100%);
            z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .auth-card {
            background: var(--card-bg); padding: 35px; border-radius: 30px;
            width: 100%; max-width: 420px; border: 1px solid #2d3748; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .auth-card h2 { color: var(--primary); margin-bottom: 10px; }
        .input-box {
            width: 100%; padding: 15px; margin-top: 15px; border-radius: 12px;
            border: 1px solid #2d3748; background: #0b0e14; color: #fff; outline: none;
        }
        .auth-btn {
            width: 100%; padding: 16px; background: var(--primary); border: none;
            border-radius: 12px; font-weight: bold; cursor: pointer; color: #fff; margin-top: 20px; font-size: 16px;
        }

        /* Main Container */
        .container { max-width: 600px; margin: auto; padding: 20px; display: none; }
        
        /* App Grid */
        .grid-title { font-size: 14px; color: var(--text-dim); margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .app-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
            background: var(--card-bg); padding: 20px; border-radius: 25px; border: 1px solid #2d3748;
        }
        .app-item { text-align: center; cursor: pointer; padding: 10px; border-radius: 15px; }
        .app-item:hover { background: rgba(255,255,255,0.05); transform: translateY(-3px); }
        .app-icon {
            width: 50px; height: 50px; border-radius: 12px; margin: 0 auto 8px;
            display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff;
        }
        .app-item span { font-size: 10px; font-weight: 600; display: block; }

        /* Service Modal */
        #service-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 80%;
            background: var(--card-bg); z-index: 999; border-radius: 30px 30px 0 0;
            padding: 25px; border-top: 2px solid var(--primary); overflow-y: auto;
        }
        #service-modal.active { bottom: 0; }
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7); display:none; z-index: 998;
        }

        .service-row {
            background: rgba(255,255,255,0.03); border: 1px solid #2d3748;
            padding: 15px; border-radius: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .price-btn { background: var(--primary); color: white; padding: 8px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }

        /* Brand Colors */
        .bg-fb { background: #1877F2; } .bg-insta { background: #E4405F; }
        .bg-yt { background: #CD201F; } .bg-tt { background: #000000; }
        .bg-wa { background: #25D366; } .bg-ff { background: #FF8C00; }
        .bg-pubg { background: #F3AD1B; } .bg-cod { background: #333; }
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="auth-screen">
    <div class="auth-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/18/Fiverr_Logo_09.2020.png" width="100" alt="Fiverr Server">
        <p style="color: var(--text-dim); font-size: 13px; margin-top: 10px;">Security Powered by Fiverr Server</p>
        <h2 id="auth-title">Account Login</h2>
        <input type="email" id="email" class="input-box" placeholder="আপনার জিমেইল (যেমন: name@gmail.com)">
        <input type="password" id="pass" class="input-box" placeholder="আপনার পাসওয়ার্ড">
        <button class="auth-btn" onclick="validateAuth()">লগইন / সাইন আপ</button>
        <p id="msg" style="font-size: 12px; margin-top: 15px;"></p>
    </div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModal()"></div>

<div class="container" id="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Atiq SMM Panel</h3>
        <div style="background: var(--primary); padding: 5px 15px; border-radius: 20px; font-weight: bold;">৳ ০.০০</div>
    </div>

    <!-- Social Media Section -->
    <div class="grid-title">Social Platforms</div>
    <div class="app-grid">
        <div class="app-item" onclick="openServices('fb')"><div class="app-icon bg-fb"><i class="fab fa-facebook-f"></i></div><span>Facebook</span></div>
        <div class="app-item" onclick="openServices('insta')"><div class="app-icon bg-insta"><i class="fab fa-instagram"></i></div><span>Instagram</span></div>
        <div class="app-item" onclick="openServices('yt')"><div class="app-icon bg-yt"><i class="fab fa-youtube"></i></div><span>YouTube</span></div>
        <div class="app-item" onclick="openServices('tt')"><div class="app-icon bg-tt"><i class="fab fa-tiktok"></i></div><span>TikTok</span></div>
        <div class="app-item" onclick="openServices('wa')"><div class="app-icon bg-wa"><i class="fab fa-whatsapp"></i></div><span>WhatsApp</span></div>
    </div>

    <!-- Gaming Section -->
    <div class="grid-title">Gaming Center</div>
    <div class="app-grid">
        <div class="app-item" onclick="openServices('ff')"><div class="app-icon bg-ff"><i class="fas fa-fire"></i></div><span>Free Fire</span></div>
        <div class="app-item" onclick="openServices('pubg')"><div class="app-icon bg-pubg"><i class="fas fa-gun"></i></div><span>PUBG UC</span></div>
        <div class="app-item" onclick="openServices('cod')"><div class="app-icon bg-cod"><i class="fas fa-helmet-safety"></i></div><span>COD Mobile</span></div>
    </div>
</div>

<!-- Service Details Modal -->
<div id="service-modal">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 id="modal-name" style="margin:0; color: var(--primary);">Services</h3>
        <i class="fas fa-times" onclick="closeModal()" style="cursor:pointer; font-size: 20px;"></i>
    </div>
    <div id="service-list"></div>
</div>

<script>
    // Security & Auth Logic
    function validateAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const msg = document.getElementById('msg');

        // জিমেইল ভ্যালিডেশন (Real vs Fake check)
        const emailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
        
        if (!emailPattern.test(email)) {
            msg.style.color = "#e74c3c";
            msg.innerText = "দয়া করে একটি সঠিক @gmail.com অ্যাড্রেস দিন।";
            return;
        }

        if (pass.length < 6) {
            msg.style.color = "#e74c3c";
            msg.innerText = "পাসওয়ার্ড অন্তত ৬ অক্ষরের হতে হবে।";
            return;
        }

        // Success - Login
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }

    const data = {
        fb: { name: "Facebook Boost", items: [
            {n: "Followers (Profile)", p: "৳ ১৩০"},
            {n: "Page Like + Follow", p: "৳ ১৬০"},
            {n: "Video View (1k)", p: "৳ ৪৫"},
            {n: "60k Min Watchtime", p: "৳ ৪৫০"}
        ]},
        ff: { name: "Free Fire Diamond", items: [
            {n: "115 Diamonds", p: "৳ ৮৫"},
            {n: "240 Diamonds", p: "৳ ১৬৫"},
            {n: "610 Diamonds", p: "৳ ৪৩০"},
            {n: "Weekly Membership", p: "৳ ১৬০"}
        ]},
        pubg: { name: "PUBG Mobile UC", items: [
            {n: "60 UC", p: "৳ ৯৫"},
            {n: "325 UC", p: "৳ ৪১০"},
            {n: "Royal Pass", p: "৳ ৭৫০"}
        ]},
        yt: { name: "YouTube Services", items: [
            {n: "1k Subscribers", p: "৳ ৪৮০"},
            {n: "4k Watch Hours", p: "৳ ১৬০০"},
            {n: "YouTube Views", p: "৳ ৯০"}
        ]},
        tt: { name: "TikTok Boost", items: [
            {n: "TikTok Followers", p: "৳ ১৯০"},
            {n: "TikTok Video Likes", p: "৳ ৩০"},
            {n: "TikTok Views", p: "৳ ১০"}
        ]}
    };

    function openServices(key) {
        const modal = document.getElementById('service-modal');
        const overlay = document.getElementById('overlay');
        const list = document.getElementById('service-list');
        const serviceData = data[key] || { name: "Coming Soon", items: [] };

        document.getElementById('modal-name').innerText = serviceData.name;
        list.innerHTML = '';

        serviceData.items.forEach(item => {
            list.innerHTML += `
                <div class="service-row">
                    <div>
                        <b>${item.n}</b><br>
                        <small style="color:var(--text-dim)">Fast Delivery</small>
                    </div>
                    <button class="price-btn" onclick="initPay('${item.n}', '${item.p}')">${item.p}</button>
                </div>
            `;
        });

        modal.classList.add('active');
        overlay.style.display = 'block';
    }

    function closeModal() {
        document.getElementById('service-modal').classList.remove('active');
        document.getElementById('overlay').style.display = 'none';
    }

    function initPay(item, price) {
        alert(`পেমেন্ট গেটওয়ে লোড হচ্ছে...\nপ্রোডাক্ট: ${item}\nমূল্য: ${price}\nবিকাশ/নগদ এর মাধ্যমে পেমেন্ট সম্পন্ন করুন।`);
    }
</script>

</body>
</html>
