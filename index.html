<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR ULTIMATE HUB | Independent Server</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --main: #0d1117; --gold: #ffd700; --panel: #161b22; --border: #30363d; }
        body { background: var(--main); color: #c9d1d9; font-family: 'Hind Siliguri', sans-serif; margin: 0; }

        /* --- DIRECT ACCESS UI --- */
        #login-overlay { position: fixed; inset: 0; background: var(--main); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--panel); padding: 40px; border-radius: 25px; border: 1px solid var(--border); width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .login-card h2 { color: var(--gold); font-weight: 800; margin-bottom: 30px; }
        .form-control { background: #010409; border: 1px solid var(--border); color: #fff; padding: 12px; margin-bottom: 20px; border-radius: 10px; }
        .form-control:focus { background: #010409; color: #fff; border-color: var(--gold); box-shadow: none; }
        .btn-start { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: 900; font-size: 18px; }

        /* --- DASHBOARD --- */
        .header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 15px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 25px; text-align: center; margin-top: 20px; }
        .stat-card h2 { color: var(--gold); font-weight: 800; }
        .log-box { background: #000; border: 1px solid var(--border); border-radius: 10px; padding: 20px; font-family: monospace; font-size: 13px; color: #00ff00; height: 150px; overflow-y: auto; margin-top: 20px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <i class="fas fa-unlock-alt fa-4x text-warning mb-4"></i>
        <h2>CORE ACCESS</h2>
        <input type="text" id="u-name" class="form-control text-center" placeholder="আপনার নাম (Atique)">
        <input type="password" id="u-pass" class="form-control text-center" placeholder="পাসওয়ার্ড: 83৮৯৮০৬৩ @#">
        <button class="btn-start" onclick="Hub.login()">START SERVER</button>
        <p id="err" class="text-danger mt-3 small" style="display:none;">ভুল তথ্য! আবার চেষ্টা করুন।</p>
    </div>
</div>

<div id="hub-main" style="display:none;">
    <nav class="header">
        <div class="container d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold"><i class="fas fa-bolt text-warning me-2"></i> AR ULTIMATE SERVER</h5>
            <button class="btn btn-sm btn-outline-danger" onclick="location.reload()">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row g-3">
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <small class="text-muted">Users</small>
                    <h2 class="m-0">1,580</h2>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <small class="text-muted">Balance</small>
                    <h2 class="m-0">৳ 42K</h2>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <small class="text-muted">Pending</small>
                    <h2 class="m-0 text-warning">12</h2>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card">
                    <small class="text-muted">Status</small>
                    <h2 class="m-0 text-success">Live</h2>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6 mb-3">
                <div class="stat-card py-4" onclick="alert('User control active')">
                    <i class="fas fa-users-cog fa-2x mb-3 text-primary"></i>
                    <h6>ইউজার কন্ট্রোল</h6>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="stat-card py-4" onclick="alert('Payment module ready')">
                    <i class="fas fa-check-circle fa-2x mb-3 text-success"></i>
                    <h6>পেমেন্ট ভেরিফাই</h6>
                </div>
            </div>
        </div>

        <div class="log-box" id="console">
            [SYSTEM] Waiting for credentials...<br>
        </div>
    </div>
</div>

<script>
    // ওস্তাদ, আপনার দেওয়া তথ্য এখানে সেট করা
    const MASTER = {
        user: "Atique",
        pass: "83৮৯৮০৬৩ @#"
    };

    const Hub = {
        login: () => {
            const name = document.getElementById('u-name').value;
            const pass = document.getElementById('u-pass').value;
            const err = document.getElementById('err');

            if(name === MASTER.user && pass === MASTER.pass) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('hub-main').style.display = 'block';
                Hub.log("Success: Admin '" + name + "' Session Started.");
                Hub.log("Database Sync: Initialized.");
            } else {
                err.style.display = 'block';
                Hub.log("Warning: Invalid login attempt.");
                setTimeout(() => err.style.display = 'none', 2500);
            }
        },
        log: (m) => {
            const c = document.getElementById('console');
            c.innerHTML += `> [${new Date().toLocaleTimeString()}] ${m}<br>`;
            c.scrollTop = c.scrollHeight;
        }
    };
</script>
</body>
</html>
