<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq SMM Master V12 - Live Server</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #f1c40f; --bg: #05080d; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; transition: 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }

        /* Auth Screen */
        #login-screen { position: fixed; inset: 0; background: #05080d; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 35px 25px; border-radius: 25px; width: 100%; max-width: 400px; backdrop-filter: blur(15px); text-align: center; }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #334155; background: rgba(0,0,0,0.5); color: #fff; outline: none; }
        .login-btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--primary); color: #000; font-weight: bold; border: none; cursor: pointer; }

        /* Dashboard Styles */
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .header { background: var(--glass); padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .app-item { background: var(--glass); border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 12px; overflow: hidden; }
        .app-header { display: flex; align-items: center; padding: 15px; cursor: pointer; }
        .service-list { display: none; padding: 10px 15px; background: rgba(0,0,0,0.2); }
        .app-item.open .service-list { display: block; }
        .service-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .price { color: var(--primary); font-weight: bold; }
        
        /* Payment Box */
        .pay-box { background: #fff; color: #000; border-radius: 20px; padding: 25px; margin-top: 25px; border: 4px solid var(--primary); text-align: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--primary)">ATIQUI SERVER LOGIN</h2>
        <input type="email" id="email" placeholder="example@gmail.com">
        <input type="password" id="pass" placeholder="পাসওয়ার্ড">
        <button class="login-btn" onclick="handleLogin()">লগইন / সাইন-আপ</button>
        <p id="msg" style="color: #ff4757; font-size: 11px; margin-top: 10px;"></p>
    </div>
</div>

<div id="dashboard" style="display:none;">
    <div class="container">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" width="45">
                <div><b id="user-display">User</b><br><small style="color:var(--primary)">ব্যালেন্স: ৳ ৫৪০</small></div>
            </div>
            <i class="fas fa-fingerprint fa-2x" style="color:var(--primary)"></i>
        </div>

        <div class="app-list">
            <div class="app-item" onclick="this.classList.toggle('open')">
                <div class="app-header">
                    <i class="fab fa-facebook-f" style="color:#1877f2; margin-right:15px; font-size:20px;"></i>
                    <b>Facebook Services</b>
                </div>
                <div class="service-list">
                    <div class="service-row" onclick="placeOrder('FB Follower', 130)"><span>Follower (5k)</span> <span class="price">৳১৩০</span></div>
                    <div class="service-row" onclick="placeOrder('FB Likes', 50)"><span>Post Likes</span> <span class="price">৳৫০</span></div>
                </div>
            </div>
            
            <div class="app-item" onclick="this.classList.toggle('open')">
                <div class="app-header">
                    <i class="fas fa-fire" style="color:#ff8c00; margin-right:15px; font-size:20px;"></i>
                    <b>Gaming Top-up</b>
                </div>
                <div class="service-list">
                    <div class="service-row" onclick="placeOrder('FF Diamond', 80)"><span>115 Diamonds</span> <span class="price">৳৮০</span></div>
                </div>
            </div>
        </div>

        <div class="pay-box">
            <b>বিকাশ/নগদ: ০১৭৬৬৩৮০৯৩১</b>
            <button class="login-btn" style="margin-top:10px;">ব্যালেন্স অ্যাড</button>
        </div>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyC5i7S0EJeF08NsO7VbiU63r-",
        authDomain: "online-shop-ar.firebaseapp.com",
        databaseURL: "https://online-shop-ar-default-rtdb.firebaseio.com",
        projectId: "online-shop-ar",
        storageBucket: "online-shop-ar.appspot.com",
        messagingSenderId: "913434308973",
        appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function handleLogin() {
        const email = document.getElementById('email').value.replace(/\./g, '_'); // Firebase keys can't have dots
        const pass = document.getElementById('pass').value;
        const msg = document.getElementById('msg');

        if(!email.includes('@gmail_com')) {
            msg.innerText = "সঠিক জিমেইল দিন!"; return;
        }

        database.ref('users/' + email).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                if (snapshot.val().password === pass) {
                    showDashboard(email);
                } else {
                    msg.innerText = "ভুল পাসওয়ার্ড!";
                }
            } else {
                database.ref('users/' + email).set({ password: pass });
                showDashboard(email);
            }
        });
    }

    function showDashboard(user) {
        window.currentUser = user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('user-display').innerText = user.split('@')[0];
    }

    function placeOrder(service, price) {
        const orderId = Date.now();
        database.ref('orders/' + orderId).set({
            user: window.currentUser,
            service: service,
            price: price,
            status: 'Pending',
            time: new Date().toLocaleString()
        }).then(() => {
            alert("অর্ডার সফল! সার্ভারে সেভ হয়েছে।");
        });
    }
</script>
</body>
</html>
