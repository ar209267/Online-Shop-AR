<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR ULTIMATE DIGITAL HUB | Secure OS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #00e5ff;
            --bg: #030508;
            --card: #0d1117;
            --neon: 0 0 20px rgba(138, 43, 226, 0.4);
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Hind Siliguri', sans-serif;
            overflow-x: hidden;
        }

        /* --- STAGE 1: MASTER AUTH SYSTEM --- */
        #auth-layer {
            position: fixed; inset: 0; background: #000; z-index: 99999;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--card); padding: 50px; border-radius: 40px;
            border: 2px solid var(--primary); box-shadow: var(--neon);
            max-width: 450px; width: 90%; text-align: center;
        }

        /* --- STAGE 2: PRE-LEVEL UI/UX --- */
        .navbar { background: rgba(0,0,0,0.8); backdrop-filter: blur(25px); border-bottom: 1px solid #1f2937; }
        .nav-title { font-family: 'Urbanist', sans-serif; font-weight: 900; letter-spacing: 2px; }

        .category-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .cat-btn { 
            background: #161b22; border: 1px solid #30363d; padding: 12px 25px; 
            border-radius: 50px; white-space: nowrap; cursor: pointer; transition: 0.3s;
        }
        .cat-btn.active { background: var(--primary); border-color: #fff; box-shadow: var(--neon); }

        .service-box {
            background: #161b22; border-radius: 25px; border: 1px solid #30363d;
            transition: 0.5s; overflow: hidden; height: 100%; position: relative;
        }
        .service-box:hover { transform: scale(1.05); border-color: var(--secondary); }
        .img-wrap { height: 150px; background: #000; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* --- STAGE 3: SECURE PAYMENT GATEWAY --- */
        #gateway-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 10000; align-items: center; justify-content: center;
        }
        .gateway-box { background: #fff; color: #000; width: 95%; max-width: 420px; border-radius: 20px; overflow: hidden; }
        .bkash-top { background: #d12053; color: #fff; padding: 30px; text-align: center; }

        /* --- STAGE 4: MASTER DATA LOGS (REALISTIC SERVER) --- */
        .server-logs { background: #0d1117; padding: 30px; border-radius: 25px; border: 1px solid #238636; margin-top: 60px; }
        .status-badge { padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .status-pending { background: #d29922; color: #000; }
    </style>
</head>
<body>

<div id="auth-layer">
    <div class="auth-card">
        <div class="mb-4 text-primary"><i class="fas fa-fingerprint fa-4x"></i></div>
        <h2 class="nav-title mb-1">AR SYSTEM <span class="text-secondary">X</span></h2>
        <p class="text-secondary small mb-5">ENCRYPTED ACCESS ONLY</p>
        <input type="password" id="sys-pin" class="form-control bg-dark text-white border-primary text-center py-3 mb-3 rounded-pill" placeholder="Enter System PIN">
        <button class="btn btn-primary w-100 py-3 fw-bold rounded-pill" onclick="runAuth()">UNLOCK SYSTEM</button>
    </div>
</div>

<div id="hub-container" style="display:none;">
    <nav class="navbar navbar-dark p-3 sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="nav-title h4 m-0">AR <span class="text-primary">ULTIMATE</span></div>
            <div class="badge bg-success py-2 px-3"><i class="fas fa-shield-alt"></i> SERVER SECURED</div>
        </div>
    </nav>

    <div class="container mt-5">
        <div id="home-view">
            <div class="category-scroll mb-5">
                <div class="cat-btn active" onclick="Core.filter('all')">সব সার্ভিস</div>
                <div class="cat-btn" onclick="Core.filter('game')">গেমিং টপ-আপ</div>
                <div class="cat-btn" onclick="Core.filter('social')">সোশ্যাল মার্কেটিং</div>
                <div class="cat-btn" onclick="Core.filter('premium')">প্রিমিয়াম সফটওয়্যার</div>
            </div>

            <div class="row g-4" id="grid-render"></div>
        </div>

        <div id="package-panel" style="display:none;">
            <div class="row">
                <div class="col-lg-8">
                    <div class="service-box p-4">
                        <button class="btn btn-sm text-secondary mb-3" onclick="Core.back()"><i class="fas fa-chevron-left"></i> ফিরে যান</button>
                        <h2 id="view-name" class="fw-bold text-primary mb-4"></h2>
                        <div id="pkg-render" class="row g-3"></div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="service-box p-4">
                        <h5 class="fw-bold mb-4">অর্ডার ডিটেইলস</h5>
                        <input type="text" id="target-input" class="form-control bg-dark text-white border-secondary py-3 mb-4" placeholder="ID বা লিঙ্ক দিন">
                        <button class="btn btn-primary w-100 py-3 fw-bold" onclick="Payment.init()">পেমেন্ট প্রসেস করুন</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="server-logs">
            <h5 class="text-success fw-bold mb-4"><i class="fas fa-terminal me-2"></i> MASTER TRANSACTION DATABASE</h5>
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle">
                    <thead><tr class="text-secondary small"><th>ID</th><th>TIME</th><th>SERVICE</th><th>TARGET</th><th>TrxID</th><th>STATUS</th></tr></thead>
                    <tbody id="log-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="gateway-modal">
    <div class="gateway-box shadow-lg">
        <div class="bkash-top">
            <h4 class="m-0 fw-bold">AR Secure Gateway</h4>
            <small>বিকাশ/নগদ/রকেট (Personal)</small>
        </div>
        <div class="p-4">
            <div class="d-flex justify-content-between mb-2"><span>মোট টাকা:</span><strong id="final-price" class="text-danger"></strong></div>
            <div class="p-3 bg-light rounded border mb-4">
                পেমেন্ট নম্বর: <strong class="text-dark">01766 380 931</strong>
            </div>
            <label class="small text-secondary mb-1">ট্রানজেকশন আইডি (TrxID)</label>
            <input type="text" id="trx-input" class="form-control mb-3 py-3" placeholder="Ex: 9KLA8XJ">
            <button class="btn btn-danger w-100 py-3 fw-bold" onclick="Payment.confirm()">CONFIRM PAYMENT</button>
            <button class="btn btn-link w-100 text-secondary btn-sm mt-2 text-decoration-none" onclick="Payment.close()">Cancel</button>
        </div>
    </div>
</div>

<script>
/**
 * AR CORE v10.0 ENGINE
 * Logic: Hyper-Dynamic Framework
 */

const DATA = [
    { id: 1, c: 'game', n: 'Free Fire Diamond', i: 'https://logodownload.org/wp-content/uploads/2019/06/free-fire-logo-1.png', p: [{n:'115💎', p:85}, {n:'505💎', p:340}, {n:'Weekly', p:165}] },
    { id: 2, c: 'game', n: 'PUBG UC', i: 'https://w7.pngwing.com/pngs/380/638/png-transparent-pubg-mobile-logo-iphone-6-plus-video-game-playerunknown-s-battlegrounds-logo-t-shirt-battle-royale-game-thumbnail.png', p: [{n:'60 UC', p:80}, {n:'325 UC', p:420}] },
    { id: 3, c: 'social', n: 'FB Follower', i: 'https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg', p: [{n:'1K Follower', p:150}, {n:'5K Follower', p:650}] },
    { id: 4, c: 'social', n: 'TikTok Services', i: 'https://upload.wikimedia.org/wikipedia/en/a/a9/TikTok_logo.svg', p: [{n:'1K Follower', p:120}, {n:'10K Views', p:45}] },
    { id: 5, c: 'premium', n: 'Canva Pro', i: 'https://upload.wikimedia.org/wikipedia/commons/0/08/Canva_icon_2021.svg', p: [{n:'1 Year Private', p:450}] },
    { id: 6, c: 'premium', n: 'Windows Key', i: 'https://upload.wikimedia.org/wikipedia/commons/c/c1/Windows_11_logo.svg', p: [{n:'Win 11 Retail', p:750}] }
];

let state = { selected: null, pkg: null, target: "" };

function runAuth() {
    if(document.getElementById('sys-pin').value === "1234") {
        document.getElementById('auth-layer').style.display = 'none';
        document.getElementById('hub-container').style.display = 'block';
        Core.init();
    } else { alert("ACCESS DENIED"); }
}

const Core = {
    init: () => { Core.render('all'); Core.loadLogs(); },
    render: (cat) => {
        const grid = document.getElementById('grid-render');
        grid.innerHTML = '';
        const list = cat === 'all' ? DATA : DATA.filter(x => x.c === cat);
        list.forEach(s => {
            grid.innerHTML += `
            <div class="col-6 col-lg-3">
                <div class="service-box" onclick="Core.open(${s.id})">
                    <div class="img-wrap"><img src="${s.i}"></div>
                    <div class="p-3 text-center">
                        <small class="text-primary fw-bold text-uppercase">${s.c}</small>
                        <h6 class="fw-bold m-0 mt-1">${s.n}</h6>
                    </div>
                </div>
            </div>`;
        });
    },
    filter: (cat) => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        Core.render(cat);
    },
    open: (id) => {
        state.selected = DATA.find(x => x.id === id);
        document.getElementById('view-name').innerText = state.selected.n;
        const pkgs = document.getElementById('pkg-render');
        pkgs.innerHTML = '';
        state.selected.p.forEach(p => {
            pkgs.innerHTML += `
            <div class="col-12 col-md-6">
                <div class="p-3 service-box d-flex justify-content-between" onclick="Core.selectPkg(this, '${p.n}', '${p.p}')">
                    <span>${p.n}</span><strong>৳${p.p}</strong>
                </div>
            </div>`;
        });
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('package-panel').style.display = 'block';
    },
    selectPkg: (el, n, p) => {
        state.pkg = { n, p };
        document.querySelectorAll('#pkg-render .service-box').forEach(x => x.style.borderColor = '#30363d');
        el.style.borderColor = '#00e5ff';
    },
    back: () => {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('package-panel').style.display = 'none';
    },
    loadLogs: () => {
        const logs = JSON.parse(localStorage.getItem('ar_logs')) || [];
        document.getElementById('log-body').innerHTML = logs.map(l => `
            <tr>
                <td class="text-primary fw-bold">${l.id}</td>
                <td class="small">${l.time}</td>
                <td>${l.service}</td>
                <td><code>${l.target}</code></td>
                <td>${l.trx}</td>
                <td><span class="status-badge status-pending">PENDING</span></td>
            </tr>`).join('') || '<tr><td colspan="6" class="text-center py-5">No Database Logs Found</td></tr>';
    }
};

const Payment = {
    init: () => {
        state.target = document.getElementById('target-input').value;
        if(!state.pkg || !state.target) return alert("প্যাকেজ এবং টার্গেট আইডি দিন!");
        document.getElementById('final-price').innerText = "৳" + state.pkg.p;
        document.getElementById('gateway-modal').style.display = 'flex';
    },
    close: () => { document.getElementById('gateway-modal').style.display = 'none'; },
    confirm: () => {
        const trx = document.getElementById('trx-input').value;
        if(trx.length < 8) return alert("সঠিক ট্রানজেকশন আইডি দিন!");
        
        const order = {
            id: "#AR-" + Math.floor(100000 + Math.random() * 900000),
            time: new Date().toLocaleString(),
            service: state.selected.n + " (" + state.pkg.n + ")",
            target: state.target,
            trx: trx
        };

        let logs = JSON.parse(localStorage.getItem('ar_logs')) || [];
        logs.unshift(order);
        localStorage.setItem('ar_logs', JSON.stringify(logs));

        alert("অর্ডার সফল! সার্ভারে তথ্য পাঠানো হয়েছে।\nঅর্ডার আইডি: " + order.id);
        location.reload();
    }
};
</script>

</body>
</html>
