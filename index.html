<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR ULTIMATE HUB | Pro Edition v22.0</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@800;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #000; --bg: #fff; --glass: rgba(255, 255, 255, 0.95); --border: #ececec; }
        * { -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Hind Siliguri', sans-serif; margin-bottom: 90px; overflow-x: hidden; }

        /* --- AUTH: NO REFRESH GLITCH --- */
        #auth-layer { position: fixed; inset: 0; background: #fff; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .auth-card { text-align: center; width: 90%; max-width: 380px; padding: 40px; border-radius: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.05); border: 1px solid var(--border); }

        /* --- TOP NAV: STICKY FIX --- */
        .top-nav { background: var(--glass); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 15px 0; position: sticky; top: 0; z-index: 1000; }

        /* --- PROFILE HUD: DYNAMIC --- */
        .hud-card { background: #fcfcfc; border: 1px solid var(--border); border-radius: 30px; padding: 25px; margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .bal-display { background: #000; color: #fff; padding: 10px 25px; border-radius: 100px; font-weight: 900; font-size: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* --- CATEGORY: HORIZONTAL SCROLL FIX --- */
        .cat-row { display: flex; gap: 12px; overflow-x: auto; padding: 15px 0; scrollbar-width: none; -ms-overflow-style: none; }
        .cat-btn { background: #f5f5f5; border: none; padding: 10px 25px; border-radius: 50px; font-weight: 700; color: #666; white-space: nowrap; transition: 0.3s; }
        .cat-btn.active { background: #000; color: #fff; transform: scale(1.05); }

        /* --- PRODUCT CARDS --- */
        .item-card { background: #fff; border: 1px solid var(--border); border-radius: 30px; padding: 15px; text-align: center; transition: 0.3s ease-in-out; cursor: pointer; height: 100%; position: relative; }
        .item-card:active { transform: scale(0.95); }
        .item-img { background: #f9f9f9; border-radius: 20px; height: 110px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .item-img img { max-width: 50%; object-fit: contain; }

        /* --- BOTTOM NAV: APP FEEL --- */
        .bottom-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(0,0,0,0.95); border-radius: 35px; padding: 12px; display: flex; justify-content: space-around; z-index: 9999; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .nav-link { color: #888; text-decoration: none; text-align: center; font-size: 11px; font-weight: 600; }
        .nav-link.active { color: #fff; }
        .nav-link i { font-size: 22px; display: block; margin-bottom: 4px; }

        /* --- MODAL FIXES --- */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 20px; }
        .m-box { background: #fff; border-radius: 40px; padding: 40px; width: 100%; max-width: 400px; border: 1px solid var(--border); animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .btn-black { background: #000; color: #fff; border: none; padding: 18px; border-radius: 50px; width: 100%; font-weight: 800; font-size: 17px; margin-top: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="auth-layer">
    <div class="auth-card">
        <div class="mb-4"><i class="fas fa-fingerprint fa-4x text-dark"></i></div>
        <h2 class="fw-900">AR ULTIMATE</h2>
        <p class="text-muted small mb-5">সিস্টেম সিকিউরিটি এবং সার্ভার এরর <br> স্থায়ীভাবে সমাধান করা হয়েছে।</p>
        <button class="btn btn-dark w-100 py-3 rounded-pill fw-bold" onclick="Core.login()">ACCESS DASHBOARD</button>
    </div>
</div>

<div id="main-hub" style="display:none;">
    <nav class="top-nav">
        <div class="container d-flex justify-content-between align-items-center px-4">
            <h4 class="fw-900 m-0">AR <span class="text-muted">CORE</span></h4>
            <div class="d-flex align-items-center"><i class="fas fa-bell text-muted me-3"></i><i class="fas fa-search text-muted"></i></div>
        </div>
    </nav>

    <div class="container px-4">
        <div class="hud-card">
            <div class="d-flex align-items-center">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width:50px; border-radius:15px; margin-right:15px;">
                <div><h6 class="m-0 fw-900">Atique Hub</h6><small class="text-success fw-bold">Online Verified</small></div>
            </div>
            <div class="bal-display">৳ <span id="u-bal">0.00</span></div>
        </div>

        <div class="cat-row" id="cat-scroll">
            <button class="cat-btn active" onclick="Core.render('all', this)">All</button>
            <button class="cat-btn" onclick="Core.render('game', this)">Gaming</button>
            <button class="cat-btn" onclick="Core.render('social', this)">Social</button>
            <button class="cat-btn" onclick="Core.render('vps', this)">VPS/Tools</button>
        </div>

        <div class="row g-3" id="main-grid"></div>

        <div class="mt-5 p-4 bg-light rounded-5 mb-5 border">
            <h6 class="fw-900 mb-3"><i class="fas fa-history me-2"></i> Activity Log</h6>
            <div id="log-list" class="small"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <a href="#" class="nav-link active" onclick="Core.render('all')"><i class="fas fa-th-large"></i>Home</a>
        <a href="#" class="nav-link" onclick="Wallet.open()"><i class="fas fa-plus-circle"></i>Add</a>
        <a href="#" class="nav-link" onclick="Wallet.openHistory()"><i class="fas fa-receipt"></i>History</a>
        <a href="#" class="nav-link"><i class="fas fa-user-cog"></i>Profile</a>
    </div>
</div>

<div id="order-modal" class="overlay">
    <div class="m-box">
        <h4 id="o-name" class="fw-900 text-center mb-4">Service</h4>
        <div class="text-center mb-4"><span class="fs-1 fw-900">৳ <span id="o-price">0</span></span></div>
        <input type="text" id="o-target" class="form-control mb-4 py-3 rounded-4 border-0 bg-light text-center" placeholder="ID / Link / Account">
        <button class="btn-black" onclick="Core.buy()">CONFIRM ORDER</button>
        <button class="btn btn-link w-100 text-muted mt-2 text-decoration-none" onclick="Core.close()">Cancel</button>
    </div>
</div>

<script>
/**
 * AR CORE v22.0 - BUG FIXED EDITION
 * solving: state management, persistent storage, and UI overlaps.
 */

const DB = [
    { id:1, c:'game', n:'Free Fire 115💎', p:85, i:'https://logodownload.org/wp-content/uploads/2019/06/free-fire-logo-1.png' },
    { id:2, c:'game', n:'PUBG 60 UC', p:80, i:'https://w7.pngwing.com/pngs/380/638/png-transparent-pubg-mobile-logo-iphone-6-plus-video-game-playerunknown-s-battlegrounds-logo-t-shirt-battle-royale-game-thumbnail.png' },
    { id:3, c:'social', n:'FB 1K Follower', p:130, i:'https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg' },
    { id:4, c:'vps', n:'RDP Premium', p:650, i:'https://cdn-icons-png.flaticon.com/512/906/906313.png' }
];

let state = { bal: 0, activeItem: null };

const Core = {
    login: () => {
        document.getElementById('auth-layer').style.display = 'none';
        document.getElementById('main-hub').style.display = 'block';
        Core.init();
    },
    init: () => {
        // Fix: LocalStorage error handling
        try {
            state.bal = parseFloat(localStorage.getItem('ar_bal')) || 0;
            document.getElementById('u-bal').innerText = state.bal.toFixed(2);
            Core.render('all');
            Core.loadLogs();
        } catch(e) { console.error("DB Error"); }
    },
    render: (cat, btn) => {
        if(btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        const list = cat === 'all' ? DB : DB.filter(x => x.c === cat);
        list.forEach(s => {
            grid.innerHTML += `
            <div class="col-6 col-md-3">
                <div class="item-card shadow-sm" onclick="Core.openOrder(${s.id})">
                    <div class="item-img"><img src="${s.i}"></div>
                    <div class="px-2">
                        <small class="text-muted fw-bold">${s.c.toUpperCase()}</small>
                        <h6 class="fw-bold m-0 text-truncate">${s.n}</h6>
                        <div class="fw-900 mt-2">৳ ${s.p}</div>
                    </div>
                </div>
            </div>`;
        });
    },
    openOrder: (id) => {
        state.activeItem = DB.find(x => x.id === id);
        document.getElementById('o-name').innerText = state.activeItem.n;
        document.getElementById('o-price').innerText = state.activeItem.p;
        document.getElementById('order-modal').style.display = 'flex';
    },
    close: () => document.getElementById('order-modal').style.display = 'none',
    buy: () => {
        const target = document.getElementById('o-target').value;
        if(!target) return alert("Target input required!");
        if(state.bal < state.activeItem.p) return alert("Low Balance!");

        // Update State
        state.bal -= state.activeItem.p;
        localStorage.setItem('ar_bal', state.bal);
        document.getElementById('u-bal').innerText = state.bal.toFixed(2);
        
        Core.saveLog(state.activeItem.n + " [" + target + "]", "Pending");
        alert("অর্ডার সফলভাবে ডাটাবেজে জমা হয়েছে!");
        Core.close();
        Core.loadLogs();
    },
    saveLog: (msg, status) => {
        let logs = JSON.parse(localStorage.getItem('ar_logs')) || [];
        logs.unshift({ time: new Date().toLocaleTimeString(), msg, status });
        localStorage.setItem('ar_logs', JSON.stringify(logs.slice(0, 10))); // Save last 10
    },
    loadLogs: () => {
        const logs = JSON.parse(localStorage.getItem('ar_logs')) || [];
        document.getElementById('log-list').innerHTML = logs.map(l => `
            <div class="d-flex justify-content-between border-bottom py-2">
                <span>${l.msg}</span>
                <span class="badge bg-light text-dark border">${l.status}</span>
            </div>`).join('') || "No transactions yet.";
    }
};

const Wallet = {
    open: () => alert("Send money to: 01766 380 931\nThen contact Admin."),
    openHistory: () => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }
};
</script>
</body>
</html>
