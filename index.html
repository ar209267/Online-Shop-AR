<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop AR - Gaming & SMM Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0e14; color: #c9d1d9; font-family: sans-serif; }
        .navbar { background-color: #161b22; border-bottom: 2px solid #58a6ff; }
        .balance-card { background: linear-gradient(135deg, #1f6feb, #111); border-radius: 15px; padding: 30px; margin-top: 20px; text-align: center; }
        .service-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
        .service-img { width: 100%; height: 150px; object-fit: contain; background: #000; padding: 10px; }
        .btn-order { background-color: #238636; color: white; border: none; width: 100%; padding: 10px; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark p-3">
    <div class="container"><a class="navbar-brand" href="#">ONLINE SHOP AR</a></div>
</nav>

<div class="container">
    <div class="balance-card">
        <h3>Current Balance</h3>
        <h1 id="balanceDisplay">৳0.00</h1>
    </div>

    <h3 class="mt-4">Our Services</h3>
    <div class="row">
        <div class="col-md-4">
            <div class="service-card text-center">
                <img src="https://i.ibb.co/LhYpY0P/freefire-logo.png" class="service-img">
                <div class="p-3">
                    <h5>Free Fire Diamond</h5>
                    <button class="btn-order">Order Now</button>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6 p-3">
            <div style="background:#161b22; padding:20px; border-radius:10px; border:1px solid #30363d;">
                <h4>Add Fund</h4>
                <p>Bkash/Nagad: 01766 380 931</p>
                <input type="number" class="form-control mb-2" placeholder="Amount">
                <input type="text" class="form-control mb-2" placeholder="Transaction ID">
                <button class="btn btn-primary w-100">Verify Payment</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
