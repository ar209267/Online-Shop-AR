<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq Master SMM - Final Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1dbf73;
            --bg: #05070a;
            --card-bg: #11151c;
            --card-border: #1e2530;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ff4757;
            --bkash: #e2136e;
            --nagad: #f7941d;
        }

        * { box-sizing: border-box; transition: 0.3s; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        /* --- Auth Layer (Fixed Login Issue) --- */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 99999; display: flex; align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.5s ease;
        }
        .auth-card {
            background: var(--card-bg); padding: 40px; border-radius: 30px;
            width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--card-border);
            box-shadow: 0 0 30px rgba(29, 191, 115, 0.2);
        }
        .input-field {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--card-border);
            background: #000; color: #fff; outline: none; margin-top: 10px; margin-bottom: 15px; font-size: 16px;
        }

        /* --- Dashboard UI --- */
        .top-dash { padding: 30px 20px; background: var(--card-bg); border-radius: 0 0 35px 35px; border-bottom: 2px solid var(--primary); }
        .wallet-card {
            background: linear-gradient(135deg, #1dbf73 0%, #158a52 100%);
            padding: 25px; border-radius: 25px; margin-top: 20px;
            box-shadow: 0 15px 30px rgba(29, 191, 115, 0.3);
        }

        /* --- Service Selection --- */
        .section-header { padding: 25px 20px 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; font-size: 12px; }
        .grid-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .service-card {
            background: var(--card-bg); padding: 25px 15px; border-radius: 25px;
            text-align: center; border: 1px solid var(--card-border); cursor: pointer;
        }
        .service-card i { font-size: 35px; margin-bottom: 12px; display: block; }

        /* --- Payment Modal --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 2000; backdrop-filter: blur(8px); }
        .pay-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card-bg); border-radius: 35px; width: 95%; max-width: 420px;
            padding: 30px; z-index: 2001; display: none; border: 1px solid var(--primary);
        }
        .copy-box { background: #000; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px dashed var(--primary); margin: 15px 0; }
        
        .btn-confirm { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 15px; color: white; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        /* --- Bottom Nav --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; max-width: 500px; left: 50%; transform: translateX(-50%);
            background: #11151c; display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid var(--card-border); border-radius: 30px 30px 0 0;
        }
        .nav-link { color: var(--text-dim); text-align: center; font-size: 11px; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h2 style="color: var(--primary);">Atiq Master Login</h2>
        <p style="color: var(--text-dim); font-size: 12px;">অ্যাকাউন্ট ভেরিফিকেশন প্রয়োজন</p>
        
        <input type="email" id="email" class="input-field" placeholder="আপনার জিমেইল">
        <input type="password" id="pass" class="input-field" placeholder="পাসওয়ার্ড">
        
        <button class="btn-confirm" id="loginBtn" onclick="forceLogin()">লগইন করুন</button>
        <p id="auth-msg" style="color: var(--danger); font-size: 12px; margin-top: 15px; font-weight: bold;"></p>
    </div>
</div>

<div id="app-content" style="visibility: hidden;">
    <div class="top-dash">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h3 style="margin:0;" id="user-display">HELLO, ATIQUE</h3>
                <small style="color:var(--text-dim)">Verified Admin Access</small>
            </div>
            <i class="fas fa-user-circle" style="font-size:35px; color:var(--primary)"></i>
        </div>
        <div class="wallet-card">
            <span style="font-size:12px; font-weight:bold; opacity:0.9;">CURRENT BALANCE</span>
            <h1 style="margin:5px 0 0 0; font-size:35px;">৳ ৫৪০.০০</h1>
        </div>
    </div>

    <div class="section-header">সার্ভিস ক্যাটাগরি</div>
    <div class="grid-box">
        <div class="service-card" onclick="openPay('Free Fire 115💎', '৳ ৮৫', 'Player UID')">
            <i class="fas fa-fire" style="color:#ff8c00"></i><b>Free Fire</b>
        </div>
        <div class="service-card" onclick="openPay('FB Followers', '৳ ১৩০', 'Profile Link')">
            <i class="fab fa-facebook" style="color:#1877f2"></i><b>Facebook</b>
        </div>
        <div class="service-card" onclick="openPay('YT Subscribers', '৳ ৪৮০', 'Channel Link')">
            <i class="fab fa-youtube" style="color:#ff0000"></i><b>YouTube</b>
        </div>
        <div class="service-card" onclick="openPay('TikTok Like', '৳ ৪০', 'Video Link')">
            <i class="fab fa-tiktok" style="color:#fff"></i><b>TikTok</b>
        </div>
    </div>
</div>

<div class="modal-overlay" id="overlay"></div>
<div class="pay-modal" id="pay-modal">
    <h3 id="m-service" style="margin-top:0; color:var(--primary)">Service</h3>
    <p id="m-price" style="font-weight:bold; font-size:20px;">Price: ৳ 0</p>
    
    <label style="font-size:12px; color:var(--text-dim)" id="m-label">Target ID:</label>
    <input type="text" id="target-id" class="input-field" placeholder="লিঙ্ক বা আইডি দিন">

    <div class="copy-box">
        <div>
            <small style="display:block; font-size:10px; color:var(--text-dim)">SEND MONEY (PERSONAL)</small>
            <b style="font-size:18px;">01766380931</b>
        </div>
        <button onclick="copyNum('01766380931')" style="background:var(--primary); border:none; color:white; padding:8px 12px; border-radius:8px; cursor:pointer;">COPY</button>
    </div>

    <input type="text" id="txn-id" class="input-field" placeholder="Transaction ID (TxnID)">
    
    <button class="btn-confirm" onclick="confirmOrder()">অর্ডার নিশ্চিত করুন</button>
    <button onclick="closeModal()" style="width:100%; background:none; border:none; color:var(--danger); margin-top:15px; cursor:pointer; font-weight:bold;">বাতিল করুন</button>
</div>

<div class="nav-bar">
    <div class="nav-link active"><i class="fas fa-home"></i><br>Home</div>
    <div class="nav-link"><i class="fas fa-history"></i><br>History</div>
    <div class="nav-link"><i class="fas fa-shield-alt"></i><br>Security</div>
</div>

<script>
    // লগইন ফাংশন - এবার ১০০% কাজ করবে
    function forceLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const authScreen = document.getElementById('auth-screen');
        const appContent = document.getElementById('app-content');
        const msg = document.getElementById('auth-msg');

        if(email.includes('@') && pass.length >= 4) {
            // লগইন স্ক্রিন গায়েব করা
            authScreen.style.opacity = '0';
            setTimeout(() => {
                authScreen.style.display = 'none';
                appContent.style.visibility = 'visible';
                document.getElementById('user-display').innerText = "HELLO, " + email.split('@')[0].toUpperCase();
            }, 500);
        } else {
            msg.innerText = "সঠিক ইমেইল এবং পাসওয়ার্ড দিন!";
        }
    }

    function openPay(name, price, label) {
        document.getElementById('m-service').innerText = name;
        document.getElementById('m-price').innerText = "Price: " + price;
        document.getElementById('m-label').innerText = label + " দিন:";
        document.getElementById('pay-modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('pay-modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }

    function copyNum(n) {
        navigator.clipboard.writeText(n);
        alert("নাম্বার কপি হয়েছে: " + n);
    }

    function confirmOrder() {
        const target = document.getElementById('target-id').value;
        const txn = document.getElementById('txn-id').value;
        if(target.length < 4 || txn.length < 5) {
            alert("সব তথ্য ঠিকভাবে দিন!");
            return;
        }
        alert("অর্ডার সফল হয়েছে!");
        closeModal();
    }
</script>

</body>
</html>
