<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABR SMM Panel - Powered by Firebase & Fiverr</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #e9ecef; font-family: 'Inter', sans-serif; }
        
        /* ফাইবার সিকিউরিটি ব্যানার */
        .fiverr-banner {
            background: linear-gradient(135deg, #1dbf73 0%, #19a463 100%);
            color: white; padding: 15px; border-radius: 12px;
            text-align: center; cursor: pointer; font-weight: bold;
            margin: 20px 0; display: block; text-decoration: none;
            box-shadow: 0 4px 15px rgba(29, 191, 115, 0.3);
        }

        .service-card { 
            background: #161a1e; border-radius: 12px; padding: 20px; text-align: center; 
            transition: 0.3s; cursor: pointer; border: 1px solid #2d3436;
        }
        .service-card:hover { border-color: #1dbf73; background: #1c2127; transform: translateY(-5px); }
        
        .btn-pay { 
            background-color: #1dbf73; color: white; font-weight: bold; 
            padding: 15px; width: 100%; border: none; border-radius: 10px; 
            margin-top: 15px; transition: 0.3s;
        }
        .btn-pay:hover { background-color: #19a463; }

        .local-payment-tag {
            font-size: 13px; color: #ff8c00; margin-top: 10px; display: block;
            text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="fiverr-banner">
        <i class="fas fa-shield-alt"></i> Secured by Firebase & Fiverr Payment Server
    </div>

    <h3 class="fw-bold mb-4">Select Your Service</h3>
    <div class="row g-3">
        <div class="col-6 col-md-3" onclick="showForm('Facebook')">
            <div class="service-card"><i class="fab fa-facebook text-primary fa-2x mb-2"></i><h6>Facebook</h6></div>
        </div>
        <div class="col-6 col-md-3" onclick="showForm('YouTube')">
            <div class="service-card"><i class="fab fa-youtube text-danger fa-2x mb-2"></i><h6>YouTube</h6></div>
        </div>
        <div class="col-6 col-md-3" onclick="showForm('Free Fire')">
            <div class="service-card"><i class="fas fa-bolt text-warning fa-2x mb-2"></i><h6>Free Fire</h6></div>
        </div>
        <div class="col-6 col-md-3" onclick="showForm('ID Sale')">
            <div class="service-card"><i class="fas fa-id-badge text-success fa-2x mb-2"></i><h6>ID Sale</h6></div>
        </div>
    </div>

    <div id="order-section" class="mt-5 p-4" style="background: #161a1e; border-radius: 15px; display: none; border: 1px solid #2d3436;">
        <h4 id="cat-title" class="text-success mb-4">Service Details</h4>
        <select id="pkg-select" class="form-select bg-dark text-white border-secondary mb-3" onchange="calc()"></select>
        
        <div class="p-3 mb-3" style="background: #0b0e11; border-radius: 8px;">
            <div class="d-flex justify-content-between"><span>Price (USD):</span><strong id="usd-text" class="text-primary">$0.00</strong></div>
            <div class="d-flex justify-content-between mt-2"><span>In BDT:</span><strong id="bdt-text" class="text-success">৳0.00</strong></div>
        </div>

        <button onclick="processPayment()" class="btn-pay">Pay & Order Now</button>
        <span class="local-payment-tag">বিকাশ, নগদ, রকেট বা উপায়ের জন্য নম্বর: ০১৭৬৬৩৮০৯৩১</span>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyC5i7SOEJeF08NsO7VbIU63r...", // আপনার স্ক্রিনশটের কী
    authDomain: "online-shop-ar.firebaseapp.com",
    projectId: "online-shop-ar",
    storageBucket: "online-shop-ar.firebasestorage.app",
    messagingSenderId: "913434308973",
    appId: "1:913434308973:web:d0b1f8f7dda8c64f586a64",
    measurementId: "G-T20TRS2F59"
  };

  const app = initializeApp(firebaseConfig);
</script>

<script>
    const services = {
        'Facebook': [{n: "1K Followers", p: 5}, {n: "Video Views", p: 2}],
        'YouTube': [{n: "1K Subscribers", p: 15}, {n: "WatchTime 4K", p: 40}],
        'Free Fire': [{n: "1000 Diamonds", p: 8}, {n: "Weekly Membership", p: 2}],
        'ID Sale': [{n: "Level 60 ID", p: 30}, {n: "Verified Account", p: 10}]
    };

    function showForm(cat) {
        document.getElementById('order-section').style.display = 'block';
        document.getElementById('cat-title').innerText = cat;
        let s = document.getElementById('pkg-select'); s.innerHTML = '';
        services[cat].forEach(o => { let e = document.createElement('option'); e.text = o.n; e.value = o.p; s.add(e); });
        calc();
    }

    function calc() {
        let p = document.getElementById('pkg-select').value;
        document.getElementById('usd-text').innerText = '$' + parseFloat(p).toFixed(2);
        document.getElementById('bdt-text').innerText = '৳' + (p * 125).toFixed(2);
    }

    function processPayment() {
        // ফাইবার বা হোয়াটসঅ্যাপে পাঠানোর লজিক
        window.location.href = "add-funds.html"; 
    }
</script>

</body>
</html>
