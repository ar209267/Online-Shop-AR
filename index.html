<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq SMM Panel V3.1 - Enhanced</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-yellow: #f1c40f;
            --white: #ffffff;
            --dark-text: #2c3e50;
            --bg-color: #f4f7f6;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; color: var(--dark-text); padding: 20px; }
        .container { max-width: 1100px; margin: auto; }

        /* Header */
        .profile-header { background: linear-gradient(135deg, #3498db, #2980b9); color: white; padding: 30px; border-radius: 15px; display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .balance-tag { background: var(--primary-yellow); color: #000; padding: 8px 20px; border-radius: 20px; font-weight: bold; }

        /* Service Cards with High-Quality Logos */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .service-box { background: var(--white); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #eee; transition: 0.3s; }
        .service-box:hover { border-color: var(--primary-yellow); transform: translateY(-5px); }
        
        /* লোগো সেকশন */
        .service-logo-container { width: 60px; height: 60px; margin: 0 auto 15px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .service-logo-container img { width: 100%; height: auto; object-fit: contain; }

        .service-name { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .service-price { color: #3498db; font-weight: bold; font-size: 14px; background: #ebf5fb; padding: 2px 10px; border-radius: 5px; }

        /* V3.1 Enhanced Payment Section (বড় নম্বর ও ব্যাকগ্রাউন্ড টেক্সট) */
        .payment-box { background: var(--white); border: 2px solid var(--primary-yellow); padding: 40px; border-radius: 20px; text-align: center; margin-top: 30px; position: relative; overflow: hidden; }
        .payment-box h3 { border: none; color: #000; font-size: 24px; position: relative; z-index: 2; }
        
        /* ব্যাকগ্রাউন্ড টেক্সট লজিক */
        .payment-bg-text { position: absolute; top: -50px; left: -100px; font-size: 200px; font-weight: 900; color: #fdf5d5; opacity: 0.1; z-index: 0; white-space: nowrap; pointer-events: none; }
        
        /* বড় পেমেন্ট নম্বর */
        .big-number { font-size: 48px; font-weight: 800; color: #333; margin: 25px 0; background: #fff9db; padding: 20px; border-radius: 15px; border: 2px dashed var(--primary-yellow); position: relative; z-index: 2; letter-spacing: 2px; }
        
        .btn-pay { background: #000; color: #fff; width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; position: relative; z-index: 2; }
        .btn-pay:hover { background: #d4ac0d; }

        /* সাপোর্ট বাটন */
        .btn-support-wa { background: #25D366; color: white; text-decoration: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; display: inline-block; margin-top: 20px; border: 1px solid #1eaa5e; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-header">
        <i class="fas fa-user-circle fa-4x"></i>
        <div class="user-info">
            <h2 style="margin:0;">স্বাগতম আতিক!</h2>
            <div class="balance-tag">ব্যালেন্স: ৳ ৫৪০.০০</div>
            <p style="font-size:12px; margin-top:5px;">User ID: #AT9391</p>
        </div>
    </div>

    <div class="card" style="margin-bottom: 30px; background: #fff; padding: 20px; border-radius: 15px;">
        <h3 style="border-left: 5px solid #f1c40f; padding-left: 10px;">লাইভ সার্ভিস এক্সপ্লোরার</h3>
        <div class="grid">
            <div class="service-box">
                <div class="service-logo-container"><img src="https://example.com/icons/facebook_hd.png" alt="FB Logo"></div>
                <span class="service-name">FB Followers</span>
                <span class="service-price">৳ ১৩০ (৫০০০)</span>
            </div>
            <div class="service-box">
                <div class="service-logo-container"><img src="https://example.com/icons/youtube_hd.png" alt="YT Logo"></div>
                <span class="service-name">YouTube Subs</span>
                <span class="service-price">৳ ৮৫০ (১০০০)</span>
            </div>
            <div class="service-box">
                <div class="service-logo-container"><img src="https://example.com/icons/tiktok_hd.png" alt="TT Logo"></div>
                <span class="service-name">TikTok Views</span>
                <span class="service-price">৳ ৯০ (১০০০০)</span>
            </div>
            <div class="service-box">
                <div class="service-logo-container"><img src="https://example.com/icons/whatsapp_hd.png" alt="WA Logo"></div>
                <span class="service-name">WhatsApp Blast</span>
                <span class="service-price">৳ ৪০০</span>
            </div>
        </div>
    </div>

    <div class="payment-box">
        <div class="payment-bg-text">বিকাশ নগদ পেমেন্ট</div>
        <h3>বিকাশ / নগদ (পার্সোনাল)</h3>
        <div class="big-number">০১৭৬৬৩৮০৯৩১</div>
        <input type="text" placeholder="TxnID দিন" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; position:relative; z-index:2; margin-bottom:15px;">
        <button class="btn-pay">ব্যালেন্স অ্যাড করুন</button>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <a href="https://wa.me/8801766380931?text=Hello Atiq, I need support regarding my smm panel balance." target="_blank" class="btn-support-wa">
            <i class="fab fa-whatsapp"></i> সরাসরি হোয়াটসঅ্যাপ সাপোর্ট
        </a>
    </div>
</div>

<script>
    // এই কোডে কোনো এক্সটার্নাল স্ক্রিপ্টের দরকার নেই। সব আইকন Font Awesome এবং হোয়াটসঅ্যাপ লিঙ্ক API দিয়ে কাজ করবে।
</script>

</body>
</html>
