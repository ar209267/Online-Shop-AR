<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq Master - Enterprise V6.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>

    <div id="preloader">
        <div class="ring"></div>
        <h2 style="color: #00ff88; margin-top: 20px; font-family: 'Orbitron';">SYSTEM BOOTING...</h2>
    </div>

    <div id="auth-portal">
        <div class="auth-card">
            <h1 style="font-family: 'Orbitron'; font-size: 28px; margin-bottom: 5px;">ATIQ MASTER</h1>
            <p style="color: #666; margin-bottom: 30px;">Premium Digital Services</p>

            <div id="login-form">
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Email"></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="pass" placeholder="Password"></div>
                <button class="main-btn" onclick="handleAuth('login')">LOGIN</button>
                <p class="toggle-text">নতুন? <span onclick="toggleAuth(true)">একাউন্ট খুলুন</span></p>
            </div>

            <div id="signup-form" style="display: none;">
                <div class="input-group"><i class="fas fa-user-plus"></i><input type="email" id="s_email" placeholder="New Email"></div>
                <div class="input-group"><i class="fas fa-key"></i><input type="password" id="s_pass" placeholder="New Password"></div>
                <button class="main-btn" onclick="handleAuth('signup')">SIGN UP</button>
                <p class="toggle-text">আগের আইডি আছে? <span onclick="toggleAuth(false)">লগইন</span></p>
            </div>
        </div>
    </div>

    <div id="main-ui" style="display: none;">
        <div class="top-nav">
            <div class="user-box">
                <div class="user-icon"><i class="fas fa-user"></i></div>
                <div><b id="user-display">USER</b><p>Verified Partner</p></div>
            </div>
            <button onclick="firebase.auth().signOut()" class="off-btn"><i class="fas fa-power-off"></i></button>
        </div>

        <div class="hero">
            <div class="balance-card">
                <p>ব্যালেন্স দেখুন</p>
                <h1 id="user-bal">৳ ০.০০</h1>
<button id="github-login">Login with GitHub</button>
<div id="user-info"></div>
