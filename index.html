<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABR SMM Panel - Secured by Fiverr</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: #e9ecef; font-family: 'Inter', sans-serif; }
        
        /* আধুনিক ফাইবার স্টাইল পেমেন্ট ব্যানার */
        .fiverr-banner {
            background: linear-gradient(135deg, #1dbf73 0%, #19a463 100%);
            color: white; padding: 20px; border-radius: 15px;
            text-align: center; cursor: pointer; font-weight: bold;
            margin: 20px 0; display: block; text-decoration: none;
            border: none; box-shadow: 0 8px 20px rgba(29, 191, 115, 0.3);
        }
        .fiverr-banner:hover { transform: scale(1.02); color: white; }
        
        .service-card { 
            background: #161a1e; border-radius: 15px; padding: 25px; text-align: center; 
            transition: 0.3s; cursor: pointer; border: 1px solid #2d3436;
        }
        .service-card:hover { border-color: #1dbf73; background: #1c2127; }
        .service-card i { font-size: 45px; margin-bottom: 15px; }

        .order-box { background: #161a1e; padding: 30px; border-radius: 20px; border: 1px solid #2d3436; margin-top: 25px; }
        
        .btn-fiverr { 
            background-color: #1dbf73; color: white; font-weight: bold; 
            padding: 18px; width: 100%; border: none; border-radius: 12px; 
            font-size: 18px; transition: 0.3s;
        }
        .btn-fiverr:hover { background-color: #19a463; box-shadow: 0 5px 15px rgba(29, 191, 115, 0.4); }
        
        .security-tag { font-size: 12px; color: #1dbf73; margin-top: 10px; display: block; }
    </style>
</head>
<body>

<div class="container py-4">
    <a href="https://www.fiverr.com/your_username" target="_blank" class="fiverr-banner">
        <i class="fas fa-shield-alt"></i> পেমেন্ট এখন আরও নিরাপদ! <br>
        <span style="font-size: 14px; font-weight: normal;">আমাদের অফিসিয়াল ফাইবার (Fiverr) সার্ভারের মাধ্যমে পেমেন্ট করুন</span>
    </a>

    <h3 class="fw-bold mb-4">প্যাকেজ সিলেক্ট করুন</h3>
    <div class="row g-4">
        <div class="col-6 col-md-3" onclick="showForm('Facebook')">
            <div class="service-card"><i class="fab fa-facebook text-primary"></i><h6>Facebook</h6></div>
        </div>
        <div class="col-6 col-md-3" onclick="showForm('YouTube')">
            <div class="service-card"><i class="fab fa-youtube text-danger"></i><h6>YouTube</h6></div>
        </div>
        <div class="col-6 col-md-3" onclick="showForm('Free Fire')">
            <div class="service-card"><i class="fas fa-bolt text-warning"></i><h6>Free Fire</h6></div>
        </div>
        <div class="col-6 col-md-3" onclick="showForm('ID Sale')">
            <div class="service-card"><i class="fas fa-check-circle text-success"></i><h6>ID Sale</h6></div>
        </div>
    </div>

    <div id="order-form" class="order-box" style="display:none;">
        <h4 id="service-title" class="text-success fw-bold mb-4">Service</h4>
        
        <div class="mb-4">
            <label class="form-label text-secondary">প্যাকেজ বেছে নিন</label>
            <select id="package" class="form-select bg-dark text-white border-secondary" style="padding: 12px;" onchange="calc()"></select>
        </div>

        <div class="p-3 mb-4" style="background: #0b0e11; border-radius: 10px;">
            <div class="d-flex justify-content-between">
                <span>সার্ভার ফি (USD):</span>
                <strong id="usd" class="text-success">$0.00</strong>
            </div>
            <div class="d-flex justify-content-between mt-2">
                <span>মোট টাকা (BDT):</span>
                <strong id="bdt" class="text-white">৳0.00</strong>
            </div>
        </div>

        <button onclick="redirectToFiverr()" class="btn-fiverr">
            <i class="fas fa-shopping-cart"></i> অর্ডার করুন (Fiverr Server)
        </button>
        <span class="security-tag text-center"><i class="fas fa-lock"></i> Secured & Verified by Fiverr Payment Gateway</span>
    </div>
</div>

<script>
    const data = {
        'Facebook': [{n: "Facebook Follower (1K)", p: 5}, {n: "Video Views (10K)", p: 10}],
        'YouTube': [{n: "1000 Subscribers", p: 15}, {n: "4000 Hours WatchTime", p: 40}],
        'Free Fire': [{n: "1000 Diamonds", p: 8}, {n: "Weekly Membership", p: 2}],
        'ID Sale': [{n: "Level 60+ ID", p: 25}, {n: "Old FB Account", p: 5}]
    };

    function showForm(cat) {
        document.getElementById('order-form').style.display = 'block';
        document.getElementById('service-title').innerText = cat;
        let s = document.getElementById('package'); s.innerHTML = '';
        data[cat].forEach(o => { let e = document.createElement('option'); e.text = o.n; e.value = o.p; s.add(e); });
        calc();
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function calc() {
        let p = document.getElementById('package').value;
        document.getElementById('usd').innerText = '$' + parseFloat(p).toFixed(2);
        document.getElementById('bdt').innerText = '৳' + (p * 125).toFixed(2);
    }

    function redirectToFiverr() {
        // এখানে আপনার ফাইবার প্রোফাইল বা গিগ লিঙ্কটি বসাবেন
        window.open('https://www.fiverr.com/your_username', '_blank');
    }
</script>
</body>
</html>
