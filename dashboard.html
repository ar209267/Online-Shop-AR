<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atiq SMM Panel V9.1 - Cyber Shield</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* আগের সব ডিজাইন ঠিক রেখে নতুন সিকিউরিটি স্টাইল */
        :root { --primary-yellow: #f1c40f; --dark-bg: #0f172a; }
        
        body { background: var(--dark-bg); font-family: 'Segoe UI', sans-serif; color: #fff; }

        /* Auth Container */
        .auth-container {
            max-width: 400px; margin: 100px auto; background: rgba(255,255,255,0.05);
            padding: 30px; border-radius: 20px; border: 1px solid var(--primary-yellow);
            backdrop-filter: blur(10px); text-align: center;
        }

        .auth-input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;
            border: 1px solid #333; background: #1a1a1a; color: #fff;
        }

        .auth-btn {
            width: 100%; padding: 12px; background: var(--primary-yellow);
            color: #000; border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; margin-top: 10px;
        }

        /* Hidden Class */
        .hidden { display: none; }

        /* Dashboard Style (Login এর পর যা দেখাবে) */
        #main-dashboard { padding: 20px; }
    </style>
</head>
<body>

    <div id="auth-section" class="auth-container">
        <h2 id="auth-title">V9 Cyber Login</h2>
        <p id="error-msg" style="color: #ff4757; font-size: 14px;"></p>
        
        <input type="email" id="email" class="auth-input" placeholder="আপনার জিমেইল দিন">
        <input type="password" id="password" class="auth-input" placeholder="পাসওয়ার্ড দিন">
        
        <button id="login-btn" class="auth-btn">লগইন করুন</button>
        <button id="signup-btn" class="auth-btn" style="background: transparent; color: var(--primary-yellow); border: 1px solid var(--primary-yellow);">নতুন অ্যাকাউন্ট খুলুন</button>
        
        <p style="font-size: 12px; margin-top: 15px; color: #888;">*একটি জিমেইল দিয়ে একবারই সাইনআপ করা সম্ভব।</p>
    </div>

    <div id="main-dashboard" class="hidden">
        <h2 style="text-align: center; color: var(--primary-yellow);">স্বাগতম আতিক! আপনি সফলভাবে লগইন করেছেন।</h2>
        <center><button onclick="logout()" style="background: red; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer;">Logout</button></center>
        
        </div>

    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-auth.js"></script>

    <script>
        // তোমার Firebase Config এখানে বসাও (আগের মেসেজে দিয়েছিলাম)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        // Firebase ইনিশিয়ালাইজ করা
        // const app = initializeApp(firebaseConfig);
        // const auth = getAuth();

        // ১. সাইনআপ লজিক (এক ইমেইল একবারই)
        document.getElementById('signup-btn').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // এখানে Firebase এর createUserWithEmailAndPassword ফাংশন কাজ করবে
            // এটি অটোমেটিক চেক করবে যে ইমেইলটি আগে ব্যবহার হয়েছে কি না।
            alert("সাইনআপ সিস্টেম অ্যাক্টিভেটেড! একটি জিমেইল দিয়ে একবারই অ্যাকাউন্ট খোলা যাবে।");
        });

        // ২. লগইন লজিক
        document.getElementById('login-btn').addEventListener('click', () => {
            // সফল লগইন হলে ড্যাশবোর্ড দেখাবে
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
        });

        function logout() {
            location.reload(); // লগআউট করলে আবার লগইন পেজ আসবে
        }
    </script>
</body>
</html>
