<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - ABR Panel</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; border: 1px solid #ff8c00; }
        .method { background: #2a2a2a; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; justify-content: space-between; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box; }
        .btn { background: #25d366; color: white; padding: 15px; width: 100%; border-radius: 10px; text-decoration: none; display: block; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Payment Methods</h2>
        <div class="method"><span>বিকাশ (Personal)</span> <strong>01766380931</strong></div>
        <div class="method"><span>নগদ (Personal)</span> <strong>01766380931</strong></div>
        <hr>
        <input type="number" id="amt" placeholder="কত টাকা পাঠিয়েছেন?">
        <input type="text" id="trx" placeholder="Transaction ID (TrxID)">
        <a href="javascript:void(0)" onclick="send()" class="btn">পেমেন্ট সাবমিট করুন</a>
    </div>

    <script>
        function send() {
            let a = document.getElementById('amt').value;
            let t = document.getElementById('trx').value;
            if(a=="" || t=="") { alert("সব তথ্য দিন"); return; }
            let msg = `*Payment Confirmation*%0AAmount: ${a}%0ATrxID: ${t}`;
            window.location.href = `https://wa.me/8801766380931?text=${msg}`;
        }
    </script>
</body>
</html>
