<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Add Funds - ABR SMM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0e11; color: white; text-align: center; padding-top: 50px; }
        .box { background: #161a1e; padding: 30px; border-radius: 20px; border: 1px solid #ff8c00; max-width: 400px; margin: auto; }
        .method { background: #2a2a2a; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>অ্যাড ফান্ড (Add Funds)</h3>
        <p class="text-secondary small">টাকা পাঠিয়ে TrxID দিন।</p>
        <div class="method"><span>বিকাশ/নগদ/রকেট</span> <strong>01766380931</strong></div>
        <div class="method"><span>উপায় (Upay)</span> <strong>01766380931</strong></div>
        <input type="number" id="amt" class="form-control bg-dark text-white mb-2" placeholder="কত টাকা পাঠিয়েছেন?">
        <input type="text" id="trx" class="form-control bg-dark text-white mb-3" placeholder="Transaction ID (TrxID)">
        <button onclick="sendWA()" class="btn btn-warning w-100 fw-bold">সার্ভারে টাকা অ্যাড করুন</button>
    </div>

<script>
    function sendWA() {
        let a = document.getElementById('amt').value;
        let t = document.getElementById('trx').value;
        if(!a || !t) { alert("সব তথ্য দিন!"); return; }
        window.location.href = `https://wa.me/8801766380931?text=AddBalance%20Amt:${a}%20TrxID:${t}`;
    }
</script>
</body>
</html>
